<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kompas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: #14120e; }

/* ── MAPA ── */
#cpMap {
  position: fixed;
  top: -21%; left: -21%;
  width: 142%; height: 142%;
  z-index: 0;
  transition: transform 0.25s ease-out;
  transform-origin: 50% 50%;
}

/* ── UI vrstva ── */
#cpUI {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
}
#cpUI * { pointer-events: all; }

/* Zpět tlačítko */
#cpBack {
  position: absolute; top: 16px; left: 16px;
  height: 36px; padding: 0 14px; border-radius: 18px;
  background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.2);
  color: white; font-size: 13px; font-family: inherit;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: background .2s;
}
#cpBack:hover { background: rgba(0,0,0,.75); }

/* Název cíle */
#cpName {
  position: absolute; top: 20px; left: 70px; right: 20px;
  font-size: 14px; font-weight: 500; color: white;
  text-shadow: 0 1px 4px rgba(0,0,0,.7);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Kompasová růžice */
.cp-stage {
  position: relative;
  width: min(180px, 48vw);
  height: min(180px, 48vw);
  margin-bottom: 20px;
  background: rgba(0,0,0,.3);
  border-radius: 50%;
}
#cpRose, #cpArrow {
  position: absolute; inset: 0;
  transition: transform 0.2s ease-out;
}
#cpArrow svg { filter: drop-shadow(0 0 6px rgba(184,146,42,.8)); }

/* Info panel */
.cp-info {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: rgba(0,0,0,.4);
  padding: 12px 32px; border-radius: 16px;
}
.cp-dist {
  font-family: 'Playfair Display', serif;
  font-size: 44px; font-weight: 700; color: white;
  line-height: 1; letter-spacing: -.02em;
}
.cp-dist-unit { font-size: 18px; color: rgba(255,255,255,.5); margin-left: 3px; }
.cp-steps { font-size: 11px; color: rgba(255,255,255,.45); letter-spacing: .06em; text-transform: uppercase; margin-top: 2px; }
.cp-bearing { font-size: 11px; color: rgba(255,255,255,.3); margin-top: 4px; }

/* Status */
#cpStatus {
  margin-top: 10px; font-size: 12px; color: rgba(255,255,255,.5);
  text-align: center; padding: 0 32px;
  text-shadow: 0 1px 3px rgba(0,0,0,.6);
}

/* Proximity banner */
#cpProximity {
  display: none;
  position: absolute; bottom: 32px; left: 20px; right: 20px;
  background: #b8922a; color: white;
  border-radius: 12px; padding: 14px 20px;
  text-align: center; font-size: 14px; font-weight: 500;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="cpMap"></div>

<div id="cpUI">
  <button id="cpBack">← Zpět</button>
  <div id="cpName">—</div>

  <div class="cp-stage">
    <div id="cpRose">
      <svg viewBox="0 0 320 320" width="100%" height="100%">
        <circle cx="160" cy="160" r="150" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
        <circle cx="160" cy="160" r="100" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
        <g stroke="rgba(255,255,255,.3)" stroke-width="1">
          <line x1="160" y1="12" x2="160" y2="32"/>
          <line x1="160" y1="288" x2="160" y2="308"/>
          <line x1="12" y1="160" x2="32" y2="160"/>
          <line x1="288" y1="160" x2="308" y2="160"/>
        </g>
        <g stroke="rgba(255,255,255,.15)" stroke-width="1">
          <line x1="63" y1="32" x2="72" y2="47"/>   <line x1="248" y1="273" x2="257" y2="288"/>
          <line x1="288" y1="63" x2="273" y2="72"/>  <line x1="47" y1="248" x2="32" y2="257"/>
          <line x1="257" y1="32" x2="248" y2="47"/>  <line x1="72" y1="273" x2="63" y2="288"/>
          <line x1="32" y1="63" x2="47" y2="72"/>    <line x1="273" y1="248" x2="288" y2="257"/>
        </g>
        <text x="160" y="26" text-anchor="middle" fill="#e05a5a" font-size="14" font-weight="700" font-family="DM Sans,sans-serif">N</text>
        <text x="160" y="314" text-anchor="middle" fill="rgba(255,255,255,.45)" font-size="11" font-family="DM Sans,sans-serif">S</text>
        <text x="314" y="165" text-anchor="middle" fill="rgba(255,255,255,.45)" font-size="11" font-family="DM Sans,sans-serif">E</text>
        <text x="6" y="165" text-anchor="middle" fill="rgba(255,255,255,.45)" font-size="11" font-family="DM Sans,sans-serif">W</text>
      </svg>
    </div>
    <div id="cpArrow">
      <svg viewBox="0 0 320 320" width="100%" height="100%">
        <polygon points="160,42 174,135 160,122 146,135" fill="#b8922a"/>
        <polygon points="160,278 174,185 160,198 146,185" fill="rgba(184,146,42,.22)"/>
        <circle cx="160" cy="160" r="5" fill="white" fill-opacity=".55"/>
      </svg>
    </div>
  </div>

  <div class="cp-info">
    <div class="cp-dist"><span id="cpDistVal">—</span><span class="cp-dist-unit" id="cpDistUnit"></span></div>
    <div class="cp-steps" id="cpSteps"></div>
    <div class="cp-bearing" id="cpBearing"></div>
  </div>
  <div id="cpStatus">Čeká na GPS…</div>

  <div id="cpProximity" onclick="goToTarget()">
    Jsi na místě! Otevřít Steps into the Past →
  </div>
</div>

<script>
// ── PARAMETRY Z URL ──
const params = new URLSearchParams(location.search);
const TARGET = {
  id:   params.get('id'),
  lat:  parseFloat(params.get('lat')),
  lng:  parseFloat(params.get('lng')),
  name: params.get('name') || '—'
};
document.getElementById('cpName').textContent = TARGET.name;
document.getElementById('cpBack').addEventListener('click', () => history.back());

// ── MAPA ──
const map = L.map('cpMap', {
  zoomControl: false, attributionControl: false,
  dragging: false, scrollWheelZoom: false,
  touchZoom: false, doubleClickZoom: false
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 20
}).addTo(map);
map.setView([TARGET.lat, TARGET.lng], 17);
setTimeout(() => map.invalidateSize(), 100);

// Cílový pin — zvýrazněný
const targetIcon = L.divIcon({
  html: `<div style="width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:#6b7280;border:2px solid white;box-shadow:0 0 0 3px #b8922a,0 2px 12px rgba(184,146,42,.5);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:11px;font-weight:700;color:white">H</span></div>`,
  className: '', iconSize: [34,34], iconAnchor: [17,34]
});
L.marker([TARGET.lat, TARGET.lng], { icon: targetIcon }).addTo(map);

// Marker uživatele
let userMarker = null;

// ── SENZORY ──
let userPos = null;
let smoothHeading = null;
const LP = 0.12;

function smoothAngle(cur, tgt) {
  if (cur === null) return tgt;
  let d = tgt - cur;
  if (d > 180) d -= 360;
  if (d < -180) d += 360;
  return (cur + LP * d + 360) % 360;
}

// GPS
navigator.geolocation && navigator.geolocation.watchPosition(pos => {
  userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
  const ll = L.latLng(userPos.lat, userPos.lng);
  if (userMarker) {
    userMarker.setLatLng(ll);
  } else {
    userMarker = L.circleMarker(ll, {
      radius: 8, color: '#2a6e5e', fillColor: '#2a6e5e',
      fillOpacity: .9, weight: 2
    }).addTo(map);
  }
  update();
}, () => {
  document.getElementById('cpStatus').textContent = 'GPS nedostupná — povol přístup k poloze.';
}, { enableHighAccuracy: true, maximumAge: 2000 });

// Orientace
function listenOrientation() {
  const handler = (e) => {
    let h = null;
    if (e.webkitCompassHeading !== undefined) h = e.webkitCompassHeading;
    else if (e.absolute && e.alpha !== null) h = (360 - e.alpha) % 360;
    else if (e.alpha !== null) h = (360 - e.alpha) % 360;
    if (h !== null) { smoothHeading = smoothAngle(smoothHeading, h); update(); }
  };
  window.addEventListener('deviceorientationabsolute', handler, true);
  window.addEventListener('deviceorientation', handler, true);
}

if (typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission === 'function') {
  DeviceOrientationEvent.requestPermission()
    .then(s => { if (s === 'granted') listenOrientation(); })
    .catch(() => listenOrientation());
} else {
  listenOrientation();
}

// ── VÝPOČTY ──
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function bearingTo(from, to) {
  const dL = toRad(to.lng - from.lng);
  const la1 = toRad(from.lat), la2 = toRad(to.lat);
  const y = Math.sin(dL) * Math.cos(la2);
  const x = Math.cos(la1) * Math.sin(la2) - Math.sin(la1) * Math.cos(la2) * Math.cos(dL);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function distanceTo(from, to) {
  const R = 6371000;
  const dLat = toRad(to.lat - from.lat), dLng = toRad(to.lng - from.lng);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(from.lat)) * Math.cos(toRad(to.lat)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ── UPDATE ──
function update() {
  if (!userPos) return;

  const dist    = distanceTo(userPos, TARGET);
  const bearing = bearingTo(userPos, TARGET);
  const h       = smoothHeading !== null ? smoothHeading : 0;

  // Vzdálenost
  const dv = document.getElementById('cpDistVal');
  const du = document.getElementById('cpDistUnit');
  if (dist < 1000) { dv.textContent = Math.round(dist); du.textContent = ' m'; }
  else { dv.textContent = (dist/1000).toFixed(1).replace('.',','); du.textContent = ' km'; }

  // Kroky
  const steps = Math.round(dist / 0.75);
  document.getElementById('cpSteps').textContent = steps < 10000 ? `≈ ${steps.toLocaleString('cs')} kroků` : '';

  // Azimut
  const dirs = ['S','SSV','SV','VSV','V','VJV','JV','JJV','J','JJZ','JZ','ZJZ','Z','ZSZ','SZ','SSZ'];
  document.getElementById('cpBearing').textContent = `${Math.round(bearing)}° ${dirs[Math.round(bearing/22.5)%16]}`;

  // Mapa — otočená tak aby cíl byl nahoře; bearing ukazuje k cíli
  // Mapa rotuje o -(bearing) — cíl jde na sever (nahoru)
  // Ale také kompenzujeme heading telefonu: mapa = -(bearing - h) = h - bearing? 
  // Ne — chceme cíl nahoře bez ohledu na orientaci. Mapa = rotate(-bearing).
  const mapRot = -bearing;
  document.getElementById('cpMap').style.transform = `rotate(${mapRot}deg)`;

  // Růžice: sever nahoru kompenzovaný headingem telefonu
  document.getElementById('cpRose').style.transform = `rotate(${-h}deg)`;

  // Šipka: relativní odchylka od cíle
  document.getElementById('cpArrow').style.transform = `rotate(${bearing - h}deg)`;

  document.getElementById('cpStatus').textContent = '';

  // Proximity 25 m
  if (dist <= 25) {
    document.getElementById('cpProximity').style.display = 'block';
  }
}

function goToTarget() {
  window.location.href = `step-into-the-past.html?id=${TARGET.id}&lat=${TARGET.lat}&lng=${TARGET.lng}`;
}
</script>
</body>
</html>
