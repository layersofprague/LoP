<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Kompas · LoP</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
#clip { position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; background: #e8e4dc; }
#mapWrap { position: absolute; }
#map { width: 100%; height: 100%; }
#dot {
  position: absolute; z-index: 500;
  width: 22px; height: 22px; border-radius: 50%;
  background: #b04020; border: 3px solid #fff;
  box-shadow: 0 2px 10px rgba(0,0,0,.4);
  transform: translate(-50%, -50%);
  pointer-events: none;
}
#dbg {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  z-index: 999; background: rgba(0,0,0,.7); color: #fff;
  font: 13px monospace; padding: 7px 14px; border-radius: 20px;
  white-space: nowrap;
}
#calBtn {
  position: fixed; bottom: 12px; right: 12px; z-index: 999;
  width: 44px; height: 44px; border-radius: 50%; border: 2px solid rgba(255,255,255,.3);
  background: rgba(0,0,0,.6); color: #fff;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
#calBtn.on { background: #3d7a4a; border-color: #3d7a4a; }
</style>
</head>
<body>
<div id="clip">
  <div id="mapWrap">
    <div id="map"></div>
  </div>
  <div id="dot"></div>
</div>
<div id="dbg">start…</div>
<input type="file" id="calFile" accept=".json" style="display:none" onchange="importCal(this)"/>
<button id="calBtn" onclick="toggleCal()" ontouchstart="ts()" ontouchend="te()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
</button>

<script>
var W = window.innerWidth, H = window.innerHeight;
var AX = W / 2;
var AY = H - 100;
var DIAG = Math.ceil(Math.sqrt(W*W + H*H) * 1.5);

// Size and position mapWrap BEFORE Leaflet init
var mw = document.getElementById('mapWrap');
mw.style.width  = DIAG + 'px';
mw.style.height = DIAG + 'px';
mw.style.left   = (AX - DIAG/2) + 'px';
mw.style.top    = (AY - DIAG/2) + 'px';
mw.style.transformOrigin = '50% 50%';

// Position dot
var dot = document.getElementById('dot');
dot.style.left = AX + 'px';
dot.style.top  = AY + 'px';

dbg('Leaflet init…');

// Init map
var map = L.map('map', { zoomControl: false, attributionControl: false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 20, keepBuffer: 4
}).addTo(map);
map.setView([50.083, 14.42], 16);
setTimeout(function(){ map.invalidateSize(); dbg('map ready'); }, 300);
setTimeout(function(){ map.invalidateSize(); }, 800);

// Target from URL
var p = new URLSearchParams(location.search);
var tlat = parseFloat(p.get('lat')), tlng = parseFloat(p.get('lng'));
var tnum = p.get('num') || p.get('id') || '';
if (!isNaN(tlat)) {
  map.setView([tlat, tlng], 16);
  var icon = L.divIcon({
    html: '<div style="width:32px;height:32px;border-radius:50%;background:#1a1a18;border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font:bold 10px monospace">' + tnum + '</div>',
    className: '', iconSize: [32,32], iconAnchor: [16,16]
  });
  L.marker([tlat, tlng], { icon: icon }).addTo(map);
}

// Calibration
var yawOff = 0, calOn = false;
function loadCal() {
  try {
    var off = localStorage.getItem('lop_cal_disabled') === '1';
    var c = JSON.parse(localStorage.getItem('lop_sensor_calibration') || 'null');
    if (c && c.offsets && !off) { yawOff = c.offsets.yaw || 0; calOn = true; }
    else { yawOff = 0; calOn = false; }
  } catch(e) { yawOff = 0; calOn = false; }
  document.getElementById('calBtn').className = calOn ? 'on' : '';
}
function toggleCal() {
  var off = localStorage.getItem('lop_cal_disabled') === '1';
  if (off) localStorage.removeItem('lop_cal_disabled');
  else localStorage.setItem('lop_cal_disabled', '1');
  loadCal();
}
function importCal(inp) {
  var f = inp.files[0]; if (!f) return;
  var r = new FileReader();
  r.onload = function(e) {
    try {
      var c = JSON.parse(e.target.result);
      localStorage.setItem('lop_sensor_calibration', JSON.stringify(c));
      localStorage.removeItem('lop_cal_disabled');
      loadCal();
    } catch(ex) { alert('Chyba: ' + ex.message); }
    inp.value = '';
  };
  r.readAsText(f);
}
var lt = null;
function ts() { lt = setTimeout(function(){ lt = null; document.getElementById('calFile').click(); }, 700); }
function te() { if (lt) { clearTimeout(lt); lt = null; } }
loadCal();

// GPS
var pos = null;
navigator.geolocation && navigator.geolocation.watchPosition(
  function(p) {
    pos = { lat: p.coords.latitude, lng: p.coords.longitude };
    map.setView([pos.lat, pos.lng], map.getZoom(), { animate: false });
  },
  function(e) { dbg('GPS err ' + e.code); },
  { enableHighAccuracy: true, maximumAge: 2000 }
);

// Orientation
var heading = null, lastH = 0, LP = 0.12;
function lerp(c, t) {
  if (c === null) return t;
  var d = t - c; if (d > 180) d -= 360; if (d < -180) d += 360;
  return (c + LP * d + 360) % 360;
}
function oriHandler(e) {
  var raw = null;
  if (e.webkitCompassHeading !== undefined) raw = e.webkitCompassHeading;
  else if (e.alpha !== null) raw = (360 - e.alpha) % 360;
  if (raw !== null) heading = lerp(heading, (raw - yawOff + 360) % 360);
}
if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
  document.addEventListener('touchstart', function once() {
    DeviceOrientationEvent.requestPermission().then(function(s){ if (s === 'granted') { window.addEventListener('deviceorientationabsolute', oriHandler, true); window.addEventListener('deviceorientation', oriHandler, true); } }).catch(function(){ window.addEventListener('deviceorientation', oriHandler, true); });
    document.removeEventListener('touchstart', once);
  }, { once: true });
} else {
  window.addEventListener('deviceorientationabsolute', oriHandler, true);
  window.addEventListener('deviceorientation', oriHandler, true);
}

// Rotate
function rotate(h) {
  mw.style.transform = 'rotate(' + (-h) + 'deg)';
  lastH = h;
}

// Loop
function loop() {
  var h = heading !== null ? heading : 0;
  if (Math.abs(lastH - h) > 0.3) rotate(h);
  dbg((pos ? 'GPS ✓' : 'GPS čeká') + ' | ' + Math.round(h) + '° | kal:' + (calOn ? yawOff.toFixed(1) : 'off'));
  requestAnimationFrame(loop);
}
loop();

function dbg(t) { document.getElementById('dbg').textContent = t; }
</script>
</body>
</html>
