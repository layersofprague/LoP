<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kompas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; }
#cpMap { position: fixed; inset: 0; z-index: 1; }

#topBar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 20;
  display: flex; align-items: center; gap: 10px; padding: 12px 16px;
  background: linear-gradient(180deg, rgba(20,18,14,.6) 0%, transparent 100%);
  pointer-events: none;
}
#cpBack {
  pointer-events: all;
  height: 34px; padding: 0 12px; border-radius: 17px;
  background: rgba(0,0,0,.45); border: 1px solid rgba(255,255,255,.2);
  color: white; font-size: 13px; font-family: inherit; cursor: pointer; flex-shrink: 0;
}
#cpName { font-size: 14px; font-weight: 500; color: white; text-shadow: 0 1px 4px rgba(0,0,0,.6); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#miniCompass {
  position: fixed; bottom: 110px; right: 16px; z-index: 20;
  width: 72px; height: 72px;
}
#roseEl  { position: absolute; inset: 0; transition: transform .3s ease-out; }
#arrowEl { position: absolute; inset: 0; transition: transform .2s ease-out; }

#distBox {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 20;
  background: rgba(0,0,0,.5); border-radius: 14px; padding: 10px 28px; text-align: center;
}
#distVal  { font-size: 38px; font-weight: 700; color: white; line-height: 1; letter-spacing: -.02em; }
#distUnit { font-size: 15px; color: rgba(255,255,255,.5); }
#distSteps { font-size: 11px; color: rgba(255,255,255,.35); margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }

#cpStatus {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 20;
  font-size: 13px; color: rgba(255,255,255,.7); text-shadow: 0 1px 4px rgba(0,0,0,.5);
  text-align: center; pointer-events: none; background: rgba(0,0,0,.3);
  padding: 8px 16px; border-radius: 8px;
}
#cpStatus:empty { display: none; }

#cpProximity {
  display: none; position: fixed; bottom: 32px; left: 20px; right: 20px; z-index: 30;
  background: #b8922a; color: white; border: none; border-radius: 12px;
  padding: 16px 20px; text-align: center; font-size: 14px; font-weight: 500;
  font-family: inherit; cursor: pointer;
}
</style>
</head>
<body>

<div id="cpMap"></div>

<div id="topBar">
  <button id="cpBack">← Zpět</button>
  <div id="cpName">—</div>
</div>

<div id="miniCompass">
  <svg id="roseEl" viewBox="0 0 72 72">
    <circle cx="36" cy="36" r="34" fill="rgba(0,0,0,.45)" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
    <line x1="36" y1="3"  x2="36" y2="11" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>
    <line x1="36" y1="61" x2="36" y2="69" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
    <line x1="3"  y1="36" x2="11" y2="36" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
    <line x1="61" y1="36" x2="69" y2="36" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
    <text x="36" y="18" text-anchor="middle" fill="#e05a5a"            font-size="9" font-weight="700" font-family="DM Sans,sans-serif">N</text>
    <text x="36" y="65" text-anchor="middle" fill="rgba(255,255,255,.4)" font-size="8" font-family="DM Sans,sans-serif">S</text>
    <text x="65" y="39" text-anchor="middle" fill="rgba(255,255,255,.4)" font-size="8" font-family="DM Sans,sans-serif">E</text>
    <text x="7"  y="39" text-anchor="middle" fill="rgba(255,255,255,.4)" font-size="8" font-family="DM Sans,sans-serif">W</text>
  </svg>
  <div id="arrowEl">
    <svg viewBox="0 0 72 72" width="72" height="72">
      <polygon points="36,9 40,38 36,33 32,38"  fill="#b8922a"/>
      <polygon points="36,63 40,34 36,39 32,34" fill="rgba(184,146,42,.2)"/>
      <circle cx="36" cy="36" r="3" fill="white" opacity=".6"/>
    </svg>
  </div>
</div>

<div id="distBox">
  <div><span id="distVal">—</span><span id="distUnit"></span></div>
  <div id="distSteps"></div>
</div>
<div id="cpStatus">Čeká na GPS…</div>
<button id="cpProximity" onclick="goToTarget()">Jsi na místě! Otevřít Steps into the Past →</button>

<script>
// ── PARAMETRY ──
const params = new URLSearchParams(location.search);
const TARGET = {
  id:  params.get('id'),
  lat: parseFloat(params.get('lat')),
  lng: parseFloat(params.get('lng')),
  name: params.get('name') || '—'
};
document.getElementById('cpName').textContent = TARGET.name;
document.getElementById('cpBack').addEventListener('click', () => history.back());

// ── MAPA — centrovaná na CÍL, nehýbe se ──
const map = L.map('cpMap', {
  zoomControl: false, attributionControl: false,
  dragging: false, scrollWheelZoom: false,
  touchZoom: false, doubleClickZoom: false,
  // Zakázat všechny interakce
  keyboard: false, boxZoom: false
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 20
}).addTo(map);

// Mapa je pevně centrovaná na CÍL — nikdy se nepohybuje
map.setView([TARGET.lat, TARGET.lng], 17);
requestAnimationFrame(() => {
  map.invalidateSize();
  // Wrapper vytvoříme až po prvním renderu
  setTimeout(ensureWrapper, 200);
});

// Rotace — obalíme .leaflet-map-pane do wrapperu a točíme wrapperem
// .leaflet-map-pane je jediný child .leaflet-container který drží všechny pane
let rotWrapper = null;
function ensureWrapper() {
  if (rotWrapper) return;
  const container = map.getContainer();
  const mapPane = container.querySelector('.leaflet-map-pane');
  if (!mapPane) return;
  // Vytvoř wrapper div
  rotWrapper = document.createElement('div');
  rotWrapper.style.cssText = 'position:absolute;inset:0;transform-origin:50% 50%;transition:transform 0.25s ease-out;';
  mapPane.parentNode.insertBefore(rotWrapper, mapPane);
  rotWrapper.appendChild(mapPane);
}

function applyMapRotation(deg) {
  ensureWrapper();
  if (rotWrapper) rotWrapper.style.transform = `rotate(${deg}deg)`;
}
const tIcon = L.divIcon({
  html:`<div style="width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:#6b7280;border:2px solid white;box-shadow:0 0 0 3px #b8922a,0 2px 12px rgba(184,146,42,.5);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:11px;font-weight:700;color:white">H</span></div>`,
  className:'', iconSize:[34,34], iconAnchor:[17,34]
});
L.marker([TARGET.lat, TARGET.lng], {icon:tIcon}).addTo(map);

// Marker uživatele
let userMarker = null;

// ── SENZORY ──
let userPos = null;
let smoothH = null;
const LP = 0.1;

function lerpAngle(c, t) {
  if (c === null) return t;
  let d = t - c;
  if (d >  180) d -= 360;
  if (d < -180) d += 360;
  return (c + LP * d + 360) % 360;
}

// GPS
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    // Aktualizuj marker — pozice relativní k cíli
    const ll = L.latLng(userPos.lat, userPos.lng);
    if (userMarker) {
      userMarker.setLatLng(ll);
    } else {
      userMarker = L.circleMarker(ll, {
        radius: 9, color: '#2a6e5e', fillColor: '#2a6e5e',
        fillOpacity: .9, weight: 2
      }).addTo(map);
    }
    update();
  }, () => {
    document.getElementById('cpStatus').textContent = 'GPS nedostupná — povol přístup k poloze.';
  }, { enableHighAccuracy: true, maximumAge: 1500 });
}

// Orientace
function startOri() {
  const handler = e => {
    let deg = null;
    if      (e.webkitCompassHeading !== undefined) deg = e.webkitCompassHeading;
    else if (e.absolute && e.alpha !== null)        deg = (360 - e.alpha) % 360;
    else if (e.alpha !== null)                      deg = (360 - e.alpha) % 360;
    if (deg !== null) { smoothH = lerpAngle(smoothH, deg); update(); }
  };
  window.addEventListener('deviceorientationabsolute', handler, true);
  window.addEventListener('deviceorientation',         handler, true);
}
if (typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission === 'function') {
  DeviceOrientationEvent.requestPermission()
    .then(s => { if (s === 'granted') startOri(); })
    .catch(() => startOri());
} else {
  startOri();
}

// ── VÝPOČTY ──
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function calcBearing(a, b) {
  const dL = toRad(b.lng - a.lng);
  const y  = Math.sin(dL) * Math.cos(toRad(b.lat));
  const x  = Math.cos(toRad(a.lat)) * Math.sin(toRad(b.lat))
            - Math.sin(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.cos(dL);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function calcDist(a, b) {
  const R = 6371000;
  const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
  const aa = Math.sin(dLat/2)**2
           + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(aa), Math.sqrt(1 - aa));
}

// ── UPDATE ──
function update() {
  if (!userPos) return;

  const dist = calcDist(userPos, TARGET);
  const bear = calcBearing(userPos, TARGET);
  const h    = smoothH !== null ? smoothH : 0;

  // Vzdálenost
  if (dist < 1000) {
    document.getElementById('distVal').textContent  = Math.round(dist);
    document.getElementById('distUnit').textContent = ' m';
  } else {
    document.getElementById('distVal').textContent  = (dist/1000).toFixed(1).replace('.',',');
    document.getElementById('distUnit').textContent = ' km';
  }
  const steps = Math.round(dist / 0.75);
  document.getElementById('distSteps').textContent =
    steps < 10000 ? `≈ ${steps.toLocaleString('cs')} kroků` : '';

  // Mapa se otáčí s headingem — to co je před tebou je nahoře
  applyMapRotation(-h);

  // Růžice kompenzuje rotaci mapy → sever zůstane nahoře
  document.getElementById('roseEl').style.transform  = `rotate(${h}deg)`;

  // Šipka ukazuje relativní směr k cíli
  document.getElementById('arrowEl').style.transform = `rotate(${bear - h}deg)`;

  document.getElementById('cpStatus').textContent = '';

  if (dist <= 25) document.getElementById('cpProximity').style.display = 'block';
}

function goToTarget() {
  window.location.href = `step-into-the-past.html?id=${TARGET.id}&lat=${TARGET.lat}&lng=${TARGET.lng}`;
}
</script>
</body>
</html>
