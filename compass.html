<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Kompas · LoP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#eeefeb;--paper-2:#e6e7e2;--paper-3:#dadcd4;
  --ink:#1a1a18;--ink-2:#3a3a36;--ink-3:#6a6a64;--ink-4:#9a9a94;
  --rule:#cbcec5;--accent:#b04020;--ok:#3d7a4a;--gold:#b8922a;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--paper);color:var(--ink);font-family:'JetBrains Mono',monospace;-webkit-font-smoothing:antialiased}
#app{position:fixed;inset:0;display:flex;flex-direction:column}
#topBar{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--paper);border-bottom:1px solid var(--rule);z-index:20}
#cpBack{flex-shrink:0;height:32px;padding:0 12px;border-radius:16px;background:var(--paper-2);border:1px solid var(--rule);color:var(--ink-2);font-size:12px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px}
#cpName{flex:1;font-family:'Fraunces',serif;font-size:16px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#calBadge{flex-shrink:0;cursor:pointer;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:4px 8px;border-radius:10px;border:1px solid var(--rule);color:var(--ink-4);display:flex;align-items:center;gap:4px;white-space:nowrap}
#calBadge.ok{color:var(--ok);border-color:rgba(61,122,74,.4);background:rgba(61,122,74,.06)}
#mapSection{flex:0 0 38%;position:relative;border-bottom:1px solid var(--rule);overflow:hidden;transition:flex-basis .3s ease}
#mapSection.hidden{flex-basis:0!important;border-bottom:none}
#cpMap{width:100%;height:100%}
#mapToggle{flex:0 0 auto;height:24px;display:flex;align-items:center;justify-content:center;background:var(--paper-2);border-bottom:1px solid var(--rule);cursor:pointer;color:var(--ink-3)}
#mapToggle svg{width:14px;height:14px;transition:transform .3s}
#mapToggle.mapHidden svg{transform:rotate(180deg)}
#panel{flex:1 1 0;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;padding:10px 20px 16px;overflow:hidden;min-height:0}
#compassCanvas{display:block;width:min(240px,70vw);height:min(240px,70vw);flex-shrink:0}
#distRow{display:flex;align-items:baseline;gap:6px;flex-shrink:0}
#distVal{font-family:'Fraunces',serif;font-size:44px;font-weight:400;line-height:1;letter-spacing:-.02em;color:var(--ink)}
#distUnit{font-size:15px;color:var(--ink-3)}
#distSteps{font-size:10px;color:var(--ink-4);letter-spacing:.06em}
#statusRow{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-4);flex-shrink:0}
#statusDot{width:6px;height:6px;border-radius:50%;background:var(--ink-4);flex-shrink:0}
#statusDot.gps{background:var(--ok)}
#statusDot.warn{background:var(--accent)}
#proximityBtn{display:none;width:100%;padding:14px;border-radius:10px;border:none;background:var(--ink);color:var(--paper);font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;flex-shrink:0}
#calMenu{display:none;position:fixed;top:52px;right:0;z-index:50;width:min(280px,100vw);background:var(--paper);border:1px solid var(--rule);border-top:none;border-radius:0 0 0 12px;box-shadow:0 8px 24px rgba(26,24,20,.12);padding:12px}
#calMenu .cm-title{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-4);margin-bottom:8px}
#calMenuStatus{padding:9px 10px;border-radius:8px;font-size:11px;background:var(--paper-2);border:1px solid var(--rule);color:var(--ink-2);margin-bottom:8px;line-height:1.5}
.cm-btn{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--rule);background:var(--paper-2);color:var(--ink-2);font-family:inherit;font-size:11px;font-weight:500;text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cm-btn:last-child{margin-bottom:0}
.cm-btn svg{width:13px;height:13px;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div id="topBar">
    <button id="cpBack" onclick="history.back()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 6-6 6 6 6"/></svg>
      Zpět
    </button>
    <div id="cpName">—</div>
    <div id="calBadge" onclick="toggleCalMenu()">
      <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
      <span id="calBadgeTxt">kal</span>
    </div>
  </div>
  <div id="mapSection"><div id="cpMap"></div></div>
  <div id="mapToggle" onclick="toggleMap()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </div>
  <div id="panel">
    <canvas id="compassCanvas" width="480" height="480"></canvas>
    <div id="distRow">
      <span id="distVal">—</span>
      <span id="distUnit"></span>
      <span id="distSteps"></span>
    </div>
    <div id="statusRow">
      <span id="statusDot"></span>
      <span id="statusTxt">Čeká na GPS…</span>
    </div>
    <button id="proximityBtn" onclick="goToTarget()">Jsi na místě — otevřít AR →</button>
  </div>
</div>

<input type="file" id="calFileInput" accept=".json" style="display:none" onchange="loadCalFromFile(this)"/>
<div id="calMenu">
  <div class="cm-title">Kalibrace kompasu</div>
  <div id="calMenuStatus">—</div>
  <button class="cm-btn" onclick="document.getElementById('calFileInput').click();toggleCalMenu()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Načíst ze souboru (.json)
  </button>
  <button class="cm-btn" onclick="loadFromGitHub()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    Admin: načíst z webu
  </button>
  <button class="cm-btn" id="calToggleBtn" onclick="toggleCalCorrection()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="calToggleTxt">Vypnout korekci</span>
  </button>
</div>

<script>
const params = new URLSearchParams(location.search);
const TARGET = {
  id:   params.get('id'),
  num:  params.get('num') || params.get('id') || '?',
  lat:  parseFloat(params.get('lat')),
  lng:  parseFloat(params.get('lng')),
  name: params.get('name') || '—'
};
document.getElementById('cpName').textContent = TARGET.name;

const CAL_REMOTE_URL = 'https://raw.githubusercontent.com/layersofprague/LoP/main/vysledky_kalibrace.json';
let yawOffset = 0;

function getCal() {
  try { return JSON.parse(localStorage.getItem('lop_sensor_calibration') || 'null'); } catch(e) { return null; }
}
function loadCalibration() {
  const badge = document.getElementById('calBadge');
  const txt = document.getElementById('calBadgeTxt');
  const disabled = localStorage.getItem('lop_sensor_calibration_disabled') === '1';
  const cal = getCal();
  if (cal && !disabled) {
    yawOffset = cal.offsets && cal.offsets.yaw ? cal.offsets.yaw : 0;
    badge.classList.add('ok');
    txt.textContent = (cal.quality && cal.quality.yawConsistency)
      ? cal.quality.yawConsistency
      : new Date(cal.savedAt).toLocaleDateString('cs-CZ');
  } else if (cal && disabled) {
    yawOffset = 0; badge.classList.remove('ok'); txt.textContent = 'vypnuto';
  } else {
    yawOffset = 0; badge.classList.remove('ok'); txt.textContent = 'nekalibrováno';
  }
}
function applyAndSave(cal) {
  localStorage.setItem('lop_sensor_calibration', JSON.stringify(cal));
  localStorage.removeItem('lop_sensor_calibration_disabled');
  loadCalibration(); updateCalMenuStatus();
}
function loadCalFromFile(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try { applyAndSave(JSON.parse(ev.target.result)); } catch(e) { alert('Chyba: ' + e.message); }
    input.value = '';
  };
  reader.readAsText(file);
}
function loadFromGitHub() {
  if (!confirm('Načíst kalibraci z webu?\n\n' + CAL_REMOTE_URL)) return;
  document.getElementById('calBadgeTxt').textContent = '…';
  fetch(CAL_REMOTE_URL + '?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(cal => { applyAndSave(cal); document.getElementById('calMenu').style.display = 'none'; })
    .catch(e => { alert('Chyba: ' + e.message); loadCalibration(); });
}
function toggleCalCorrection() {
  const disabled = localStorage.getItem('lop_sensor_calibration_disabled') === '1';
  if (disabled) localStorage.removeItem('lop_sensor_calibration_disabled');
  else localStorage.setItem('lop_sensor_calibration_disabled', '1');
  loadCalibration(); updateCalMenuStatus();
}
function toggleCalMenu() {
  const m = document.getElementById('calMenu');
  const open = m.style.display === 'block';
  m.style.display = open ? 'none' : 'block';
  if (!open) {
    updateCalMenuStatus();
    setTimeout(() => document.addEventListener('click', function h(e) {
      if (!m.contains(e.target) && !document.getElementById('calBadge').contains(e.target)) {
        m.style.display = 'none';
      }
      document.removeEventListener('click', h);
    }), 50);
  }
}
function updateCalMenuStatus() {
  const disabled = localStorage.getItem('lop_sensor_calibration_disabled') === '1';
  const cal = getCal();
  const el = document.getElementById('calMenuStatus');
  const toggleTxt = document.getElementById('calToggleTxt');
  const toggleBtn = document.getElementById('calToggleBtn');
  if (!cal) {
    el.textContent = 'Žádná kalibrace v paměti.';
    toggleBtn.style.display = 'none';
  } else if (disabled) {
    el.innerHTML = '<span style="color:var(--accent)">Korekce vypnuta</span><br><small style="color:var(--ink-4)">yaw ' + (cal.offsets.yaw || 0).toFixed(1) + '°</small>';
    toggleTxt.textContent = 'Zapnout korekci';
    toggleBtn.style.display = 'flex'; toggleBtn.style.color = 'var(--ok)';
  } else {
    const c = cal.quality && cal.quality.yawConsistency ? cal.quality.yawConsistency : '';
    el.innerHTML = '<span style="color:var(--ok)">Aktivní</span> — yaw ' + ((cal.offsets.yaw || 0) > 0 ? '+' : '') + (cal.offsets.yaw || 0).toFixed(1) + '°' + (c ? '<br><small style="color:var(--ink-4)">' + c + '</small>' : '');
    toggleTxt.textContent = 'Vypnout korekci';
    toggleBtn.style.display = 'flex'; toggleBtn.style.color = 'var(--ink-2)';
  }
}

// MAP
let map, userMarker = null, mapVisible = true;
function initMap() {
  map = L.map('cpMap', { zoomControl: false, attributionControl: false, touchZoom: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { subdomains: 'abcd', maxZoom: 20 }).addTo(map);
  if (!isNaN(TARGET.lat) && !isNaN(TARGET.lng)) {
    const n = String(TARGET.num), m = n.match(/^([A-Z]+)(\d+)$/);
    const html = m
      ? '<div style="width:34px;height:34px;border-radius:50%;background:#1a1a18;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:JetBrains Mono,monospace;color:#eeefeb"><span style="font-size:11px;font-weight:700;line-height:1">' + m[1] + '</span><span style="font-size:7px;opacity:.8;line-height:1">' + m[2] + '</span></div>'
      : '<div style="width:34px;height:34px;border-radius:50%;background:#1a1a18;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono,monospace;font-size:9px;font-weight:700;color:#eeefeb">' + n + '</div>';
    L.marker([TARGET.lat, TARGET.lng], { icon: L.divIcon({ html, className: '', iconSize: [34,34], iconAnchor: [17,17] }) }).addTo(map);
    map.setView([TARGET.lat, TARGET.lng], 17);
  }
  setTimeout(() => map.invalidateSize(), 150);
}
function toggleMap() {
  mapVisible = !mapVisible;
  document.getElementById('mapSection').classList.toggle('hidden', !mapVisible);
  document.getElementById('mapToggle').classList.toggle('mapHidden', !mapVisible);
  setTimeout(() => map && map.invalidateSize(), 320);
}

// SENSORS
let userPos = null, smoothH = null;
const LP = 0.12;
function lerpAngle(c, t) {
  if (c === null) return t;
  let d = t - c; if (d > 180) d -= 360; if (d < -180) d += 360;
  return (c + LP * d + 360) % 360;
}
navigator.geolocation && navigator.geolocation.watchPosition(
  pos => {
    userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    if (map) {
      if (userMarker) userMarker.setLatLng([userPos.lat, userPos.lng]);
      else userMarker = L.circleMarker([userPos.lat, userPos.lng], { radius: 8, color: '#fff', fillColor: '#b04020', fillOpacity: .95, weight: 2 }).addTo(map);
    }
    setStatus('gps', 'GPS aktivní');
    updateDist();
  },
  err => {
    const m = { 1: 'Poloha blokována — povol v adresním řádku', 2: 'Polohu nelze určit', 3: 'Vypršel časový limit' };
    setStatus('warn', m[err.code] || 'GPS nedostupná');
  },
  { enableHighAccuracy: true, maximumAge: 1500 }
);
function startOrientation() {
  const h = e => {
    let raw = null;
    if (e.webkitCompassHeading !== undefined) raw = e.webkitCompassHeading;
    else if (e.alpha !== null) raw = (360 - e.alpha) % 360;
    if (raw !== null) smoothH = lerpAngle(smoothH, (raw - yawOffset + 360) % 360);
  };
  window.addEventListener('deviceorientationabsolute', h, true);
  window.addEventListener('deviceorientation', h, true);
}
if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
  document.addEventListener('touchstart', function u() {
    DeviceOrientationEvent.requestPermission().then(s => { if (s === 'granted') startOrientation(); }).catch(() => startOrientation());
    document.removeEventListener('touchstart', u);
  }, { once: true });
} else { startOrientation(); }

// MATH
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }
function calcBearing(a, b) {
  const dL = toRad(b.lng - a.lng);
  const y = Math.sin(dL) * Math.cos(toRad(b.lat));
  const x = Math.cos(toRad(a.lat)) * Math.sin(toRad(b.lat)) - Math.sin(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.cos(dL);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}
function calcDist(a, b) {
  const R = 6371000, dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
  const h = Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1-h));
}

// COMPASS DRAWING
const canvas = document.getElementById('compassCanvas');
const ctx = canvas.getContext('2d');
const S = 480;
function drawCompass(heading, bearing, hasFix) {
  ctx.clearRect(0, 0, S, S);
  const cx = S/2, cy = S/2, R = S/2 - 14;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.strokeStyle = '#cbcec5'; ctx.lineWidth = 2; ctx.stroke();
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-heading * Math.PI / 180);
  for (let i = 0; i < 72; i++) {
    const a = i * 5 * Math.PI / 180, big = i % 9 === 0, mid = i % 3 === 0;
    const r1 = big ? R-22 : mid ? R-14 : R-9;
    ctx.beginPath();
    ctx.moveTo(Math.sin(a)*r1, -Math.cos(a)*r1);
    ctx.lineTo(Math.sin(a)*R, -Math.cos(a)*R);
    ctx.strokeStyle = big ? '#6a6a64' : mid ? '#b8bcb0' : '#dadcd4';
    ctx.lineWidth = big ? 2 : 1; ctx.stroke();
  }
  [['N',0,'#b04020',24],['E',90,'#6a6a64',18],['S',180,'#6a6a64',18],['W',270,'#6a6a64',18]].forEach(([l,d,col,sz]) => {
    const a = d*Math.PI/180, r = R-36;
    ctx.fillStyle = col; ctx.font = '600 ' + sz + 'px JetBrains Mono';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(l, Math.sin(a)*r, -Math.cos(a)*r);
  });
  ctx.restore();
  if (hasFix && !isNaN(bearing)) {
    const ra = (bearing - heading) * Math.PI / 180;
    const aR = R * .54;
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(ra);
    const g = ctx.createLinearGradient(0, -aR, 0, aR*.3);
    g.addColorStop(0, '#1a1a18'); g.addColorStop(1, 'rgba(26,26,24,0)');
    ctx.beginPath();
    ctx.moveTo(0, -aR);
    ctx.lineTo(9, -aR*.5); ctx.lineTo(4, -aR*.5);
    ctx.lineTo(4, aR*.3); ctx.lineTo(-4, aR*.3);
    ctx.lineTo(-4, -aR*.5); ctx.lineTo(-9, -aR*.5);
    ctx.closePath(); ctx.fillStyle = g; ctx.fill(); ctx.restore();
  }
  ctx.beginPath(); ctx.arc(cx, cy, R*.6, 0, Math.PI*2);
  ctx.strokeStyle = '#e6e7e2'; ctx.lineWidth = 1; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = '#cbcec5'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI*2);
  ctx.fillStyle = hasFix ? '#1a1a18' : '#cbcec5'; ctx.fill();
  ctx.fillStyle = '#1a1a18'; ctx.font = '600 20px JetBrains Mono';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(Math.round(heading) + '°', cx, 22);
  if (hasFix) {
    ctx.fillStyle = '#9a9a94'; ctx.font = '400 13px JetBrains Mono';
    ctx.fillText('cíl ' + Math.round(bearing) + '°', cx, 44);
  }
}
function updateDist() {
  if (!userPos || isNaN(TARGET.lat)) return;
  const dist = calcDist(userPos, TARGET);
  if (dist < 1000) {
    document.getElementById('distVal').textContent = Math.round(dist);
    document.getElementById('distUnit').textContent = 'm';
  } else {
    document.getElementById('distVal').textContent = (dist/1000).toFixed(1).replace('.', ',');
    document.getElementById('distUnit').textContent = 'km';
  }
  const steps = Math.round(dist / 0.75);
  document.getElementById('distSteps').textContent = steps < 9999 ? '≈ ' + steps.toLocaleString('cs') + ' kroků' : '';
  if (dist <= 25) document.getElementById('proximityBtn').style.display = 'block';
}
function setStatus(type, txt) {
  document.getElementById('statusDot').className = type;
  document.getElementById('statusTxt').textContent = txt;
}
function goToTarget() {
  location.href = 'step-into-the-past.html?id=' + TARGET.id + '&lat=' + TARGET.lat + '&lng=' + TARGET.lng;
}

// LOOP
function loop() {
  const h = smoothH !== null ? smoothH : 0;
  const hasFix = userPos !== null && !isNaN(TARGET.lat);
  drawCompass(h, hasFix ? calcBearing(userPos, TARGET) : 0, hasFix);
  requestAnimationFrame(loop);
}

window.addEventListener('load', () => {
  loadCalibration();
  initMap();
  loop();
});
</script>
</body>
</html>
