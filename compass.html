<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kompas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: #e8e4dc; }

/* ── MAPA — plná obrazovka ── */
#cpMap {
  position: fixed; inset: 0;
  z-index: 1;
  /* Leaflet mapu otáčíme přes JS — potřebujeme větší kontejner aby nebyly vidět okraje */
  /* Otáčení bude na #mapWrap */
}
#mapWrap {
  position: fixed;
  top: -25%; left: -25%;
  width: 150%; height: 150%;
  z-index: 1;
  transition: transform 0.3s ease-out;
  transform-origin: 33.33% 33.33%; /* střed původní obrazovky */
}

/* ── HORNÍ LIŠTA ── */
#topBar {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 20;
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: linear-gradient(180deg, rgba(20,18,14,.65) 0%, transparent 100%);
  pointer-events: none;
}
#cpBack {
  pointer-events: all;
  height: 34px; padding: 0 12px; border-radius: 17px;
  background: rgba(0,0,0,.45); border: 1px solid rgba(255,255,255,.2);
  color: white; font-size: 13px; font-family: inherit;
  cursor: pointer; flex-shrink: 0;
  transition: background .2s;
}
#cpBack:hover { background: rgba(0,0,0,.7); }
#cpName {
  font-size: 14px; font-weight: 500; color: white;
  text-shadow: 0 1px 4px rgba(0,0,0,.6);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── MALÝ KOMPAS — pravý dolní roh ── */
#miniCompass {
  position: fixed;
  bottom: 100px; right: 16px;
  z-index: 20;
  width: 72px; height: 72px;
}
#miniCompass svg { width: 100%; height: 100%; }
/* Šipka k cíli */
#arrowEl {
  position: absolute; inset: 0;
  transition: transform 0.2s ease-out;
}

/* ── VZDÁLENOST ── */
#distBox {
  position: fixed;
  bottom: 32px; left: 50%; transform: translateX(-50%);
  z-index: 20;
  background: rgba(0,0,0,.5);
  border-radius: 14px; padding: 10px 24px;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
#distVal {
  font-size: 36px; font-weight: 700; color: white; line-height: 1;
  letter-spacing: -.02em;
}
#distUnit { font-size: 14px; color: rgba(255,255,255,.5); }
#distSteps { font-size: 11px; color: rgba(255,255,255,.35); margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }

/* ── STATUS ── */
#cpStatus {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 20; font-size: 13px; color: rgba(255,255,255,.6);
  text-shadow: 0 1px 4px rgba(0,0,0,.5); text-align: center;
  pointer-events: none;
}

/* ── PROXIMITY ── */
#cpProximity {
  display: none;
  position: fixed; bottom: 32px; left: 20px; right: 20px;
  z-index: 30;
  background: #b8922a; color: white; border: none;
  border-radius: 12px; padding: 16px 20px;
  text-align: center; font-size: 14px; font-weight: 500;
  font-family: inherit; cursor: pointer;
}
</style>
</head>
<body>

<div id="mapWrap"><div id="cpMap"></div></div>

<div id="topBar">
  <button id="cpBack">← Zpět</button>
  <div id="cpName">—</div>
</div>

<!-- Malý kompas v rohu: růžice + šipka k cíli -->
<div id="miniCompass">
  <!-- Růžice — otáčí se s mapou (drží sever) -->
  <svg id="roseEl" viewBox="0 0 72 72" style="position:absolute;inset:0;transition:transform .25s ease-out">
    <circle cx="36" cy="36" r="34" fill="rgba(0,0,0,.4)" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
    <circle cx="36" cy="36" r="22" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
    <!-- Čárky -->
    <line x1="36" y1="3" x2="36" y2="10" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>
    <line x1="36" y1="62" x2="36" y2="69" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
    <line x1="3" y1="36" x2="10" y2="36" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
    <line x1="62" y1="36" x2="69" y2="36" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
    <!-- N -->
    <text x="36" y="17" text-anchor="middle" fill="#e05a5a" font-size="9" font-weight="700" font-family="DM Sans,sans-serif">N</text>
    <text x="36" y="65" text-anchor="middle" fill="rgba(255,255,255,.4)" font-size="8" font-family="DM Sans,sans-serif">S</text>
    <text x="66" y="39" text-anchor="middle" fill="rgba(255,255,255,.4)" font-size="8" font-family="DM Sans,sans-serif">E</text>
    <text x="6" y="39" text-anchor="middle" fill="rgba(255,255,255,.4)" font-size="8" font-family="DM Sans,sans-serif">W</text>
  </svg>
  <!-- Šipka k cíli — otáčí se relativně -->
  <div id="arrowEl">
    <svg viewBox="0 0 72 72" width="72" height="72">
      <polygon points="36,10 40,38 36,34 32,38" fill="#b8922a" opacity=".95"/>
      <polygon points="36,62 40,34 36,38 32,34" fill="rgba(184,146,42,.25)"/>
      <circle cx="36" cy="36" r="3" fill="white" opacity=".7"/>
    </svg>
  </div>
</div>

<div id="distBox">
  <div><span id="distVal">—</span><span id="distUnit"></span></div>
  <div id="distSteps"></div>
</div>

<div id="cpStatus">Čeká na GPS…</div>
<button id="cpProximity" onclick="goToTarget()">Jsi na místě! Otevřít Steps into the Past →</button>

<script>
// ── PARAMETRY ──
const params = new URLSearchParams(location.search);
const TARGET = {
  id:   params.get('id'),
  lat:  parseFloat(params.get('lat')),
  lng:  parseFloat(params.get('lng')),
  name: params.get('name') || '—'
};
document.getElementById('cpName').textContent = TARGET.name;
document.getElementById('cpBack').addEventListener('click', () => history.back());

// ── MAPA ──
const map = L.map('cpMap', {
  zoomControl: true,
  attributionControl: false,
  dragging: false,
  scrollWheelZoom: false,
  touchZoom: false,
  doubleClickZoom: false
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 20
}).addTo(map);
map.setView([TARGET.lat, TARGET.lng], 17);
setTimeout(() => map.invalidateSize(), 80);

// Cílový pin
const targetIcon = L.divIcon({
  html: `<div style="width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:#6b7280;border:2px solid white;box-shadow:0 0 0 3px #b8922a,0 2px 12px rgba(184,146,42,.5);display:flex;align-items:center;justify-content:center;position:relative"><span style="transform:rotate(45deg);font-size:11px;font-weight:700;color:white">H</span></div>`,
  className:'', iconSize:[34,34], iconAnchor:[17,34]
});
L.marker([TARGET.lat, TARGET.lng], { icon: targetIcon }).addTo(map);

let userMarker = null;

// ── STAV ──
let userPos = null;
let smoothH = null;   // vyhlazený heading
const LP = 0.1;       // low-pass alpha

function lerpAngle(cur, tgt) {
  if (cur === null) return tgt;
  let d = tgt - cur;
  if (d > 180) d -= 360;
  if (d < -180) d += 360;
  return (cur + LP * d + 360) % 360;
}

// ── GPS ──
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    const ll = L.latLng(userPos.lat, userPos.lng);
    if (userMarker) { userMarker.setLatLng(ll); }
    else {
      userMarker = L.circleMarker(ll, {
        radius:9, color:'#2a6e5e', fillColor:'#2a6e5e', fillOpacity:.9, weight:2
      }).addTo(map);
    }
    update();
  }, () => {
    document.getElementById('cpStatus').textContent = 'GPS nedostupná — povol přístup k poloze.';
  }, { enableHighAccuracy: true, maximumAge: 1500 });
}

// ── ORIENTACE ──
function startOrientation() {
  const h = (e) => {
    let deg = null;
    if (e.webkitCompassHeading !== undefined) deg = e.webkitCompassHeading;
    else if (e.absolute && e.alpha !== null) deg = (360 - e.alpha) % 360;
    else if (e.alpha !== null) deg = (360 - e.alpha) % 360;
    if (deg !== null) { smoothH = lerpAngle(smoothH, deg); update(); }
  };
  window.addEventListener('deviceorientationabsolute', h, true);
  window.addEventListener('deviceorientation', h, true);
}
if (typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission === 'function') {
  DeviceOrientationEvent.requestPermission()
    .then(s => { if (s === 'granted') startOrientation(); })
    .catch(() => startOrientation());
} else {
  startOrientation();
}

// ── VÝPOČTY ──
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function bearing(from, to) {
  const dL = toRad(to.lng - from.lng);
  const y = Math.sin(dL) * Math.cos(toRad(to.lat));
  const x = Math.cos(toRad(from.lat)) * Math.sin(toRad(to.lat)) -
            Math.sin(toRad(from.lat)) * Math.cos(toRad(to.lat)) * Math.cos(dL);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function distance(from, to) {
  const R = 6371000;
  const dLat = toRad(to.lat - from.lat), dLng = toRad(to.lng - from.lng);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(from.lat)) * Math.cos(toRad(to.lat)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── UPDATE ──
let mapCurrentRot = 0;

function update() {
  if (!userPos) return;

  const dist = distance(userPos, TARGET);
  const bear = bearing(userPos, TARGET);
  const h    = smoothH !== null ? smoothH : 0;

  // Vzdálenost
  if (dist < 1000) {
    document.getElementById('distVal').textContent = Math.round(dist);
    document.getElementById('distUnit').textContent = ' m';
  } else {
    document.getElementById('distVal').textContent = (dist/1000).toFixed(1).replace('.',',');
    document.getElementById('distUnit').textContent = ' km';
  }
  const steps = Math.round(dist / 0.75);
  document.getElementById('distSteps').textContent = steps < 10000 ? `≈ ${steps.toLocaleString('cs')} kroků` : '';

  // MAPA otáčí se s headingem telefonu (to co máš před sebou = nahoře)
  document.getElementById('mapWrap').style.transform = `rotate(${-h}deg)`;

  // Centruj mapu na uživatele
  map.setView([userPos.lat, userPos.lng], map.getZoom(), { animate: false });

  // Růžice: pevná vůči obrazovce (kompenzuje rotaci mapy → sever nahoře)
  document.getElementById('roseEl').style.transform = `rotate(${h}deg)`;

  // Šipka: ukazuje relativní směr k cíli
  document.getElementById('arrowEl').style.transform = `rotate(${bear - h}deg)`;

  document.getElementById('cpStatus').textContent = '';

  // Proximity
  if (dist <= 25) document.getElementById('cpProximity').style.display = 'block';
}

function goToTarget() {
  window.location.href = `step-into-the-past.html?id=${TARGET.id}&lat=${TARGET.lat}&lng=${TARGET.lng}`;
}
</script>
</body>
</html>
