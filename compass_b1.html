<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Kompas · LoP</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #e8e4dc; }
#clip { position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; }
#mapWrap { position: absolute; transform-origin: 50% 50%; background: #e8e4dc; }
#map { width: 100%; height: 100%; }
#userDot {
  position: absolute; z-index: 100; pointer-events: none;
  width: 20px; height: 20px; border-radius: 50%;
  background: #b04020; border: 3px solid #fff;
  box-shadow: 0 0 0 3px rgba(176,64,32,.25), 0 2px 8px rgba(0,0,0,.4);
  transform: translate(-50%, -50%);
}
/* calBtn styled inline */
#dbg {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 200; background: rgba(26,24,20,.75); color: #fff;
  font-family: monospace; font-size: 13px;
  padding: 8px 16px; border-radius: 8px; white-space: nowrap;
}
</style>
</head>
<body>
<div id="clip">
  <div id="mapWrap"><div id="map"></div></div>
  <div id="userDot"></div>
  <input type="file" id="calFile" accept=".json" style="display:none" onchange="importCal(this)"/>
  <!-- Cal button top right -->
  <button id="calBtn" onclick="toggleCal()" ontouchstart="calTouchStart()" ontouchend="calTouchEnd()"
    style="position:absolute;top:12px;right:12px;z-index:200;
      height:28px;padding:0 10px;border-radius:14px;
      font-family:monospace;font-size:11px;font-weight:600;letter-spacing:.04em;
      border:none;cursor:pointer;white-space:nowrap;
      transition:background .2s,color .2s;">
  </button>

  <!-- Tooltip -->
  <div id="tipBox" style="
    display:none;position:absolute;z-index:300;
    width:200px;
    background:#eeefeb;border:1px solid #cbcec5;border-radius:10px;
    overflow:hidden;box-shadow:0 8px 24px rgba(26,24,20,.18);
    pointer-events:auto;
  ">
    <div id="tipImg" style="width:100%;height:100px;background:linear-gradient(135deg,#4A4A48,#8a5a3a);position:relative;overflow:hidden;">
      <div id="tipImgEl" style="position:absolute;inset:0;background-size:cover;background-position:center"></div>
    </div>
    <div style="padding:8px 10px 10px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin-bottom:6px">
        <div id="tipName" style="font-family:serif;font-size:14px;font-weight:500;color:#1a1a18;line-height:1.2"></div>
        <div id="tipDist" style="font-family:monospace;font-size:10px;color:#9a9a94;white-space:nowrap;flex-shrink:0"></div>
      </div>
      <div style="display:flex;gap:6px">
        <button id="tipDetail" onclick="tipOpenDetail()" style="flex:1;padding:5px 6px;border-radius:6px;border:1px solid #cbcec5;background:#e6e7e2;font-family:monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#3a3a36;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Detail
        </button>
        <button id="tipNavigate" onclick="tipNavigate()" style="flex:1;padding:5px 6px;border-radius:6px;border:1px solid #cbcec5;background:#e6e7e2;font-family:monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#3a3a36;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
          Mapa
        </button>
      </div>
    </div>
  </div>

  <!-- Distance display bottom center -->
  <div id="distBox" style="
    position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
    z-index:200;text-align:center;pointer-events:none;
  ">
    <div id="distVal" style="font-family:monospace;font-size:28px;font-weight:700;
      color:#1a1a18;text-shadow:0 1px 4px rgba(255,255,255,.8);line-height:1"></div>
    <div id="distSteps" style="font-family:monospace;font-size:11px;
      color:#3a3a36;text-shadow:0 1px 3px rgba(255,255,255,.8);margin-top:1px"></div>
  </div>
</div>
<div id="dbg">GPS: čeká… | —°</div>

<script>
// ── PARAMS ──
const params = new URLSearchParams(location.search);
var TARGET = {
  id:    params.get('id'),
  num:   params.get('num') || params.get('id') || '?',
  lat:   parseFloat(params.get('lat')),
  lng:   parseFloat(params.get('lng')),
  name:  params.get('name') || '',
  thumb: params.get('thumb') || ''
};

// ── ANCHOR ──
const wrap = document.getElementById('mapWrap');
const dot  = document.getElementById('userDot');
let AX = 0, AY = 0;

function setAnchor() {
  const landscape = window.innerWidth > window.innerHeight;
  AX = window.innerWidth / 2;
  AY = landscape ? window.innerHeight - 60 : window.innerHeight - 120;

  const d = Math.ceil(Math.sqrt(window.innerWidth * window.innerWidth + window.innerHeight * window.innerHeight) * 1.5);
  wrap.style.width  = d + 'px';
  wrap.style.height = d + 'px';
  wrap.style.left   = (AX - d / 2) + 'px';
  wrap.style.top    = (AY - d / 2) + 'px';

  dot.style.left = AX + 'px';
  dot.style.top  = AY + 'px';
}
setAnchor(); // run before Leaflet init so #mapWrap has dimensions

// ── MAP ──
var map = L.map('map', { zoomControl: false, attributionControl: false, touchZoom: true, dragging: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 20, keepBuffer: 4
}).addTo(map);

// Center: target or Prague
var initCenter = (!isNaN(TARGET.lat)) ? [TARGET.lat, TARGET.lng] : [50.083, 14.42];
map.setView(initCenter, 16);
[100, 400, 800].forEach(function(t){ setTimeout(function(){ map.invalidateSize(); }, t); });

// Target pin
if (!isNaN(TARGET.lat)) {
  var n = String(TARGET.num), m = n.match(/^([A-Z]+)(\d+)$/);
  // Checkered flag pin
  var pinHtml = '<div style="display:flex;flex-direction:column;align-items:center">'
    + '<svg width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))">'
    + '<rect x="0" y="0" width="7" height="7" fill="#1a1a18"/>'
    + '<rect x="7" y="0" width="7" height="7" fill="#fff"/>'
    + '<rect x="14" y="0" width="7" height="7" fill="#1a1a18"/>'
    + '<rect x="21" y="0" width="7" height="7" fill="#fff"/>'
    + '<rect x="0" y="7" width="7" height="7" fill="#fff"/>'
    + '<rect x="7" y="7" width="7" height="7" fill="#1a1a18"/>'
    + '<rect x="14" y="7" width="7" height="7" fill="#fff"/>'
    + '<rect x="21" y="7" width="7" height="7" fill="#1a1a18"/>'
    + '<rect x="0" y="14" width="7" height="7" fill="#1a1a18"/>'
    + '<rect x="7" y="14" width="7" height="7" fill="#fff"/>'
    + '<rect x="14" y="14" width="7" height="7" fill="#1a1a18"/>'
    + '<rect x="21" y="14" width="7" height="7" fill="#fff"/>'
    + '<rect x="0" y="21" width="7" height="7" fill="#fff"/>'
    + '<rect x="7" y="21" width="7" height="7" fill="#1a1a18"/>'
    + '<rect x="14" y="21" width="7" height="7" fill="#fff"/>'
    + '<rect x="21" y="21" width="7" height="7" fill="#1a1a18"/>'
    + '</svg>'
    + '<div style="width:2px;height:8px;background:#1a1a18;margin-top:-1px"></div>'
    + '</div>';
  var tMarker = L.marker([TARGET.lat, TARGET.lng], {
    icon: L.divIcon({ html: pinHtml, className: '', iconSize: [28,38], iconAnchor: [14,38] })
  }).addTo(map);
  tMarker.on('click', function(e) { showTip(e); });
}

// ── TOOLTIP ──
function showTip(e) {
  var tip = document.getElementById('tipBox');
  // Name
  document.getElementById('tipName').textContent = TARGET.name || ('Cíl ' + TARGET.num);
  // Distance
  if (userPos && !isNaN(TARGET.lat)) {
    var dist = calcDistSimple(userPos, TARGET);
    document.getElementById('tipDist').textContent = dist < 1000 ? Math.round(dist) + ' m' : (dist/1000).toFixed(1) + ' km';
  } else {
    document.getElementById('tipDist').textContent = '';
  }
  // Photo
  var thumb = TARGET.thumb;
  var imgEl = document.getElementById('tipImgEl');
  if (thumb) { imgEl.style.backgroundImage = 'url(' + thumb + ')'; }
  else { imgEl.style.backgroundImage = 'none'; }
  // Position tip near pin — convert latlng to container px
  var px = map.latLngToContainerPoint([TARGET.lat, TARGET.lng]);
  // Adjust for mapWrap transform (rotation)
  var wRect = document.getElementById('mapWrap').getBoundingClientRect();
  // Use screen coords of the click event
  var cx = e.originalEvent.clientX;
  var cy = e.originalEvent.clientY;
  var tipW = 200, tipH = 180;
  var left = Math.min(Math.max(cx - tipW/2, 8), window.innerWidth - tipW - 8);
  var top  = cy - tipH - 12;
  if (top < 50) top = cy + 20;
  tip.style.left = left + 'px';
  tip.style.top  = top  + 'px';
  tip.style.display = 'block';
}
function hideTip() { document.getElementById('tipBox').style.display = 'none'; }
function tipOpenDetail() {
  if (TARGET.id) window.location.href = '../LayersOfPrague.html#loc=' + TARGET.id;
  hideTip();
}
function tipNavigate() {
  hideTip();
  // Already on compass — just close tip
}
function calcDistSimple(a, b) {
  var R = 6371000;
  var dLat = (b.lat-a.lat)*Math.PI/180, dLng = (b.lng-a.lng)*Math.PI/180;
  var h = Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h));
}
// Close tip on map click
document.getElementById('clip').addEventListener('click', function(e) {
  var tip = document.getElementById('tipBox');
  if (tip && !tip.contains(e.target)) hideTip();
});

// ── OTHER LOCATIONS (dimmed) ──
var LOCATIONS = [
  { id:0, name:"Šítkovská věž", lat:50.0784, lng:14.4133, cat:"hist", num:101 },
  { id:1, name:"Václavské náměstí", lat:50.0815, lng:14.4278, cat:"hist", num:102 },
  { id:2, name:"Staroměstské nám.", lat:50.0875, lng:14.4213, cat:"arch", num:201 },
  { id:3, name:"Národní divadlo", lat:50.0808, lng:14.4133, cat:"arch", num:202 },
  { id:4, name:"Pražský hrad", lat:50.0911, lng:14.4016, cat:"fun", num:301 },
  { id:5, name:"Holešovický přístav", lat:50.10543, lng:14.45595, cat:"hist", num:"H001" },
  { id:6, name:"Letenské sady", lat:50.0939, lng:14.4224, cat:"fun", num:302 },
  { id:7, name:"Tančící dům", lat:50.0754, lng:14.4141, cat:"arch", num:203 }
];
var CAT_COLOR = { hist: '#4A4A48', arch: '#3B5F84', fun: '#E0A020' };

LOCATIONS.forEach(function(loc) {
  // Skip the target location
  if (String(loc.id) === String(TARGET.id)) return;
  var n = String(loc.num), m = n.match(/^([A-Z]+)(\d+)$/);
  var col = CAT_COLOR[loc.cat] || '#4A4A48';
  var ph = m
    ? '<div style="width:30px;height:30px;border-radius:50%;background:' + col + ';border:2px solid #fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:monospace;color:#fff"><span style="font-size:10px;font-weight:700;line-height:1">' + m[1] + '</span><span style="font-size:7px;opacity:.8;line-height:1">' + m[2] + '</span></div>'
    : '<div style="width:30px;height:30px;border-radius:50%;background:' + col + ';border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:10px;font-weight:700;color:#fff">' + n + '</div>';
  var marker = L.marker([loc.lat, loc.lng], {
    icon: L.divIcon({ html: ph, className: '', iconSize: [30,30], iconAnchor: [15,15] }),
    opacity: 0.2,
    zIndexOffset: -100
  }).addTo(map);
  // Also dim the icon element after render
  marker.on('add', function() {
    var el = marker.getElement();
    if (el) el.style.opacity = '0.2';
  });
});

// ── CALIBRATION ──
var yawOffset = 0, calEnabled = false;
function loadCal() {
  try {
    var disabled = localStorage.getItem('lop_cal_disabled') === '1';
    var cal = JSON.parse(localStorage.getItem('lop_sensor_calibration') || 'null');
    if (cal && !disabled) { yawOffset = (cal.offsets && cal.offsets.yaw) || 0; calEnabled = true; }
    else { yawOffset = 0; calEnabled = false; }
  } catch(e) { yawOffset = 0; calEnabled = false; }
  updateCalBtn();
}
function updateCalBtn() {
  var btn = document.getElementById('calBtn'); if (!btn) return;
  var cal = null;
  try { cal = JSON.parse(localStorage.getItem('lop_sensor_calibration') || 'null'); } catch(e) {}
  var disabled = localStorage.getItem('lop_cal_disabled') === '1';
  if (!cal) {
    // No calibration available
    btn.textContent = 'kalibrovat kompas?';
    btn.style.background = '#b04020';
    btn.style.color = '#fff';
  } else if (calEnabled) {
    // Active
    btn.textContent = '● kalibrace kompasu';
    btn.style.background = '#3d7a4a';
    btn.style.color = '#fff';
  } else {
    // Available but disabled
    btn.textContent = '○ kalibrace kompasu';
    btn.style.background = 'rgba(26,24,20,.55)';
    btn.style.color = '#fff';
  }
}
function toggleCal() {
  var cal = null;
  try { cal = JSON.parse(localStorage.getItem('lop_sensor_calibration') || 'null'); } catch(e) {}
  if (!cal) {
    // No calibration — redirect to calibration tool
    window.location.href = 'usercalibrationtool.html';
    return;
  }
  var d = localStorage.getItem('lop_cal_disabled') === '1';
  if (d) localStorage.removeItem('lop_cal_disabled'); else localStorage.setItem('lop_cal_disabled', '1');
  loadCal();
}
function importCal(input) {
  var file = input.files[0]; if (!file) return;
  var r = new FileReader();
  r.onload = function(ev) {
    try {
      var cal = JSON.parse(ev.target.result);
      if (!cal.offsets) throw new Error('Chybí offsets');
      localStorage.setItem('lop_sensor_calibration', JSON.stringify(cal));
      localStorage.removeItem('lop_cal_disabled');
      loadCal();
      var btn = document.getElementById('calBtn');
      btn.style.background = '#b8922a';
      setTimeout(loadCal, 800);
    } catch(e) { alert('Chyba: ' + e.message); }
    input.value = '';
  };
  r.readAsText(file);
}
var calTimer = null;
function calTouchStart() { calTimer = setTimeout(function(){ calTimer = null; document.getElementById('calFile').click(); }, 600); }
function calTouchEnd() { if (calTimer) { clearTimeout(calTimer); calTimer = null; } }
loadCal();

// ── DISTANCE ──
function toRad(d) { return d * Math.PI / 180; }
function calcDist(a, b) {
  var R = 6371000;
  var dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
  var h = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1-h));
}
function updateDist() {
  if (!userPos || isNaN(TARGET.lat)) return;
  var dist = calcDist(userPos, TARGET);
  var dv = document.getElementById('distVal');
  var ds = document.getElementById('distSteps');
  if (!dv) return;
  if (dist < 1000) dv.textContent = Math.round(dist) + ' m';
  else dv.textContent = (dist/1000).toFixed(1).replace('.', ',') + ' km';
  var steps = Math.round(dist / 0.75);
  ds.textContent = steps < 9999 ? '≈ ' + steps.toLocaleString('cs') + ' kroků' : '';
}

// ── SENSORS ──
var userPos = null, smoothH = null, lastH = 0;

// Two-stage smoothing: fast lerp into buffer, slow lerp to display
var rawH = null;
var LP_FAST = 0.25;  // raw → buffer (tracks movement)
var LP_SLOW = 0.04;  // buffer → display (suppresses jitter)

function addHeadingSample(raw) {
  // Stage 1: fast lerp on raw value
  if (rawH === null) { rawH = raw; }
  else {
    var d = raw - rawH;
    if (d > 180) d -= 360; if (d < -180) d += 360;
    rawH = (rawH + LP_FAST * d + 360) % 360;
  }
  // Stage 2: slow lerp rawH → smoothH
  if (smoothH === null) { smoothH = rawH; }
  else {
    var d2 = rawH - smoothH;
    if (d2 > 180) d2 -= 360; if (d2 < -180) d2 += 360;
    smoothH = (smoothH + LP_SLOW * d2 + 360) % 360;
  }
}

var lastPanLat = null, lastPanLng = null;
navigator.geolocation && navigator.geolocation.watchPosition(
  function(pos) {
    userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    // Only pan if moved more than ~3m to suppress GPS noise
    var dlat = Math.abs(userPos.lat - lastPanLat);
    var dlng = Math.abs(userPos.lng - lastPanLng);
    if (lastPanLat === null || dlat > 0.00003 || dlng > 0.00003) {
      lastPanLat = userPos.lat; lastPanLng = userPos.lng;
      map.setView([userPos.lat, userPos.lng], map.getZoom(), { animate: false });
    }
    updateDist();
    document.getElementById('dbg').textContent = 'GPS ±' + Math.round(pos.coords.accuracy) + 'm | ' + Math.round(smoothH||0) + '°';
  },
  function(err) {
    var m = { 1: 'Poloha blokována', 2: 'Nelze určit', 3: 'Timeout' };
    document.getElementById('dbg').textContent = 'GPS: ' + (m[err.code] || 'chyba');
  },
  { enableHighAccuracy: true, maximumAge: 1500 }
);

var oriPaused = false;

function getScreenAngle() {
  if (screen.orientation && screen.orientation.angle !== undefined)
    return screen.orientation.angle;
  if (window.orientation !== undefined)
    return window.orientation;
  return 0;
}

function startOri() {
  function handle(e) {
    if (oriPaused) return;
    var raw = null;
    if (e.webkitCompassHeading !== undefined) {
      // iOS: already compensated for screen orientation
      raw = e.webkitCompassHeading;
    } else if (e.alpha !== null) {
      // Android: alpha is relative to current screen orientation — correct it
      raw = (360 - e.alpha + getScreenAngle() + 360) % 360;
    }
    if (raw !== null) addHeadingSample((raw - yawOffset + 360) % 360);
  }
  window.addEventListener('deviceorientationabsolute', handle, true);
  window.addEventListener('deviceorientation', handle, true);
}

// Pause orientation briefly on resize to avoid sensor glitch during rotation
window.addEventListener('resize', function() {
  oriPaused = true;
  setTimeout(function() { oriPaused = false; }, 800);
});
if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
  document.addEventListener('touchstart', function u() {
    DeviceOrientationEvent.requestPermission().then(function(s){ if (s==='granted') startOri(); }).catch(startOri);
    document.removeEventListener('touchstart', u);
  }, { once: true });
} else { startOri(); }

// ── ROTATION ──
function rotateMap(h) {
  wrap.style.transform = 'rotate(' + (-h) + 'deg)';
  lastH = h;
}

// ── LOOP ──
function loop() {
  var h = smoothH !== null ? smoothH : 0;
  if (Math.abs(lastH - h) > 1.5) rotateMap(h);
  if (userPos) document.getElementById('dbg').textContent = 'GPS ✓ | ' + Math.round(h) + '°';
  requestAnimationFrame(loop);
}
loop();

// ── RESIZE ──
window.addEventListener('resize', function() {
  // Wait for browser to finish rotating before reading new dimensions
  requestAnimationFrame(function() {
    setAnchor();
    rotateMap(smoothH !== null ? smoothH : 0);
    // Re-center on user with new anchor
    if (userPos) map.setView([userPos.lat, userPos.lng], map.getZoom(), { animate: false });
    setTimeout(function() { map.invalidateSize(); }, 200);
    setTimeout(function() { map.invalidateSize(); }, 600);
  });
});
</script>
</body>
</html>
