<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Praha — Steps into the Past</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow: hidden; font-family: 'DM Sans', system-ui, sans-serif; background: #e8e4dc; }
#map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; transition: filter .4s ease; z-index: 1; }
:root {
  --cat-hist: #6b7280; --cat-hist-light: #e5e7eb;
  --cat-arch: #4a90c4; --cat-arch-light: #dbeafe;
  --cat-fun:  #c9a227; --cat-fun-light:  #fef9c3;
}

/* ── FILTER CONTROL ── */
.filter-control { background: #f5f1ea; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.18); padding: 6px; display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
.filter-btn { width: 32px; height: 32px; border: none; border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; transition: opacity .15s, transform .1s; position: relative; }
.filter-btn:active { transform: scale(.93); }
.filter-btn.cat-hist { background: var(--cat-hist); } .filter-btn.cat-arch { background: var(--cat-arch); } .filter-btn.cat-fun { background: var(--cat-fun); }
.filter-btn.state-full { opacity: 1; } .filter-btn.state-dim { opacity: 0.45; } .filter-btn.state-hide { opacity: 0.15; }
.filter-btn::before { content: attr(data-tip); position: absolute; right: calc(100% + 8px); top: 50%; transform: translateY(-50%); background: rgba(30,28,24,.85); color: white; font-size: 11px; font-weight: 400; padding: 3px 8px; border-radius: 5px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .15s; }
.filter-btn:hover::before { opacity: 1; }
.filter-sep { width: 20px; height: 1px; background: #e2ddd4; align-self: center; margin: 2px 0; }

/* ── MARKERS ── */
.custom-marker { width: 34px; height: 34px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,.3); transition: transform .15s, box-shadow .15s; gap: 0; }
.custom-marker:hover { box-shadow: 0 4px 16px rgba(0,0,0,.4); }
.custom-marker.cat-hist { background: var(--cat-hist); } .custom-marker.cat-arch { background: var(--cat-arch); } .custom-marker.cat-fun { background: var(--cat-fun); }
.custom-marker.todo { opacity: .55; }
.custom-marker .pin-letter { transform: rotate(45deg); font-size: 12px; font-weight: 700; color: white; line-height: 1; }
.custom-marker .pin-num { transform: rotate(45deg); font-size: 8px; font-weight: 500; color: rgba(255,255,255,.8); line-height: 1; margin-top: 1px; }
/* wish srdíčko na pinu */
.pin-wish {
  position: absolute; top: -6px; right: -6px;
  width: 16px; height: 16px; border-radius: 50%;
  background: white; display: flex; align-items: center; justify-content: center;
  font-size: 9px; line-height: 1;
  box-shadow: 0 1px 4px rgba(0,0,0,.25);
  transform: rotate(45deg);
}
/* ── MODAL ── */
.modal { position: fixed; inset: 0; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity .3s ease; }
.modal.open { opacity: 1; pointer-events: all; }
.modal-bg { position: absolute; inset: 0; background: rgba(0,0,0,.45); cursor: pointer; }
.modal-box { position: absolute; inset: 0; overflow: hidden; }
.modal-close { position: absolute; top: 16px; right: 16px; z-index: 30; width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.3); color: white; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; }
.modal-close:hover { background: rgba(0,0,0,.8); }
.modal-header { position: absolute; top: 0; left: 0; right: 0; z-index: 20; padding: 16px 56px 32px 20px; pointer-events: none; background: linear-gradient(180deg, rgba(20,18,14,.7) 0%, transparent 100%); }
.modal-header * { pointer-events: all; }
.modal-title { font-family: 'DM Sans', system-ui, sans-serif; font-size: 18px; font-weight: 500; color: white; line-height: 1.2; margin-bottom: 2px; letter-spacing: -.01em; }
.modal-sub { font-size: 11px; color: rgba(255,255,255,.6); }
/* ── TERRAIN PANEL ── */
.terrain-panel { position: absolute; inset: 0; background: #f5f1ea; display: flex; flex-direction: column; overflow: hidden; }
.terrain-panel::before { content: ''; display: block; height: 4px; flex-shrink: 0; background: var(--tp-accent, #6b7280); }
.tp-scroll { flex: 1; overflow-y: auto; padding: 0 0 16px; }
.tp-scroll.no-slider { padding-top: 72px; }
.tp-slider-block { border-radius: 0; margin-bottom: 0; }
.tp-tabs { margin: 12px 20px 16px; }
.tp-tab-panel { padding: 0 20px; }
.tp-tab-panel.active {
  background: white;
  border-radius: 10px;
  border: 1px solid #e2ddd4;
  padding: 14px 16px;
  margin: 0 20px;
}
.tp-section { margin-bottom: 20px; padding: 0 20px; }

/* ── ACTION BAR (připnutá dole) ── */
.tp-action-bar {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 10px 16px 14px;
  background: #f5f1ea;
  border-top: 1px solid #e2ddd4;
}
.ab-btn {
  height: 44px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  border-radius: 10px;
  background: transparent;
  border: none;
  text-decoration: none; cursor: pointer;
  color: #4a4640;
  transition: background .15s;
}
.ab-btn:hover { background: rgba(0,0,0,.05); }
.ab-btn.wish-active .ab-label { color: #e05a5a; }
.ab-btn.wish-active .ab-icon { color: #e05a5a; }
.ab-icon { font-size: 18px; line-height: 1; }
.ab-img { width: 20px; height: 20px; display: block; object-fit: contain; }
.ab-label { font-size: 10px; font-weight: 600; color: #4a4640; line-height: 1; letter-spacing: -.01em; }

/* ── INLINE SLIDER BLOK ── */
.tp-slider-block {
  position: relative;
  width: 100%;
  aspect-ratio: 3/2;
  max-height: 440px;
  border-radius: 10px;
  overflow: hidden;
  cursor: ew-resize;
  user-select: none;
  margin-bottom: 20px;
  background: #2a2420;
}
.sl-base, .sl-top { position: absolute; inset: 0; }
.sl-base img, .sl-top img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; -webkit-user-drag: none; }
.sl-top { clip-path: inset(0 50% 0 0); }
.sl-divider { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: white; transform: translateX(-50%); pointer-events: none; }
.sl-handle { position: absolute; top: 50%; left: 50%; width: 28px; height: 28px; border-radius: 50%; background: white; transform: translate(-50%,-50%); display: flex; align-items: center; justify-content: center; font-size: 11px; pointer-events: none; color: #4a4640; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
.sl-lbl { position: absolute; bottom: 8px; font-size: 10px; font-weight: 500; color: white; padding: 2px 8px; background: rgba(0,0,0,.5); border-radius: 4px; }
.sl-lbl-l { left: 8px; } .sl-lbl-r { right: 8px; }
/* rozbalit tlačítko */
.sl-expand {
  position: absolute; top: 8px; right: 8px;
  width: 26px; height: 26px; border-radius: 6px;
  background: rgba(0,0,0,.45); border: 1px solid rgba(255,255,255,.3);
  color: white; font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  pointer-events: all; transition: background .15s;
  z-index: 5;
}
.sl-expand:hover { background: rgba(0,0,0,.75); }

/* ── FULLSCREEN SLIDER OVERLAY ── */
#slFullscreen {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .25s ease;
}
#slFullscreen.open { opacity: 1; pointer-events: all; }
.slf-inner {
  position: relative;
  width: 92vw; max-width: 1100px;
  aspect-ratio: 3/2;
  border-radius: 12px;
  overflow: hidden;
  cursor: ew-resize;
  user-select: none;
}
.slf-inner .sl-base, .slf-inner .sl-top { position: absolute; inset: 0; }
.slf-inner .sl-base img, .slf-inner .sl-top img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; -webkit-user-drag: none; }
.slf-inner .sl-top { clip-path: inset(0 50% 0 0); }
.slf-inner .sl-divider { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: white; transform: translateX(-50%); pointer-events: none; }
.slf-inner .sl-handle { position: absolute; top: 50%; left: 50%; width: 38px; height: 38px; border-radius: 50%; background: white; transform: translate(-50%,-50%); display: flex; align-items: center; justify-content: center; font-size: 14px; pointer-events: none; color: #4a4640; box-shadow: 0 2px 12px rgba(0,0,0,.4); }
.slf-inner .sl-lbl { position: absolute; bottom: 14px; font-size: 12px; font-weight: 500; color: white; padding: 4px 12px; background: rgba(0,0,0,.5); border-radius: 4px; }
.slf-inner .sl-lbl-l { left: 14px; } .slf-inner .sl-lbl-r { right: 14px; }
#slFsClose {
  position: absolute; top: 16px; right: 16px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
  color: white; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
#slFsClose:hover { background: rgba(255,255,255,.3); }

/* sdílené bloky obsahu */
.tp-section { margin-bottom: 20px; }
.tp-section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; color: #8a857e; margin-bottom: 8px; }
.tp-directions { background: white; border-radius: 10px; border: 1px solid #e2ddd4; padding: 13px 15px; font-size: 13px; line-height: 1.7; color: #4a4640; }
.tp-directions strong { color: #2a2420; font-weight: 500; }
.tp-steps { display: flex; flex-direction: column; gap: 8px; }
.tp-step { display: flex; gap: 12px; align-items: flex-start; background: white; border-radius: 10px; border: 1px solid #e2ddd4; padding: 12px 14px; }
.tp-step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--tp-accent, #6b7280); color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.tp-step-body { font-size: 13px; line-height: 1.6; color: #4a4640; }
.tp-step-body strong { color: #2a2420; font-weight: 500; display: block; margin-bottom: 2px; }
.tp-tip { background: #fef9e7; border-left: 3px solid #c9a227; border-radius: 0 8px 8px 0; padding: 11px 14px; font-size: 12px; line-height: 1.65; color: #6b5a1a; }
.tp-tip-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #c9a227; margin-bottom: 4px; }
.tp-nav-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 13px; background: #2a2420; color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; transition: background .2s; margin-top: 6px; }
.tp-nav-btn:hover { background: #1a1510; }

/* ── COLLAPSIBLE SEKCE ── */
.tp-collapsible { margin-bottom: 12px; border-radius: 10px; overflow: hidden; border: 1px solid #e2ddd4; }
.tp-coll-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px; cursor: pointer;
  background: white; user-select: none;
  transition: background .15s;
}
.tp-coll-header:hover { background: #f5f1ea; }
.tp-coll-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; color: #8a857e; }
.tp-coll-arrow { font-size: 11px; color: #8a857e; transition: transform .25s; }
.tp-coll-header.open .tp-coll-arrow { transform: rotate(180deg); }
.tp-coll-body { background: white; overflow: hidden; max-height: 0; transition: max-height .3s cubic-bezier(.4,0,.2,1); }
.tp-coll-body.open { max-height: 600px; }
.tp-coll-inner { padding: 0 14px 14px; }
.tp-transit-btns { display: none; } /* legacy — nahrazeno tp-action-bar */
.tp-transit-btn {
  flex: 1; min-height: 56px; box-sizing: border-box;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  border-radius: 10px;
  background: #f0ede6;
  border: 1px solid #e2ddd4; transition: background .15s;
  text-decoration: none; cursor: pointer;
  font-family: inherit; padding: 0; margin: 0;
  -webkit-appearance: none; appearance: none;
  vertical-align: middle; line-height: 1;
}
.tp-transit-btn:hover { background: #e2ddd4; }
.tp-transit-btn.wish-active { background: #fff5f5; border-color: #e05a5a; }
.tp-transit-btn.wish-active .tp-transit-label { color: #e05a5a; }
.tp-transit-btn img { display: block; flex-shrink: 0; }
.tp-transit-label { font-size: 10px; font-weight: 600; letter-spacing: -.01em; line-height: 1; color: #4a4640; flex-shrink: 0; }
.wish-icon-lg { font-size: 18px; line-height: 1; flex-shrink: 0; }
.tp-about-text { font-size: 13px; line-height: 1.75; color: #4a4640; }

/* ── KOMPAS OVERLAY ── */
#compassOverlay {
  position: absolute; inset: 0; z-index: 50;
  background: #14120e;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .3s ease;
}
#compassOverlay.open { opacity: 1; pointer-events: all; }

#compassClose {
  position: absolute; top: 16px; right: 16px;
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
  color: white; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
#compassClose:hover { background: rgba(255,255,255,.2); }

/* Název cíle */
.cp-name {
  position: absolute; top: 20px; left: 20px; right: 60px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500; color: rgba(255,255,255,.9);
  letter-spacing: -.01em; line-height: 1.2;
}
.cp-name span { display: block; font-size: 11px; color: rgba(255,255,255,.4); font-weight: 400; margin-top: 2px; }

/* Hlavní plocha kompasu */
.cp-stage {
  position: relative;
  width: min(320px, 80vw);
  height: min(320px, 80vw);
  margin-bottom: 32px;
}

/* Růžice — otáčí se opačně k headingu (kompenzuje rotaci telefonu) */
#cpRose {
  position: absolute; inset: 0;
  transition: transform .15s ease-out;
}

/* Šipka na cíl — pevná, ukazuje absolutní směr k cíli */
#cpArrow {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s ease-out;
}
#cpArrow svg { filter: drop-shadow(0 0 8px rgba(184,146,42,.6)); }

/* Kroužek středu */
.cp-center-dot {
  position: absolute; top: 50%; left: 50%;
  width: 10px; height: 10px; border-radius: 50%;
  background: white; transform: translate(-50%,-50%);
  z-index: 2;
}

/* Vzdálenost + kroky */
.cp-info {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.cp-dist {
  font-family: 'Playfair Display', serif;
  font-size: 42px; font-weight: 700; color: white;
  line-height: 1; letter-spacing: -.02em;
}
.cp-dist-unit { font-size: 18px; font-weight: 400; color: rgba(255,255,255,.5); margin-left: 4px; }
.cp-steps { font-size: 12px; color: rgba(255,255,255,.4); letter-spacing: .06em; text-transform: uppercase; margin-top: 2px; }
.cp-bearing { font-size: 11px; color: rgba(255,255,255,.3); margin-top: 6px; letter-spacing: .08em; }

/* Chybová/čekací zpráva */
.cp-status {
  font-size: 12px; color: rgba(255,255,255,.4);
  text-align: center; padding: 0 32px; line-height: 1.6;
  margin-top: 12px;
}

/* ── ZÁLOŽKY ── */
.tp-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid #e2ddd4;
  margin-bottom: 16px; flex-shrink: 0;
}
.tp-tab {
  flex: 1; padding: 10px 8px;
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
  color: #8a857e; text-align: center; cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s, border-color .15s;
  user-select: none;
}
.tp-tab.active { color: #2a2420; border-bottom-color: var(--tp-accent, #6b7280); }
.tp-tab-panel { display: none; }
.tp-tab-panel.active { display: block; }

/* ── RICH TOOLTIP ── */
.rich-tooltip { position: fixed; z-index: 500; background: #f5f1ea; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.22); overflow: hidden; pointer-events: all; cursor: pointer; opacity: 0; transform: translateY(calc(-100% - 4px)); transition: opacity .18s ease; min-width: 160px; max-width: 200px; }
.rich-tooltip.visible { opacity: 1; }
.rich-tooltip img { display: block; width: 100%; height: 110px; object-fit: cover; }
.rich-tooltip .rt-label { padding: 8px 11px 9px; font-size: 12px; font-weight: 500; color: #2a2420; line-height: 1.3; }
.rich-tooltip .rt-sub { font-size: 10px; color: #8a857e; margin-top: 1px; }
</style>
</head>
<body>
<div id="map"></div>

<div class="modal" id="modal">
  <div class="modal-bg" id="modalBg"></div>
  <div class="modal-box">
    <button class="modal-close" id="modalClose">&#x2715;</button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="terrain-panel" id="terrainPanel">
      <div class="tp-scroll" id="tpScroll"></div>
      <div class="tp-action-bar" id="tpActionBar"></div>

      <!-- KOMPAS OVERLAY -->
      <div id="compassOverlay">
        <button id="compassClose">&#x2715;</button>
        <div class="cp-name" id="cpName">—<span id="cpSub"></span></div>

        <div class="cp-stage">
          <!-- Růžice SVG -->
          <div id="cpRose">
            <svg viewBox="0 0 320 320" width="100%" height="100%">
              <!-- Vnější kruh -->
              <circle cx="160" cy="160" r="150" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
              <circle cx="160" cy="160" r="120" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
              <!-- Hlavní dělení po 30° -->
              <g stroke="rgba(255,255,255,.25)" stroke-width="1">
                <line x1="160" y1="12" x2="160" y2="28"/>
                <line x1="160" y1="292" x2="160" y2="308"/>
                <line x1="12" y1="160" x2="28" y2="160"/>
                <line x1="292" y1="160" x2="308" y2="160"/>
                <line x1="63" y1="32" x2="71" y2="46"/>
                <line x1="249" y1="274" x2="257" y2="288"/>
                <line x1="288" y1="63" x2="274" y2="71"/>
                <line x1="46" y1="249" x2="32" y2="257"/>
                <line x1="257" y1="32" x2="249" y2="46"/>
                <line x1="71" y1="274" x2="63" y2="288"/>
                <line x1="32" y1="63" x2="46" y2="71"/>
                <line x1="274" y1="249" x2="288" y2="257"/>
              </g>
              <!-- Světové strany -->
              <text x="160" y="22" text-anchor="middle" fill="#e05a5a" font-size="13" font-weight="700" font-family="DM Sans,sans-serif">N</text>
              <text x="160" y="308" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="11" font-family="DM Sans,sans-serif">S</text>
              <text x="308" y="164" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="11" font-family="DM Sans,sans-serif">E</text>
              <text x="12" y="164" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="11" font-family="DM Sans,sans-serif">W</text>
              <!-- Stupně po 30° -->
              <text x="224" y="42" text-anchor="middle" fill="rgba(255,255,255,.3)" font-size="9" font-family="DM Sans,sans-serif">30</text>
              <text x="284" y="100" text-anchor="middle" fill="rgba(255,255,255,.3)" font-size="9" font-family="DM Sans,sans-serif">60</text>
              <text x="284" y="228" text-anchor="middle" fill="rgba(255,255,255,.3)" font-size="9" font-family="DM Sans,sans-serif">120</text>
              <text x="224" y="286" text-anchor="middle" fill="rgba(255,255,255,.3)" font-size="9" font-family="DM Sans,sans-serif">150</text>
              <text x="96" y="286" text-anchor="middle" fill="rgba(255,255,255,.3)" font-size="9" font-family="DM Sans,sans-serif">210</text>
              <text x="36" y="228" text-anchor="middle" fill="rgba(255,255,255,.3)" font-size="9" font-family="DM Sans,sans-serif">240</text>
              <text x="36" y="100" text-anchor="middle" fill="rgba(255,255,255,.3)" font-size="9" font-family="DM Sans,sans-serif">300</text>

const WISH_KEY = 'lop_wishlist';
function getWish(){ try{ return JSON.parse(localStorage.getItem(WISH_KEY)||'[]'); }catch(e){ return []; } }
function setWish(arr){ localStorage.setItem(WISH_KEY, JSON.stringify(arr)); }
function isWished(id){ return getWish().includes(id); }
function toggleWish(id){
  let w = getWish();
  if(w.includes(id)) w = w.filter(x=>x!==id);
  else w.push(id);
  setWish(w);
  return w.includes(id);
}

  const CAT_LETTER={hist:'H',arch:'A',fun:'I'};

    className:'',iconSize:[34,34],iconAnchor:[17,34]

}

            const pinEl = m.getElement();

              const tw = rtEl.offsetWidth;
              let left = r.left + r.width/2 - tw/2;
              left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));
              rtEl.style.left = left + 'px';
              rtEl.style.top  = r.top + 'px';
            }
            rtEl.style.visibility = '';
          });
        };
        const hideTooltip = () => {
          hideTimer = setTimeout(() => rtEl.classList.remove('visible'), 120);
        };
        m.on('mouseover', showTooltip);
        m.on('mouseout', hideTooltip);
        rtEl.addEventListener('mouseenter', () => clearTimeout(hideTimer));
        rtEl.addEventListener('mouseleave', hideTooltip);

// ── KOMPAS ──
let compassTarget = null;   // { lat, lng, name }
let compassUserPos = null;  // { lat, lng }
let compassHeading = null;  // stupně od severu (0-360)
let compassActive = false;
let gpsWatchId = null;
let orientationHandler = null;

const compassOverlay = document.getElementById('compassOverlay');
document.getElementById('compassClose').addEventListener('click', closeCompass);

function openCompass(loc) {
  compassTarget = { id: loc.id, lat: loc.lat, lng: loc.lng, name: loc.displayName || loc.name };
  document.getElementById('cpName').childNodes[0].textContent = compassTarget.name;
  document.getElementById('cpStatus').textContent = 'Čeká na GPS a orientaci zařízení…';
  compassOverlay.classList.add('open');
  compassActive = true;
  startGPS();
  startOrientation();
}

function closeCompass() {
  compassOverlay.classList.remove('open');
  compassActive = false;
  if (gpsWatchId !== null) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  if (orientationHandler) {
    window.removeEventListener('deviceorientation', orientationHandler);
    window.removeEventListener('deviceorientationabsolute', orientationHandler);
    orientationHandler = null;
  }
}

function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById('cpStatus').textContent = 'GPS není dostupná.'; return;
  }
  gpsWatchId = navigator.geolocation.watchPosition(pos => {
    compassUserPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    updateCompass();
  }, () => {
    document.getElementById('cpStatus').textContent = 'GPS nedostupná — povol přístup k poloze.';
  }, { enableHighAccuracy: true, maximumAge: 2000 });
}

function startOrientation() {
  // iOS 13+ vyžaduje requestPermission
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') listenOrientation();
      else document.getElementById('cpStatus').textContent = 'Přístup k senzoru orientace zamítnut.';
    }).catch(() => listenOrientation());
  } else {
    listenOrientation();
  }
}

function listenOrientation() {
  orientationHandler = (e) => {
    if (!compassActive) return;
    let heading = null;
    if (e.webkitCompassHeading !== undefined) {
      heading = e.webkitCompassHeading; // iOS
    } else if (e.absolute && e.alpha !== null) {
      heading = (360 - e.alpha) % 360;  // Android absolute
    } else if (e.alpha !== null) {
      heading = (360 - e.alpha) % 360;  // fallback
    }
    if (heading !== null) { compassHeading = heading; updateCompass(); }
  };
  // Preferuj absolutní orientaci
  window.addEventListener('deviceorientationabsolute', orientationHandler, true);
  window.addEventListener('deviceorientation', orientationHandler, true);
}

function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function bearingTo(from, to) {
  const dLng = toRad(to.lng - from.lng);
  const lat1 = toRad(from.lat), lat2 = toRad(to.lat);
  const y = Math.sin(dLng) * Math.cos(lat2);
  const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function distanceTo(from, to) {
  const R = 6371000;
  const dLat = toRad(to.lat - from.lat), dLng = toRad(to.lng - from.lng);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(from.lat)) * Math.cos(toRad(to.lat)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function updateCompass() {
  if (!compassTarget || !compassUserPos) return;

  const dist = distanceTo(compassUserPos, compassTarget);
  const bearing = bearingTo(compassUserPos, compassTarget);

  // Vzdálenost
  const distEl = document.getElementById('cpDistVal');
  const unitEl = document.getElementById('cpDistUnit');
  if (dist < 1000) {
    distEl.textContent = Math.round(dist);
    unitEl.textContent = ' m';
  } else {
    distEl.textContent = (dist / 1000).toFixed(1).replace('.', ',');
    unitEl.textContent = ' km';
  }

  // Proximity trigger — 25 m
  if (dist <= 25) {
    closeCompass();
    const num = compassTarget._num || '';
    window.location.href = `step-into-the-past.html?id=${compassTarget.id}&lat=${compassTarget.lat}&lng=${compassTarget.lng}`;
    return;
  }

  // Kroky (průměrný krok ~75 cm)
  const steps = Math.round(dist / 0.75);
  document.getElementById('cpSteps').textContent =
    steps < 10000 ? `≈ ${steps.toLocaleString('cs')} kroků` : '';

  // Bearing text
  const dirs = ['S','SSV','SV','VSV','V','VJV','JV','JJV','J','JJZ','JZ','ZJZ','Z','ZSZ','SZ','SSZ'];
  const dirName = dirs[Math.round(bearing / 22.5) % 16];
  document.getElementById('cpBearing').textContent = `${Math.round(bearing)}° ${dirName}`;

  // Rotace růžice — opačně k headingu telefonu
  const roseRot = compassHeading !== null ? -compassHeading : 0;
  document.getElementById('cpRose').style.transform = `rotate(${roseRot}deg)`;

  // Šipka na cíl — bearing mínus heading = relativní směr
  const arrowRot = compassHeading !== null ? bearing - compassHeading : bearing;
  document.getElementById('cpArrow').style.transform = `rotate(${arrowRot}deg)`;

  // Skryjeme status pokud máme data
  document.getElementById('cpStatus').textContent = '';
}

function switchTab(tab, panelId) {
  const tabs = tab.parentElement.querySelectorAll('.tp-tab');
  tabs.forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const scroll = document.getElementById('tpScroll');
  scroll.querySelectorAll('.tp-tab-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById(panelId);
  if (panel) panel.classList.add('active');
}

function toggleColl(header){
  header.classList.toggle('open');
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

function initSlider(){  const block=document.getElementById('tpSlider');
  if(!block)return;
  const top=document.getElementById('slTop');
  const div=document.getElementById('slDiv');
  const handle=block.querySelector('.sl-handle');
  let drag=false;
  function setPos(pct){pct=Math.max(0,Math.min(100,pct));top.style.clipPath=`inset(0 ${100-pct}% 0 0)`;div.style.left=pct+'%';handle.style.left=pct+'%';}
  block.addEventListener('mousedown',()=>{drag=true;document.body.style.cursor='ew-resize';document.body.style.userSelect='none';});
  window.addEventListener('mouseup',()=>{drag=false;document.body.style.cursor='';document.body.style.userSelect='';});
  window.addEventListener('mousemove',e=>{if(!drag)return;const r=block.getBoundingClientRect();setPos(((e.clientX-r.left)/r.width)*100);});
  block.addEventListener('touchstart',()=>drag=true,{passive:true});
  window.addEventListener('touchend',()=>drag=false);
  window.addEventListener('touchmove',e=>{if(!drag)return;const r=block.getBoundingClientRect();setPos(((e.touches[0].clientX-r.left)/r.width)*100);},{passive:true});
}

// ── FULLSCREEN SLIDER ──
const slFs = document.getElementById('slFullscreen');
document.getElementById('slFsClose').addEventListener('click', closeFullscreen);
slFs.addEventListener('click', e => { if(e.target === slFs) closeFullscreen(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape' && slFs.classList.contains('open')) closeFullscreen(); });

function openFullscreen(loc) {
  document.getElementById('slfBase').src    = loc.imgNow;
  document.getElementById('slfTopImg').src  = loc.imgThen;
  document.getElementById('slfLblL').textContent = loc.yearThen;
  document.getElementById('slfLblR').textContent = loc.yearNow;
  slFs.classList.add('open');
  initFsSlider();
}
function closeFullscreen() { slFs.classList.remove('open'); }

function initFsSlider() {
  const inner = document.getElementById('slfInner');
  const top   = document.getElementById('slfTop');
  const div   = document.getElementById('slfDiv');
  const handle = inner.querySelector('.sl-handle');
  // reset position
  top.style.clipPath = 'inset(0 50% 0 0)';
  div.style.left = '50%'; handle.style.left = '50%';
  let drag = false;
  // clone to remove old listeners
  const fresh = inner.cloneNode(true);
  inner.parentNode.replaceChild(fresh, inner);
  const w = document.getElementById('slfInner');
  const t = document.getElementById('slfTop');
  const d = document.getElementById('slfDiv');
  const h = w.querySelector('.sl-handle');
  function setPos(pct){pct=Math.max(0,Math.min(100,pct));t.style.clipPath=`inset(0 ${100-pct}% 0 0)`;d.style.left=pct+'%';h.style.left=pct+'%';}
  w.addEventListener('mousedown',()=>{drag=true;document.body.style.cursor='ew-resize';document.body.style.userSelect='none';});
  window.addEventListener('mouseup',()=>{drag=false;document.body.style.cursor='';document.body.style.userSelect='';});
  window.addEventListener('mousemove',e=>{if(!drag)return;const r=w.getBoundingClientRect();setPos(((e.clientX-r.left)/r.width)*100);});
  w.addEventListener('touchstart',()=>drag=true,{passive:true});
  window.addEventListener('touchend',()=>drag=false);
  window.addEventListener('touchmove',e=>{if(!drag)return;const r=w.getBoundingClientRect();setPos(((e.touches[0].clientX-r.left)/r.width)*100);},{passive:true});
}
