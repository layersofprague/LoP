<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Filter UI · 6 variant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --paper: #eeefeb;
  --paper-2: #e6e7e2;
  --paper-3: #dadcd4;
  --ink: #1a1a18;
  --ink-2: #3a3a36;
  --ink-3: #6a6a64;
  --ink-4: #9a9a94;
  --rule: #cbcec5;
  --rule-2: #b8bcb0;
  --cat-hist: #4A4A48;
  --cat-arch: #3B5F84;
  --cat-fun:  #E0A020;
  --accent: #b04020;
  --ok: #3d7a4a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; font-family: 'Inter', system-ui, sans-serif; }

/* shared tile styles — phone-sized mock map frame */
.fv-frame {
  width: 340px; height: 560px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 18px;
  overflow: hidden;
  position: relative;
  display: flex; flex-direction: column;
  font-family: 'Inter', sans-serif;
  color: var(--ink);
}
.fv-top {
  flex: 0 0 auto;
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--paper);
}
.fv-logo {
  font-family: 'Fraunces', serif;
  font-size: 14px; letter-spacing: -.01em;
}
.fv-logo em { font-style: italic; font-weight: 400; color: var(--ink-3); }
.fv-top-right { display: flex; gap: 4px; }
.fv-ico-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--rule); background: var(--paper);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--ink-2);
}
.fv-map {
  flex: 1; position: relative; overflow: hidden;
  background:
    radial-gradient(circle at 30% 35%, #e8ebe5 0%, #dde0d8 40%, #d4d8ce 100%);
}
/* Fake river */
.fv-map::before {
  content: ''; position: absolute;
  top: 0; bottom: 0; left: 40%; width: 50px;
  background: linear-gradient(90deg, transparent, #c3d0d5 30%, #c3d0d5 70%, transparent);
  transform: skewX(-5deg);
  opacity: .6;
}
/* Pins */
.fv-pin {
  position: absolute;
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--paper);
  box-shadow: 0 2px 6px rgba(0,0,0,.2);
  transition: opacity .3s, transform .2s;
}
.fv-pin.hist { background: var(--cat-hist); }
.fv-pin.arch { background: var(--cat-arch); }
.fv-pin.fun  { background: var(--cat-fun); }
.fv-pin.dim { opacity: .3; }
.fv-pin.hide { opacity: 0; }

.fv-pin.visited::after {
  content: '';
  position: absolute;
  top: -6px; left: -6px;
  width: 11px; height: 11px;
  background-color: var(--ok);
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='4 12 10 18 20 6'/></svg>") center/contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='4 12 10 18 20 6'/></svg>") center/contain no-repeat;
  filter: drop-shadow(0 0 1px var(--paper));
}
.fv-pin.wished::before {
  content: '';
  position: absolute;
  top: -5px; right: -5px;
  width: 10px; height: 10px;
  background-color: var(--accent);
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1 7.8 7.8 7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z'/></svg>") center/contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1 7.8 7.8 7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z'/></svg>") center/contain no-repeat;
  filter: drop-shadow(0 0 1px var(--paper));
}

/* ───────────── variant 1: Segmented ───────────── */
.fv-seg {
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
  display: flex; align-items: center; gap: 8px;
}
.fv-seg-group {
  display: flex; flex: 1;
  border: 1px solid var(--rule);
  border-radius: 8px;
  overflow: hidden;
  background: var(--paper-2);
}
.fv-seg-btn {
  flex: 1;
  padding: 7px 4px;
  font-size: 10.5px; letter-spacing: .03em; font-weight: 500;
  border: none; background: transparent;
  border-right: 1px solid var(--rule);
  cursor: pointer; color: var(--ink-2);
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.fv-seg-btn:last-child { border-right: none; }
.fv-seg-btn.active { background: var(--paper); color: var(--ink); box-shadow: inset 0 -2px 0 var(--cat-arch); }
.fv-seg-btn.active.hist { box-shadow: inset 0 -2px 0 var(--cat-hist); }
.fv-seg-btn.active.fun { box-shadow: inset 0 -2px 0 var(--cat-fun); }
.fv-seg-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; color: var(--ink-4);
}
.fv-seg-iso { display: flex; gap: 4px; }
.fv-seg-iso-btn {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1px solid var(--rule); background: var(--paper);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.fv-seg-iso-btn.active { background: var(--ink); border-color: var(--ink); }
.fv-seg-iso-btn .fv-ico-heart { width: 14px; height: 14px; }
.fv-seg-iso-btn.active .fv-ico-heart { background-color: var(--accent) !important; }
.fv-seg-iso-btn .fv-ico-check { width: 14px; height: 14px; }
.fv-seg-iso-btn.active .fv-ico-check { background-color: var(--ok) !important; }

/* shared icons */
.fv-ico-heart {
  display: inline-block;
  background-color: var(--accent);
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1 7.8 7.8 7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z'/></svg>") center/contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1 7.8 7.8 7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z'/></svg>") center/contain no-repeat;
}
.fv-ico-check {
  display: inline-block;
  background-color: var(--ok);
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='4 12 10 18 20 6'/></svg>") center/contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='4 12 10 18 20 6'/></svg>") center/contain no-repeat;
}

/* ───────────── variant 2: Filter rail (editorial header) ───────────── */
.fv-rail {
  padding: 12px 14px;
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
}
.fv-rail-title {
  font-family: 'Fraunces', serif;
  font-size: 16px; letter-spacing: -.01em;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer;
}
.fv-rail-title .dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--cat-hist);
}
.fv-rail-title .count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-4);
  margin-left: 4px;
  letter-spacing: .08em;
}
.fv-rail-title .chev { margin-left: auto; color: var(--ink-4); transition: transform .3s; }
.fv-rail.open .chev { transform: rotate(180deg); }
.fv-rail-expand {
  max-height: 0; overflow: hidden;
  transition: max-height .3s;
}
.fv-rail.open .fv-rail-expand { max-height: 200px; }
.fv-rail-list {
  padding-top: 10px;
  display: flex; flex-direction: column; gap: 8px;
}
.fv-rail-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--ink-2);
  padding: 4px 0;
  cursor: pointer;
}
.fv-rail-row .dot-s {
  width: 8px; height: 8px; border-radius: 50%;
}

/* ───────────── variant 3: Floating legend ───────────── */
.fv-legend {
  position: absolute;
  left: 12px; bottom: 12px;
  background: rgba(238, 239, 235, 0.95);
  backdrop-filter: blur(6px);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 8px 10px;
  display: flex; flex-direction: column; gap: 5px;
  font-size: 11px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
}
.fv-legend-row {
  display: flex; align-items: center; gap: 6px;
  cursor: pointer;
  color: var(--ink-2);
}
.fv-legend-row .dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.fv-legend-row .num {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--ink-4);
}
.fv-legend-row.dim { opacity: .45; }
.fv-legend-divider { height: 1px; background: var(--rule); margin: 2px 0; }

/* ───────────── variant 4: Bottom sheet filter ───────────── */
.fv-top-filter-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px;
  border: 1px solid var(--rule);
  border-radius: 16px;
  background: var(--paper);
  font-size: 11px; color: var(--ink-2);
  cursor: pointer;
}
.fv-top-filter-btn .count-badge {
  background: var(--ink); color: var(--paper);
  width: 16px; height: 16px; border-radius: 50%;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  display: flex; align-items: center; justify-content: center;
}
.fv-sheet {
  position: absolute; left: 0; right: 0; bottom: 0;
  background: var(--paper);
  border-top: 1px solid var(--rule);
  border-radius: 14px 14px 0 0;
  padding: 12px 14px 18px;
  box-shadow: 0 -4px 20px rgba(0,0,0,.1);
  transform: translateY(0);
}
.fv-sheet-handle {
  width: 36px; height: 4px; background: var(--rule-2);
  border-radius: 2px; margin: 0 auto 10px;
}
.fv-sheet-title {
  font-family: 'Fraunces', serif;
  font-size: 15px; margin-bottom: 10px;
}
.fv-sheet-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--rule);
}
.fv-sheet-row:last-of-type { border-bottom: none; }
.fv-sheet-row .dot {
  width: 9px; height: 9px; border-radius: 50%;
}
.fv-sheet-row .label { flex: 1; font-size: 13px; }
.fv-sheet-row .cnt { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-4); }
.fv-sheet-row .toggle {
  width: 34px; height: 20px; border-radius: 10px;
  background: var(--rule-2); position: relative; cursor: pointer;
  transition: background .2s;
}
.fv-sheet-row .toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--paper); transition: transform .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.fv-sheet-row.on .toggle { background: var(--ink); }
.fv-sheet-row.on .toggle::after { transform: translateX(14px); }
.fv-sheet-row.dim .toggle { background: var(--accent); opacity: .5; }

/* ───────────── variant 5: Search + inline filters ───────────── */
.fv-searchbar {
  display: flex; gap: 6px; padding: 10px 12px;
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
  align-items: center;
}
.fv-search-input {
  flex: 1;
  border: 1px solid var(--rule); border-radius: 8px;
  padding: 7px 10px 7px 28px;
  font-size: 12px; color: var(--ink-3);
  background: var(--paper-2);
  position: relative;
}
.fv-search-wrap { flex: 1; position: relative; }
.fv-search-wrap::before {
  content: '🔍'; position: absolute;
  left: 8px; top: 50%; transform: translateY(-50%);
  font-size: 11px; opacity: .5;
}
.fv-search-wrap input {
  width: 100%; border: 1px solid var(--rule); border-radius: 8px;
  padding: 7px 10px 7px 26px;
  font-size: 12px; color: var(--ink-3);
  background: var(--paper-2);
  font-family: inherit;
}
.fv-search-wrap input::placeholder { color: var(--ink-4); }
.fv-cat-drop {
  padding: 7px 10px; border: 1px solid var(--rule); border-radius: 8px;
  background: var(--paper); font-size: 11px;
  display: flex; align-items: center; gap: 5px;
  cursor: pointer;
}
.fv-cat-drop .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cat-hist); }
.fv-mini-toggle {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1px solid var(--rule); background: var(--paper);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.fv-mini-toggle.active { background: var(--accent); border-color: var(--accent); }
.fv-mini-toggle.active .fv-ico-heart { background-color: var(--paper) !important; }

/* ───────────── Collapse variants A–D ───────────── */
.fv-col-bar {
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
}
.fv-col-lead {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; color: var(--ink-2);
}
.fv-col-lead .dots { display: flex; gap: 3px; }
.fv-col-lead .dots span {
  width: 7px; height: 7px; border-radius: 50%;
}
.fv-col-lead .lbl { font-weight: 500; }
.fv-col-lead .cnt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-4);
  letter-spacing: .05em;
}
.fv-col-chev {
  color: var(--ink-3);
  transition: transform .3s;
  font-size: 10px;
}
.fv-col-bar.open .fv-col-chev { transform: rotate(180deg); }
.fv-col-panel {
  background: var(--paper-2);
  border-bottom: 1px solid var(--rule);
  overflow: hidden;
}
.fv-col-panel-inner { padding: 12px 14px; }

.fv-chips-row {
  display: flex; gap: 6px; overflow-x: auto;
  padding: 8px 12px;
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
  scrollbar-width: none;
  align-items: center;
}
.fv-chips-row::-webkit-scrollbar { display: none; }
.fv-chip {
  flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 9px;
  border-radius: 14px;
  border: 1px solid var(--rule);
  background: var(--paper-2);
  font-size: 11px; color: var(--ink-2);
  cursor: pointer;
  white-space: nowrap;
}
.fv-chip.all {
  background: var(--ink); color: var(--paper); border-color: var(--ink);
}
.fv-chip .fv-chip-dot {
  width: 7px; height: 7px; border-radius: 50%;
}
.fv-chip .fv-chip-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--ink-4);
}
.fv-chip.all .fv-chip-num { color: rgba(255,255,255,.55); }
.fv-chip.dim { opacity: .45; }
.fv-more-btn {
  margin-left: auto;
  flex-shrink: 0;
  display: flex; align-items: center; gap: 4px;
  padding: 5px 9px;
  border: 1px solid var(--rule); border-radius: 14px;
  background: var(--paper);
  font-size: 11px; color: var(--ink-3);
  cursor: pointer; white-space: nowrap;
}

.fv-f-row {
  display: flex; flex-direction: column; gap: 6px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(203, 206, 197, .6);
}
.fv-f-row:last-child { border-bottom: none; }
.fv-f-lbl {
  display: flex; justify-content: space-between;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-3);
}
.fv-f-lbl .v { color: var(--ink); letter-spacing: .05em; }
.fv-f-range {
  position: relative; height: 20px;
  display: flex; align-items: center;
}
.fv-f-range .track {
  position: absolute; left: 0; right: 0; height: 3px;
  background: var(--rule); border-radius: 3px;
}
.fv-f-range .fill {
  position: absolute;
  height: 3px; background: var(--ink); border-radius: 3px;
}
.fv-f-range .h {
  position: absolute; top: 50%; transform: translate(-50%,-50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--paper); border: 2px solid var(--ink);
}

.fv-f-pills {
  display: flex; gap: 4px;
}
.fv-f-pill {
  padding: 4px 8px;
  border: 1px solid var(--rule); border-radius: 10px;
  font-size: 10.5px;
  background: var(--paper);
  color: var(--ink-2);
  cursor: pointer;
}
.fv-f-pill.active {
  background: var(--ink); color: var(--paper); border-color: var(--ink);
}

/* Popover for variant C */
.fv-pop {
  position: absolute; z-index: 5;
  top: 50px;
  width: 180px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 10px 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,.15);
  font-size: 11px;
}
.fv-pop::before {
  content: ''; position: absolute; top: -6px; left: 25px;
  width: 10px; height: 10px; background: var(--paper);
  border-left: 1px solid var(--rule); border-top: 1px solid var(--rule);
  transform: rotate(45deg);
}
.fv-pop-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-4);
  margin-bottom: 8px;
}
.fv-pop-title strong {
  color: var(--ink-2);
  font-family: 'Inter', sans-serif;
  font-size: 12px; letter-spacing: 0;
  text-transform: none; font-weight: 500;
}
.fv-pop-radio {
  display: flex; flex-direction: column; gap: 2px;
  margin-bottom: 8px;
}
.fv-pop-radio label {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 6px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--ink-2);
}
.fv-pop-radio label.active {
  background: var(--paper-2);
  color: var(--ink);
}
.fv-pop-radio .bullet {
  width: 10px; height: 10px; border-radius: 50%;
  border: 1px solid var(--rule-2);
  background: var(--paper);
  flex-shrink: 0;
}
.fv-pop-radio label.active .bullet {
  background: var(--ink);
  border-color: var(--ink);
  box-shadow: inset 0 0 0 2px var(--paper);
}
.fv-pop-actions {
  display: flex; gap: 4px;
  border-top: 1px solid var(--rule);
  padding-top: 8px;
  margin-top: 4px;
}
.fv-pop-actions button {
  flex: 1; padding: 5px;
  font-size: 10px;
  border: 1px solid var(--rule);
  border-radius: 5px;
  background: var(--paper);
  cursor: pointer; color: var(--ink-2);
}

/* FAB variant D */
.fv-fab {
  position: absolute;
  right: 14px; bottom: 14px;
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--ink); color: var(--paper);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(0,0,0,.25);
  cursor: pointer;
  border: none; z-index: 3;
}
.fv-fab-menu {
  position: absolute; right: 14px; bottom: 70px;
  width: 190px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 6px;
  box-shadow: 0 6px 20px rgba(0,0,0,.15);
  z-index: 4;
}
.fv-fab-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px; border-radius: 6px;
  font-size: 11px; color: var(--ink-2);
  cursor: pointer;
}
.fv-fab-row:hover { background: var(--paper-2); }
.fv-fab-row .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.fv-fab-row .state {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;

// Shared sample pins positioned on fake map
const SAMPLE_PINS = [
  { cat: 'hist', x: 18, y: 22, visited: true },
  { cat: 'arch', x: 32, y: 38, wished: true },
  { cat: 'fun',  x: 72, y: 28 },
  { cat: 'hist', x: 24, y: 55 },
  { cat: 'arch', x: 55, y: 58, visited: true },
  { cat: 'fun',  x: 78, y: 68, wished: true },
  { cat: 'hist', x: 14, y: 76 },
  { cat: 'arch', x: 48, y: 78 },
  { cat: 'fun',  x: 66, y: 44 },
  { cat: 'hist', x: 82, y: 84, visited: true },
  { cat: 'arch', x: 38, y: 18 },
  { cat: 'fun',  x: 60, y: 18 },
];

function SampleMap({ filterState = {}, caption = '' }) {
  // filterState: {hist: 'full'|'dim'|'hide', arch, fun, visited, wished}
  const order = { full: 0, dim: 1, hide: 2 };
  const s = { hist: 'full', arch: 'full', fun: 'full', visited: 'full', wished: 'full', ...filterState };
  const wishActive = s.wished !== 'full';
  const visActive = s.visited !== 'full';

  const pinClass = (p) => {
    let state = s[p.cat];
    if (wishActive && !p.wished) {
      if (order[s.wished] > order[state]) state = s.wished;
    }
    if (visActive && !p.visited) {
      if (order[s.visited] > order[state]) state = s.visited;
    }
    const cls = ['fv-pin', p.cat];
    if (p.visited) cls.push('visited');
    if (p.wished) cls.push('wished');
    if (state === 'dim') cls.push('dim');
    if (state === 'hide') cls.push('hide');
    return cls.join(' ');
  };

  return (
    <div className="fv-map">
      {caption && <div className="fv-status-cap">{caption}</div>}
      {SAMPLE_PINS.map((p, i) => (
        <span key={i} className={pinClass(p)}
          style={{ left: p.x + '%', top: p.y + '%' }}/>
      ))}
    </div>
  );
}

function VA2_Timeline() {
  const ERAS = [
    { id:'rom', name:'Romanán',    from: 1000, to: 1230 },
    { id:'got', name:'Gotika',      from: 1230, to: 1500 },
    { id:'ren', name:'Renesance',   from: 1500, to: 1620 },
    { id:'bar', name:'Baroko',      from: 1620, to: 1780 },
    { id:'emp', name:'Klasicismus', from: 1780, to: 1850 },
    { id:'sec', name:'Secese',      from: 1850, to: 1918 },
    { id:'mod', name:'Moderna',     from: 1918, to: 2000 },
  ];
  const START = 1000, END = 2000;
  const pct = (y) => ((y - START) / (END - START)) * 100;
  const years = [1000, 1200, 1400, 1600, 1800, 2000];
  const rFrom = 1230, rTo = 1780;
  const activeEra = (e) => e.to > rFrom && e.from < rTo;
  const activeCount = ERAS.filter(activeEra).length;
  return (
    <div className="fv-frame">
      <div className="fv-top">
        <FvLogo/>
        <IcoBtns/>
      </div>
      <div className="fv-col-bar open">
        <div className="fv-col-lead">
          <span className="dots">
            <span style={{background:'var(--cat-hist)'}}/>
            <span style={{background:'var(--cat-arch)'}}/>
            <span style={{background:'var(--cat-fun)'}}/>
          </span>
          <span className="lbl">Filtr</span>
          <span className="cnt">· {activeCount} SLOHY</span>
        </div>
        <span className="fv-col-chev">▾</span>
      </div>
      <div className="fv-col-panel" style={{maxHeight: 340}}>
        <div className="fv-col-panel-inner">
          <div className="fv-f-row">
            <div className="fv-f-lbl"><span>Kategorie</span></div>
            <div style={{display:'flex', gap:5, flexWrap:'wrap'}}>
              <span className="fv-chip" style={{background:'var(--paper)'}}><span className="fv-chip-dot" style={{background:'var(--cat-hist)'}}/>Historie <span className="fv-chip-num">12</span></span>
              <span className="fv-chip dim" style={{background:'var(--paper)'}}><span className="fv-chip-dot" style={{background:'var(--cat-arch)'}}/>Architektura <span className="fv-chip-num">8</span></span>
              <span className="fv-chip" style={{background:'var(--paper)'}}><span className="fv-chip-dot" style={{background:'var(--cat-fun)'}}/>Zajímavosti <span className="fv-chip-num">6</span></span>
            </div>
          </div>
          <div className="fv-f-row">
            <div className="fv-f-lbl" style={{marginBottom:4}}>
              <span>Období</span>
              <span className="v">{rFrom} — {rTo}</span>
            </div>
            <div className="fv-timeline-single">
              {/* era dividers */}
              {ERAS.slice(1).map(e => (
                <span key={e.id} className="fv-era-div" style={{left:`${pct(e.from)}%`}}/>
              ))}
              {/* slider track */}
              <div className="fv-era-track"/>
              <div className="fv-era-fill" style={{left:`${pct(rFrom)}%`, width:`${pct(rTo)-pct(rFrom)}%`}}/>
              {/* labels */}
              {ERAS.map(e => {
                const mid = (e.from + e.to) / 2;
                const w = pct(e.to) - pct(e.from);
                return (
                  <span key={e.id}
                    className={`fv-era-lbl ${activeEra(e)?'on':'off'}`}
                    style={{left:`${pct(mid)}%`, maxWidth:`calc(${w}% - 4px)`}}>
                    {e.name}
                  </span>
                );
              })}
              {/* year ticks */}
              {years.map(y => (
                <React.Fragment key={y}>
                  <span className="fv-year-lbl" style={{left:`${pct(y)}%`}}>{y}</span>
                  <span className="fv-year-tick" style={{left:`${pct(y)}%`}}/>
                </React.Fragment>
              ))}
              {/* handles */}
              <div className="fv-era-h" style={{left:`${pct(rFrom)}%`}}/>
              <div className="fv-era-h" style={{left:`${pct(rTo)}%`}}/>
            </div>
          </div>
          <div className="fv-f-row">
            <div className="fv-f-lbl"><span>Vzdálenost</span><span className="v">&lt; 1.2 km</span></div>
            <div className="fv-f-range">
              <div className="track"/>
              <div className="fill" style={{left:0, width:'40%'}}/>
              <div className="h" style={{left:'40%'}}/>
            </div>
          </div>
        </div>
      </div>
      <SampleMap filterState={{ hist:'dim', fun:'dim' }} caption="Gotika → Baroko"/>
    </div>
  );
}
