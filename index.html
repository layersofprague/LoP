<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LayersOfPrague — Holešovice</title>

  <script type="importmap">
  {
    "imports": {
      "three": "./three.min.js",
      "three/addons/renderers/CSS3DRenderer.js": "./CSS3DRenderer.js"
    }
  }
  </script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#c9a84c;--gold-lt:#e8c97a}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Georgia,serif;color:#fff;user-select:none;-webkit-tap-highlight-color:transparent}
    #ar-container{position:fixed;inset:0;z-index:1}
    #ar-container video,#ar-container canvas{position:absolute!important;inset:0;width:100%!important;height:100%!important;object-fit:cover}
    #overlay-img{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;opacity:.5;z-index:2;display:none;pointer-events:none}
    #hud{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column}
    #top-bar{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 20px 12px;background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent)}
    .logo{font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}
    .logo span{display:block;font-size:10px;color:rgba(255,255,255,.38);margin-top:2px}
    #status-pill{padding:5px 12px;border-radius:20px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);transition:all .4s;white-space:nowrap}
    #status-pill.scanning{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.5);color:var(--gold);animation:pulse 2s infinite}
    #status-pill.found{background:rgba(72,199,116,.2);border-color:rgba(72,199,116,.6);color:#48c774}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    #middle{flex:1;display:flex;align-items:center;justify-content:center}
    #scan-hint{text-align:center;padding:0 32px;font-size:13px;color:rgba(255,255,255,.4);line-height:1.7;transition:opacity .5s}
    #scan-hint strong{display:block;font-weight:400;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:4px}
    #bottom-panel{padding:0 20px 36px;background:linear-gradient(to top,rgba(0,0,0,.88),transparent);pointer-events:auto}
    #place-info{margin-bottom:16px;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s}
    #place-info.visible{opacity:1;transform:translateY(0)}
    .place-name{font-size:20px;color:var(--gold-lt)}
    .place-meta{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:4px}
    #slider-row{display:flex;align-items:center;gap:10px;opacity:0;transition:opacity .5s .2s}
    #slider-row.visible{opacity:1}
    .era{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.32);white-space:nowrap}
    #opacity-slider{-webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:3px;background:linear-gradient(to right,var(--gold) var(--val,50%),rgba(255,255,255,.15) var(--val,50%));outline:none}
    #opacity-slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:2.5px solid var(--gold);box-shadow:0 0 8px rgba(201,168,76,.5)}
    #loading{position:fixed;inset:0;z-index:50;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .5s}
    #loading.out{opacity:0;pointer-events:none}
    .ll{font-size:24px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
    .ls{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3)}
    .lb{width:120px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
    .lb div{height:100%;width:0;background:var(--gold);animation:lp 3s ease-out forwards}
    @keyframes lp{0%{width:0}60%{width:60%}100%{width:100%}}
    #dbg{position:fixed;bottom:8px;left:8px;z-index:99;font-size:12px;color:yellow;max-width:95vw;word-break:break-all;pointer-events:none;line-height:1.4}
    #error-box{display:none;position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.93);flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center}
    #error-box.show{display:flex}
    #error-box h2{color:var(--gold);font-size:20px}
    #error-box p{color:rgba(255,255,255,.5);font-size:13px;line-height:1.6;word-break:break-word}
    #error-box button{margin-top:8px;padding:12px 28px;background:var(--gold);color:#000;border:none;border-radius:8px;font-size:14px;cursor:pointer}
  </style>
</head>
<body>

<div id="loading">
  <div class="ll">LayersOfPrague</div>
  <div class="ls">Načítám AR vrstvu</div>
  <div class="lb"><div></div></div>
</div>

<div id="error-box">
  <h2>Chyba</h2>
  <p id="error-msg"></p>
  <button onclick="location.reload()">Zkusit znovu</button>
</div>

<div id="ar-container"></div>
<img id="overlay-img" src="foto/1_holesovice_then.jpg" alt="Holešovice ~1900" />

<div id="hud">
  <div id="top-bar">
    <div class="logo">LayersOfPrague<span>AR Beta · Praha 7</span></div>
    <div id="status-pill" class="scanning">Hledám fasádu…</div>
  </div>
  <div id="middle">
    <div id="scan-hint"><strong>Namiřte na budovu dozorství</strong>Tudor trámy a obloukové okno</div>
  </div>
  <div id="bottom-panel">
    <div id="place-info">
      <div class="place-name">Přístavní dozorství</div>
      <div class="place-meta">Holešovický přístav · nedatováno</div>
    </div>
    <div id="slider-row">
      <span class="era">~1900</span>
      <input type="range" id="opacity-slider" min="0" max="100" value="50" style="--val:50%"/>
      <span class="era">2026</span>
    </div>
  </div>
</div>

<div id="dbg">načítám...</div>

<script type="module">
import { MindARThree } from './mindar-image-three.prod.js';
document.getElementById('dbg').textContent = 'modul OK';

const dbg = document.getElementById('dbg');
const log = msg => { console.log(msg); dbg.textContent = msg; };

const loading    = document.getElementById('loading');
const errorBox   = document.getElementById('error-box');
const errorMsg   = document.getElementById('error-msg');
const overlayImg = document.getElementById('overlay-img');
const statusPill = document.getElementById('status-pill');
const placeInfo  = document.getElementById('place-info');
const sliderRow  = document.getElementById('slider-row');
const scanHint   = document.getElementById('scan-hint');
const slider     = document.getElementById('opacity-slider');

function showError(msg) {
  log('CHYBA: ' + msg);
  loading.classList.add('out');
  errorMsg.textContent = msg;
  errorBox.classList.add('show');
}

async function startAR() {
  log('MindARThree: ' + (typeof MindARThree !== 'undefined' ? 'OK' : 'CHYBI'));
  if (typeof MindARThree === 'undefined') { showError('MindARThree se nenacetlo.'); return; }

  log('Testuji kameru...');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    stream.getTracks().forEach(t => t.stop());
    log('Kamera OK');
  } catch(e) {
    showError('Kamera: ' + e.name + ' — ' + e.message);
    return;
  }

  try {
    log('Spouštím MindAR...');
    const mindarThree = new MindARThree({
      container: document.getElementById('ar-container'),
      imageTargetSrc: 'targets/holesovice.mind',
      uiLoading: 'no',
      uiScanning: 'no',
      uiError: 'no',
    });

    const { renderer, scene, camera } = mindarThree;
    const anchor = mindarThree.addAnchor(0);

    anchor.onTargetFound = () => {
      log('TARGET NALEZEN!');
      statusPill.textContent = 'Vrstva aktivní';
      statusPill.className = 'found';
      scanHint.style.opacity = '0';
      overlayImg.style.display = 'block';
      placeInfo.classList.add('visible');
      sliderRow.classList.add('visible');
    };

    anchor.onTargetLost = () => {
      log('Hledám...');
      statusPill.textContent = 'Hledám fasádu…';
      statusPill.className = 'scanning';
      scanHint.style.opacity = '1';
      overlayImg.style.display = 'none';
    };

    await mindarThree.start();
    log('Běží — namiř na budovu');

    loading.classList.add('out');
    setTimeout(() => loading.remove(), 600);

    renderer.setAnimationLoop(() => renderer.render(scene, camera));

  } catch(err) {
    showError(String(err));
  }
}

slider.addEventListener('input', e => {
  const v = e.target.value;
  slider.style.setProperty('--val', v + '%');
  overlayImg.style.opacity = v / 100;
});

startAR();
</script>
</body>
</html>
