<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LayersOfPrague — test</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; }
    #dbg { position: fixed; bottom: 8px; left: 8px; z-index: 99; font-size: 14px; color: yellow; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; }
  </style>
</head>
<body>

<a-scene
  mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; uiLoading: no; uiScanning: no; uiError: no;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <img id="card" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png" />
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
    <a-plane src="#card" position="0 0 0" height="0.552" width="1" rotation="0 0 0"></a-plane>
  </a-entity>
</a-scene>

<div id="dbg">načítám... [build 17 - pure aframe]</div>

<script>
  const dbg = document.getElementById('dbg');
  const arScene = document.getElementById('ar-scene') || document.querySelector('a-scene');
  const arTarget = document.getElementById('ar-target');

  arScene.addEventListener('arReady', () => { dbg.textContent = 'AR ready — namiř na vizitku'; });
  arScene.addEventListener('arError', (e) => { dbg.textContent = 'AR chyba: ' + JSON.stringify(e.detail); });

  arTarget.addEventListener('targetFound', () => { dbg.textContent = 'NALEZENO!'; });
  arTarget.addEventListener('targetLost',  () => { dbg.textContent = 'Hledám...'; });
</script>
</body>
</html>
