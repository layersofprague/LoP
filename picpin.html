<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Picture Pinning</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;width:100%;height:100%;overflow:hidden;font-family:'JetBrains Mono',monospace}

/* ── CAMERA ── */
#cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;display:none}
#cam.on{display:block}

/* ── OVERLAY IMAGE ── */
#ov{position:fixed;top:0;left:0;right:0;bottom:0;z-index:2;display:none;
  align-items:center;justify-content:center;pointer-events:none;
  transition:top .2s,bottom .2s,right .2s}
#ov.on{display:flex}
#ov img{max-width:95%;max-height:95%;transform-origin:center center}

/* scanlines */
#sl{position:fixed;inset:0;z-index:3;pointer-events:none;display:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px)}
#sl.on{display:block}

/* crosshair — RED */
#xh{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:36px;height:36px;z-index:4;pointer-events:none;display:none;
  transition:top .2s,left .2s}
#xh.on{display:block}
#xh::before,#xh::after{content:'';position:absolute;background:rgba(220,38,38,.85)}
#xh::before{width:1px;height:100%;left:50%}
#xh::after {height:1px;width:100%;top:50%}

/* anchor badge */
#b-anchor{position:fixed;top:34px;left:8px;z-index:11;font-size:9px;letter-spacing:.1em;
  padding:2px 7px;border-radius:3px;display:none;
  background:rgba(0,0,0,.3);border:1px solid rgba(16,185,129,.25);color:#10B981}
#b-anchor.on{display:block}
#b-err{position:fixed;top:34px;left:8px;z-index:11;font-size:9px;letter-spacing:.1em;
  padding:2px 7px;border-radius:3px;display:none;
  background:rgba(0,0,0,.4);border:1px solid rgba(220,38,38,.4);color:#EF4444}
#b-err.on{display:block}

/* ── LOAD SCREEN ── */
#scr-load{position:fixed;inset:0;z-index:20;background:#060606;
  display:flex;flex-direction:column;align-items:stretch;justify-content:center;
  gap:14px;padding:24px 20px;color:#C9D1D9;max-width:480px;margin:0 auto}
#scr-load.off{display:none}
.hero{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:.95;color:#F59E0B;text-align:center}
.hero-s{text-align:center;font-size:9px;letter-spacing:.15em;color:#2D3748;line-height:2;text-transform:uppercase;margin-top:3px}
.fz{border:1px dashed #1C1C1C;border-radius:6px;padding:18px 12px;text-align:center;cursor:pointer;
  position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;transition:border-color .2s}
.fz:hover{border-color:rgba(245,158,11,.3)}
.fz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.fz-icon{font-size:20px}.fz-lbl{font-size:9px;letter-spacing:.1em;color:#4B5563;text-transform:uppercase}
#prev{width:100%;max-height:110px;object-fit:contain;border-radius:4px;border:1px solid #111;display:none}
.gs{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:.1em;
  padding:3px 8px;border-radius:4px;border:1px solid #1A1A1A;color:#374151;cursor:pointer;width:fit-content}
.gs.ok{color:#10B981;border-color:rgba(16,185,129,.25)}
.gdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.gs.ok .gdot{animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-start{padding:10px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.1em;
  cursor:pointer;border-radius:5px;border:none;background:#F59E0B;color:#000;width:100%;transition:all .15s}
.btn-start:active{background:#D97706}

/* ── TOP BAR — no background, just floating text ── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:none;align-items:center;justify-content:space-between;
  padding:6px 12px;
  /* NO background, NO blur, NO border — transparent */
  background:none;
  pointer-events:none;
}
#topbar>*{pointer-events:auto}
.plbl{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.1em;
  color:rgba(220,38,38,.9);
  text-shadow:0 0 8px rgba(0,0,0,.8),0 1px 3px rgba(0,0,0,.9)}
.dots{display:flex;gap:5px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);transition:all .3s}
.dot.done  {background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.4)}
.dot.active{background:#EF4444;border-color:#EF4444;box-shadow:0 0 5px rgba(239,68,68,.6)}
/* gyro badge */
#gyro-tb{display:flex;align-items:center;gap:3px;font-size:8px;letter-spacing:.08em;
  padding:2px 5px;border-radius:3px;
  background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.3);cursor:pointer}
#gyro-tb.ok{color:rgba(16,185,129,.8);border-color:rgba(16,185,129,.2)}
/* gyro + orientation inline in topbar */
#ori-lbl{font-size:8px;letter-spacing:.06em;color:rgba(16,185,129,.7);
  background:rgba(0,0,0,.3);padding:2px 5px;border-radius:3px;
  text-shadow:none;display:none}
#ori-lbl.on{display:block}

/* ── BOTTOM PANEL — fully transparent glass ── */
#panel{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:rgba(0,0,0,.06);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.05);
  display:none;max-height:52vh;overflow-y:auto;
  transition:right .2s;
}
#panel.on{display:block}
#handle{display:flex;align-items:center;justify-content:space-between;
  padding:4px 10px 2px;cursor:pointer;user-select:none}
#handle-bar{width:26px;height:2px;border-radius:2px;background:rgba(255,255,255,.1);margin:0 auto}
#cbtn{font-size:8px;color:rgba(255,255,255,.18);padding:1px 4px;
  border:1px solid rgba(255,255,255,.07);border-radius:2px;
  cursor:pointer;background:none;font-family:'JetBrains Mono',monospace}
#pbody{padding:0 8px 8px}
#pbody.col{display:none}

/* ── SLIDERS — single col, tight ── */
.ctrl{display:flex;align-items:center;gap:3px;padding:1px 0}
.ck{font-size:7px;letter-spacing:.04em;text-transform:uppercase;
  color:rgba(255,255,255,.25);width:38px;flex-shrink:0}
.cv{font-size:8px;color:rgba(220,38,38,.9);width:28px;text-align:right;flex-shrink:0;
  text-shadow:0 0 6px rgba(220,38,38,.3)}
input[type=range].rng{-webkit-appearance:none;appearance:none;flex:1;height:2px;
  background:rgba(255,255,255,.1);border-radius:1px;outline:none;cursor:pointer;min-width:0}
input[type=range].rng::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:#EF4444;cursor:pointer;
  border:2px solid rgba(0,0,0,.5);box-shadow:0 0 4px rgba(239,68,68,.4)}
.sb{width:20px;height:20px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);
  border-radius:3px;cursor:pointer;font-size:13px;line-height:1;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.sb:active{background:rgba(220,38,38,.1);color:#EF4444;border-color:rgba(220,38,38,.2)}

/* ── BUTTONS ── */
.br{display:flex;gap:4px;margin-top:5px}
.br>.btn{flex:1}
.btn{padding:6px 4px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.05em;
  cursor:pointer;border-radius:4px;border:none;width:100%;transition:all .15s}
.btn:active{transform:scale(.97)}
.bp{background:rgba(245,158,11,.6);color:#000}.bp:active{background:rgba(245,158,11,.8)}
.bg{background:rgba(16,185,129,.6);color:#000}.bg:active{background:rgba(16,185,129,.8)}
.bs{background:rgba(255,255,255,.05);color:rgba(255,255,255,.28);
  border:1px solid rgba(255,255,255,.08);font-size:12px}
.bok{background:rgba(16,185,129,.65);color:#000}

/* data box */
.db{background:rgba(0,0,0,.1);border:1px solid rgba(255,255,255,.06);
  border-radius:4px;padding:5px 7px;font-size:9px;line-height:1.8}
.dr{display:flex;justify-content:space-between}
.dk{color:rgba(255,255,255,.2)}.dv{color:rgba(16,185,129,.75)}

/* ── LANDSCAPE ── */
@media (orientation:landscape){
  #panel.on{top:0;bottom:0;left:auto;right:0;width:40vw;max-height:100vh;
    border-top:none;border-left:1px solid rgba(255,255,255,.05)}
  #handle{display:none}
  #pbody.col{display:block}
}

/* ── STEP 3: distance display ── */
#dst-wrap{padding:6px 8px 4px;text-align:center}
#dst-status{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.08em;
  color:rgba(220,38,38,.85)}
#dst-status.ok{color:rgba(16,185,129,.9)}
#dst-val{font-size:22px;font-family:'Bebas Neue',sans-serif;letter-spacing:.05em;
  color:rgba(220,38,38,.85)}
#dst-val.ok{color:rgba(16,185,129,.9)}

/* ── MAP OVERLAY — fullscreen ── */
#map-ov{position:fixed;inset:0;z-index:15;display:none;flex-direction:column}
#map-ov.on{display:flex}
#leafmap{flex:1;min-height:0}
.leaflet-container{cursor:crosshair!important;background:#f0efe9}

/* map bottom bar */
#map-bar{
  background:rgba(0,0,0,.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,.07);
  padding:8px 10px 10px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}

.map-mode-row{display:flex;gap:4px;margin-bottom:2px}
.mmode{flex:1;padding:5px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.06em;
  border:none;border-radius:4px;cursor:pointer;transition:all .15s;
  background:rgba(255,255,255,.06);color:rgba(255,255,255,.35)}
.mmode.active-user{background:rgba(74,158,255,.2);color:rgba(74,158,255,.9);border:1px solid rgba(74,158,255,.3)}
.mmode.active-bld {background:rgba(239,68,68,.15);color:rgba(239,68,68,.9);border:1px solid rgba(239,68,68,.25)}

.map-pts{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.map-pt{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07);
  border-radius:4px;padding:5px 6px}
.mp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.mp-lbl{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.mp-val{font-size:8px;color:rgba(255,255,255,.4);line-height:1.5;min-height:20px}
.mp-val.ok{color:rgba(16,185,129,.8)}
.mp-nudge{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.mn{font-size:8px;padding:2px 5px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);
  border-radius:3px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .1s}
.mn:active{background:rgba(255,255,255,.12);color:#fff}

.map-dst-row{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px}
.map-dst-lbl{color:rgba(255,255,255,.3);letter-spacing:.06em}
.map-dst-num{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.05em;color:rgba(220,38,38,.85)}
.map-dst-num.ok{color:rgba(16,185,129,.9)}
.map-dst-unit{font-size:10px;color:rgba(255,255,255,.3)}

.map-hint-txt{font-size:9px;letter-spacing:.06em;color:rgba(255,255,255,.3);text-align:center}
</style>
</head>
<body>

<video id="cam" autoplay muted playsinline></video>
<div id="ov"><img id="ov-photo" src="" alt=""></div>
<div id="sl"></div>
<div id="xh"></div>
<div id="b-anchor">● UKOTVENO</div>
<div id="b-err"></div>

<!-- LOAD -->
<div id="scr-load">
  <div>
    <div class="hero">PICTURE<br>PINNING</div>
    <div class="hero-s">Historické fotografie<br>ukotvené v prostoru</div>
  </div>
  <label class="fz">
    <input type="file" accept="image/*" id="file-input">
    <div class="fz-icon" id="fz-icon">🗂</div>
    <div class="fz-lbl" id="fz-lbl">Načíst historickou fotografii</div>
  </label>
  <img id="prev" alt="">
  <div class="gs" id="gs-load" onclick="reqGyro()"><div class="gdot"></div><span>BEZ GYRA</span></div>
  <button class="btn-start" id="btn-start" style="display:none" onclick="startCam()">SPUSTIT KAMERU →</button>
</div>

<!-- TOP BAR — no background -->
<div id="topbar">
  <div class="plbl" id="plbl">—</div>
  <div id="ori-lbl"></div>
  <div style="display:flex;align-items:center;gap:6px">
    <div id="gyro-tb" onclick="reqGyro()"><div class="gdot"></div>GYRO</div>
    <div class="dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    </div>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div id="handle" onclick="toggleC()">
    <div style="width:20px"></div>
    <div id="handle-bar"></div>
    <button id="cbtn">▲</button>
  </div>
  <div id="pbody">

    <!-- KROK 2: ZAROVNAT -->
    <div id="pa" style="display:none">
      <div class="ctrl"><span class="ck">Opac</span><button class="sb" onclick="stp('opa',-1)">−</button><input type="range" class="rng" id="s-opa" min="0" max="100" value="50" oninput="upd('opa',this.value,'%')"><button class="sb" onclick="stp('opa',1)">+</button><span class="cv" id="v-opa">50%</span></div>
      <div class="ctrl"><span class="ck">Vel</span><button class="sb" onclick="stp('sz',-1)">−</button><input type="range" class="rng" id="s-sz" min="10" max="300" value="100" oninput="upd('sz',this.value,'%')"><button class="sb" onclick="stp('sz',1)">+</button><span class="cv" id="v-sz">100%</span></div>
      <div class="ctrl"><span class="ck">X</span><button class="sb" onclick="stp('px',-1)">−</button><input type="range" class="rng" id="s-px" min="-500" max="500" value="0" oninput="upd('px',this.value,'px')"><button class="sb" onclick="stp('px',1)">+</button><span class="cv" id="v-px">0</span></div>
      <div class="ctrl"><span class="ck">Y</span><button class="sb" onclick="stp('py',-1)">−</button><input type="range" class="rng" id="s-py" min="-500" max="500" value="0" oninput="upd('py',this.value,'px')"><button class="sb" onclick="stp('py',1)">+</button><span class="cv" id="v-py">0</span></div>
      <div class="ctrl"><span class="ck">Nákl X</span><button class="sb" onclick="stp('rx',-1)">−</button><input type="range" class="rng" id="s-rx" min="-60" max="60" value="0" oninput="upd('rx',this.value,'°')"><button class="sb" onclick="stp('rx',1)">+</button><span class="cv" id="v-rx">0°</span></div>
      <div class="ctrl"><span class="ck">Nákl Y</span><button class="sb" onclick="stp('ry',-1)">−</button><input type="range" class="rng" id="s-ry" min="-60" max="60" value="0" oninput="upd('ry',this.value,'°')"><button class="sb" onclick="stp('ry',1)">+</button><span class="cv" id="v-ry">0°</span></div>
      <!-- AR mode toggle + calibration — tiny row above main buttons -->
      <div style="display:flex;gap:4px;margin-top:5px">
        <button id="btn-ar-mode" class="btn bs"
          style="font-size:10px;padding:4px;color:rgba(16,185,129,.8);flex:1"
          onclick="toggleARMode()" title="Přepnout režim AR sledování">⟳ Gyro</button>
        <button id="btn-calib" class="btn bs"
          style="font-size:10px;padding:4px;color:rgba(255,255,255,.25);flex:1"
          onclick="loadCalibJSON()" title="Načíst kalibraci z JSON">⊕ Kalib</button>
      </div>
      <div class="br">
        <button class="btn bs" onclick="goBack()">←</button>
        <button class="btn bg" onclick="doFix()">FIX ⊕</button>
      </div>
    </div>

    <!-- KROK 3: VZDÁLENOST — jen mapa + vzdálenost, žádné slidery -->
    <div id="po" style="display:none">
      <div id="dst-wrap">
        <div id="dst-status">VZDÁLENOST NENÍ NASTAVENA</div>
        <div id="dst-val">—</div>
      </div>
      <div class="br">
        <button class="btn bs" onclick="setPhase('align')">← ZPĚT</button>
        <button class="btn bp" onclick="openMap()">📍 OTEVŘÍT MAPU</button>
        <button class="btn bg" id="btn-anch" onclick="doAnchor()" disabled
          style="opacity:.35;cursor:not-allowed">UKOTVIT ◎</button>
      </div>
    </div>

    <!-- KROK 4: UKOTVENO -->
    <div id="panch" style="display:none">
      <div class="db" id="anch-db">—</div>
      <div class="br" style="margin-top:6px">
        <button class="btn bs" onclick="doReset()">RESET</button>
        <button class="btn bp" id="btn-copy" onclick="doCopy()">KOPÍROVAT JSON</button>
      </div>
    </div>

  </div>
</div>

<!-- MAP OVERLAY — fullscreen, CartoDB Light -->
<div id="map-ov">
  <div id="leafmap"></div>
  <div id="map-bar">

    <!-- Mode selector -->
    <div class="map-mode-row">
      <button class="mmode active-user" id="mm-user" onclick="setMapMode('user')">📍 Moje poloha</button>
      <button class="mmode" id="mm-bld"  onclick="setMapMode('bld')">🏛 Budova</button>
    </div>

    <!-- Two point cards -->
    <div class="map-pts">
      <!-- user -->
      <div class="map-pt">
        <div class="mp-hd">
          <span class="mp-lbl" style="color:rgba(74,158,255,.7)">Já</span>
          <button class="mn" onclick="locateMe()" title="GPS">⊕</button>
        </div>
        <div class="mp-val" id="mp-user-val">—</div>
        <div class="mp-nudge" id="mp-user-nudge" style="display:none">
          <button class="mn" onclick="nudge('user','lat', .0001)">N↑</button>
          <button class="mn" onclick="nudge('user','lat',-.0001)">S↓</button>
          <button class="mn" onclick="nudge('user','lng', .0001)">E→</button>
          <button class="mn" onclick="nudge('user','lng',-.0001)">W←</button>
        </div>
      </div>
      <!-- building -->
      <div class="map-pt">
        <div class="mp-hd">
          <span class="mp-lbl" style="color:rgba(239,68,68,.7)">Budova</span>
        </div>
        <div class="mp-val" id="mp-bld-val">klikni na mapu</div>
        <div class="mp-nudge" id="mp-bld-nudge" style="display:none">
          <button class="mn" onclick="nudge('bld','lat', .0001)">N↑</button>
          <button class="mn" onclick="nudge('bld','lat',-.0001)">S↓</button>
          <button class="mn" onclick="nudge('bld','lng', .0001)">E→</button>
          <button class="mn" onclick="nudge('bld','lng',-.0001)">W←</button>
        </div>
      </div>
    </div>

    <!-- Distance -->
    <div class="map-dst-row">
      <span class="map-dst-lbl">VZDÁLENOST</span>
      <span class="map-dst-num" id="map-dst-num">—</span>
      <span class="map-dst-unit">m</span>
    </div>

    <div id="map-hint-txt" class="map-hint-txt">Klepněte na mapu pro označení budovy</div>

    <div class="br" style="margin-top:0">
      <button class="btn bs" onclick="closeMap()">← ZPĚT</button>
      <button class="btn bg" id="map-ok" onclick="confirmMap()" disabled style="opacity:.35">POTVRDIT ✓</button>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const TR={opa:50,sz:100,px:0,py:0,rx:0,ry:0};
const KEYS={opa:{min:0,max:100,u:'%'},sz:{min:10,max:300,u:'%'},
  px:{min:-500,max:500,u:'px'},py:{min:-500,max:500,u:'px'},
  rx:{min:-60,max:60,u:'°'},ry:{min:-60,max:60,u:'°'}};
let phase='load',gyroOk=false,ori={a:0,b:0,g:0},refOri=null;
let dst=0,anchData=null,rafId=null,collapsed=false;
let userLL=null,bldLL=null,leafMap=null,userMark=null,bldMark=null,mapMode='user';
let accCircle=null; // GPS accuracy circle
let userFromGPS=false; // false = manually placed
// ── Gyro integration for AR ──
let useGyroAR=false; // toggle: false=compass(alpha), true=gyro integration
let gyroAngles={x:0,y:0}; // integrated from FIX point
let gyroLastT=null;
let yawCalibOffset=0; // loaded from calibration JSON
const $=id=>document.getElementById(id);
const on=(el,cls,add)=>el.classList[add?'add':'remove'](cls);

// ── LAYOUT ────────────────────────────────────────────────────────────────
function updateLayout(){
  const ov=$('ov'),xh=$('xh'),panel=$('panel');
  const ls=window.innerWidth>window.innerHeight;
  const open=!collapsed&&panel.classList.contains('on');
  if(ls&&open){
    const sw=window.innerWidth*.40;
    ov.style.cssText='top:0;left:0;right:'+sw+'px;bottom:0;';
    xh.style.left=((window.innerWidth-sw)/2)+'px';
    xh.style.top='50%';
  } else if(!ls&&open){
    const ph=panel.offsetHeight;
    const tbh=$('topbar').offsetHeight||30;
    ov.style.cssText='top:'+tbh+'px;left:0;right:0;bottom:'+ph+'px;';
    xh.style.left='50%';
    xh.style.top=(tbh+(window.innerHeight-ph-tbh)/2)+'px';
  } else {
    ov.style.cssText='top:0;left:0;right:0;bottom:0;';
    xh.style.left='50%'; xh.style.top='50%';
  }
}
new ResizeObserver(updateLayout).observe($('panel'));
window.addEventListener('resize',updateLayout);
window.addEventListener('orientationchange',()=>setTimeout(updateLayout,100));

// ── GYRO — prefer deviceorientationabsolute (Chrome/Samsung spolehlivější) ──
(function(){
  if(!('DeviceOrientationEvent' in window)) return;
  gyroOk=true; syncG();
  const evtName = ('ondeviceorientationabsolute' in window)
    ? 'deviceorientationabsolute' : 'deviceorientation';
  window.addEventListener(evtName, e=>{
    // alpha může být null na zařízeních bez kompasu — zachovat předchozí hodnotu
    if(e.alpha != null) ori.a = e.alpha;
    ori.b = e.beta  || 0;
    ori.g = e.gamma || 0;
    const ol=$('ori-lbl');
    if(ol.classList.contains('on'))
      ol.textContent='α'+ori.a.toFixed(0)+'° β'+ori.b.toFixed(0)+'°';
  }, true);
}());
// DeviceMotionEvent — gyro integration for AR (reliable horizontal tracking)
window.addEventListener('devicemotion', e=>{
  if(!e.rotationRate || !useGyroAR) return;
  const now=performance.now();
  if(gyroLastT!==null && phase==='anchored'){
    const dt=(now-gyroLastT)/1000;
    gyroAngles.x += (e.rotationRate.alpha||0)*dt;
    gyroAngles.y += (e.rotationRate.beta ||0)*dt;
  }
  gyroLastT=now;
},true);

async function reqGyro(){
  if(typeof DeviceOrientationEvent?.requestPermission==='function')
    if(await DeviceOrientationEvent.requestPermission()==='granted'){gyroOk=true;syncG();}
}
function syncG(){
  const t=gyroOk?'OK':'—',c=gyroOk?'ok':'';
  const el=$('gyro-tb'); el.className=c;
  el.innerHTML='<div class="gdot"></div>GYRO '+t;
  const gl=$('gs-load'); if(!gl)return;
  gl.className='gs '+(gyroOk?'ok':'');
  gl.innerHTML='<div class="gdot"></div>'+(gyroOk?'GYRO OK':'BEZ GYRA');
}

// ── CAMERA ────────────────────────────────────────────────────────────────
function startCam(){
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}
  }).then(s=>{
    $('cam').srcObject=s;
    on($('cam'),'on',true); on($('sl'),'on',true);
    on($('scr-load'),'off',true);
    $('topbar').style.display='flex';
    setPhase('align');
  }).catch(e=>{
    $('b-err').textContent=e.name+': '+e.message;
    on($('b-err'),'on',true);
  });
}

// ── COLLAPSE ──────────────────────────────────────────────────────────────
function toggleC(){
  if(window.innerWidth>window.innerHeight) return;
  collapsed=!collapsed;
  $('pbody').style.display=collapsed?'none':'block';
  $('cbtn').textContent=collapsed?'▼':'▲';
  setTimeout(updateLayout,40);
}

// ── PHASE ─────────────────────────────────────────────────────────────────
const PLBLS={align:'ZAROVNAT',offset:'VZDÁLENOST',anchored:'UKOTVENO'};
const PIDX ={align:1,offset:2,anchored:3};
const PCLR ={align:'rgba(220,38,38,.9)',offset:'rgba(220,38,38,.9)',anchored:'rgba(16,185,129,.9)'};

function setPhase(p){
  phase=p;
  const lbl=$('plbl');
  lbl.textContent=PLBLS[p]; lbl.style.color=PCLR[p];
  for(let i=0;i<4;i++){const d=$('d'+i);
    d.className='dot'+(i<PIDX[p]?' done':'')+(i===PIDX[p]?' active':'');}
  collapsed=false; $('pbody').style.display='block'; $('cbtn').textContent='▲';
  on($('panel'),'on',true);
  $('pa').style.display   =p==='align'   ?'block':'none';
  $('po').style.display   =p==='offset'  ?'block':'none';
  $('panch').style.display=p==='anchored'?'block':'none';
  on($('ov'),'on', !!$('ov-photo').src&&$('ov-photo').src!==location.href);
  applyTR();
  on($('xh'),'on',p==='align');
  // orientation label in topbar only when camera active
  on($('ori-lbl'),'on',(p==='align'||p==='offset')&&gyroOk);
  on($('b-anchor'),'on',p==='anchored');
  on($('b-err'),'on',false);
  if(p==='anchored'){stopAR();startAR();fillAnch();}
  else stopAR();
  // Step 3: auto-open map immediately
  if(p==='offset') setTimeout(openMap,300);
  setTimeout(updateLayout,60);
}

// ── TRANSFORM ─────────────────────────────────────────────────────────────
function applyTR(dx,dy){
  const img=$('ov-photo');
  img.style.opacity=TR.opa/100;
  img.style.transform=`translate(${TR.px+(dx||0)}px,${TR.py+(dy||0)}px) scale(${TR.sz/100}) perspective(800px) rotateX(${TR.rx}deg) rotateY(${TR.ry}deg)`;
  img.style.transition=dx!==undefined?'transform 60ms linear':'none';
}

// ── SLIDERS ───────────────────────────────────────────────────────────────
function upd(k,v,u){TR[k]=+v;$('v-'+k).textContent=v+u;applyTR();}
function stp(k,d){const e=$('s-'+k),m=KEYS[k];const v=Math.min(m.max,Math.max(m.min,TR[k]+d));e.value=v;upd(k,v,m.u);}

// ── MAP ───────────────────────────────────────────────────────────────────
function haversine(la1,lo1,la2,lo2){
  const R=6371000,dL=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dl/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function openMap(){
  on($('map-ov'),'on',true);
  if(!leafMap){
    leafMap=L.map('leafmap',{zoomControl:false,attributionControl:false});
    L.control.zoom({position:'bottomright'}).addTo(leafMap);
    // CartoDB Light All — stejná mapa jako LayersOfPrague
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
      attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:20
    }).addTo(leafMap);
    leafMap.on('click',onMapClick);
    leafMap.setView([50.0835,14.4200],14);
  }
  setTimeout(()=>leafMap.invalidateSize(),120);

  // Obnoví stav tlačítka a markerů při opakovaném otevření
  const ok=$('map-ok');
  if(dst>0){
    ok.disabled=false; ok.style.opacity='1'; ok.style.cursor='pointer';
    const n=$('map-dst-num'); n.textContent=dst; n.className='map-dst-num ok';
  } else {
    ok.disabled=true; ok.style.opacity='.35'; ok.style.cursor='not-allowed';
  }
  // Znovu vykreslí existující markery (po reset/reinit mapy)
  if(userLL && !userMark){
    userMark=L.circleMarker(userLL,{radius:8,color:'#EF4444',fillColor:'#EF4444',fillOpacity:.85,weight:2,zIndexOffset:1000})
      .bindTooltip('Já',{permanent:true,direction:'top',offset:[0,-10]}).addTo(leafMap);
    $('mp-user-val').textContent=userLL[0].toFixed(5)+'\n'+userLL[1].toFixed(5);
    $('mp-user-val').className='mp-val ok';
    $('mp-user-nudge').style.display='flex';
  }
  if(bldLL && !bldMark){
    bldMark=L.circleMarker(bldLL,{radius:9,color:'#10B981',fillColor:'#10B981',fillOpacity:.85,weight:2,zIndexOffset:900})
      .bindTooltip('Budova',{permanent:true,direction:'top',offset:[0,-10]}).addTo(leafMap);
    $('mp-bld-val').textContent=bldLL[0].toFixed(5)+'\n'+bldLL[1].toFixed(5);
    $('mp-bld-val').className='mp-val ok';
    $('mp-bld-nudge').style.display='flex';
  }
  // Zoom na poslední known pozici
  if(userLL) leafMap.setView(userLL, leafMap.getZoom() || 17);
  setMapMode(bldLL ? 'bld' : 'user');
  // GPS pouze pokud ještě nemáme polohu
  if(!userLL) locateMe();
}

function setMapMode(m){
  mapMode=m;
  $('mm-user').className='mmode'+(m==='user'?' active-user':'');
  $('mm-bld').className ='mmode'+(m==='bld' ?' active-bld' :'');
  $('map-hint-txt').textContent = m==='user'
    ? 'Klepněte na mapu pro upřesnění vaší polohy'
    : 'Klepněte na mapu pro označení budovy';
}

function locateMe(){
  if(!navigator.geolocation){$('mp-user-val').textContent='GPS nedostupné';return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const ll=[pos.coords.latitude,pos.coords.longitude];
    setUserLL(ll, pos.coords.accuracy); // pass accuracy for circle
    if(leafMap) leafMap.setView(ll,17);
  },()=>{$('mp-user-val').textContent='GPS selhalo';});
}

function setUserLL(ll, accuracy){
  userLL=ll;
  userFromGPS = (accuracy !== undefined);
  $('mp-user-val').textContent=ll[0].toFixed(5)+'\n'+ll[1].toFixed(5);
  $('mp-user-val').className='mp-val ok';
  $('mp-user-nudge').style.display='flex';
  // Red marker (user position is always red)
  if(userMark) userMark.setLatLng(ll);
  else userMark=L.circleMarker(ll,{radius:8,color:'#EF4444',fillColor:'#EF4444',fillOpacity:.85,weight:2,zIndexOffset:1000})
    .bindTooltip('Já',{permanent:true,direction:'top',offset:[0,-10]}).addTo(leafMap);
  // GPS accuracy circle — shown only when from GPS, removed when manually placed
  if(accCircle){accCircle.remove();accCircle=null;}
  if(accuracy && accuracy<5000){
    accCircle=L.circle(ll,{radius:accuracy,color:'#EF4444',fillColor:'#EF4444',
      fillOpacity:.06,weight:1,dashArray:'4,4'}).addTo(leafMap);
  }
  calcDist();
}

function setBldLL(ll){
  bldLL=ll;
  $('mp-bld-val').textContent=ll[0].toFixed(5)+'\n'+ll[1].toFixed(5);
  $('mp-bld-val').className='mp-val ok';
  $('mp-bld-nudge').style.display='flex';
  if(bldMark) bldMark.setLatLng(ll);
  else bldMark=L.circleMarker(ll,{radius:9,color:'#10B981',fillColor:'#10B981',fillOpacity:.85,weight:2,zIndexOffset:900})
    .bindTooltip('Budova',{permanent:true,direction:'top',offset:[0,-10]}).addTo(leafMap);
  calcDist();
}

function onMapClick(e){
  const ll=[e.latlng.lat,e.latlng.lng];
  if(mapMode==='user'){
    // manual click: remove GPS accuracy circle
    if(accCircle){accCircle.remove();accCircle=null;}
    setUserLL(ll);
  } else setBldLL(ll);
}

function nudge(who,axis,delta){
  const cur=who==='user'?userLL:bldLL;
  if(!cur) return;
  const ll=[...cur];
  if(axis==='lat') ll[0]+=delta; else ll[1]+=delta;
  if(who==='user'){
    // manual nudge: no accuracy circle (pass no accuracy param)
    if(accCircle){accCircle.remove();accCircle=null;}
    setUserLL(ll);
  } else setBldLL(ll);
  if(leafMap) leafMap.panTo(ll);
}

function calcDist(){
  if(!userLL||!bldLL) return;
  dst=haversine(...userLL,...bldLL);
  const n=$('map-dst-num');
  n.textContent=dst; n.className='map-dst-num ok';
  const ok=$('map-ok'); ok.disabled=false; ok.style.opacity='1'; ok.style.cursor='pointer';
  updOffsetDst();
}

function updOffsetDst(){
  const s=$('dst-status'),v=$('dst-val'),b=$('btn-anch');
  if(dst>0){
    s.textContent='VZDÁLENOST NASTAVENA'; s.className='ok';
    v.textContent=dst+' m'; v.className='ok';
    b.disabled=false; b.style.opacity='1'; b.style.cursor='pointer';
  } else {
    s.textContent='VZDÁLENOST NENÍ NASTAVENA'; s.className='';
    v.textContent='—'; v.className='';
    b.disabled=true; b.style.opacity='.35'; b.style.cursor='not-allowed';
  }
}

function confirmMap(){on($('map-ov'),'on',false); updOffsetDst();}
function closeMap()  {on($('map-ov'),'on',false); updOffsetDst();}

// ── AR ────────────────────────────────────────────────────────────────────
function angleDiff(a,b){let d=a-b;while(d>180)d-=360;while(d<-180)d+=360;return d;}
function startAR(){
  if(!gyroOk||!refOri) return;
  // reset gyro integration from current anchor point
  gyroAngles={x:0,y:0}; gyroLastT=null;
  const ppd=window.innerWidth/65;
  function loop(){
    let dx,dy;
    if(useGyroAR){
      // GYRO mode: integrate rotationRate.alpha (yaw) and .beta (pitch)
      // Most reliable for horizontal tracking — no magnetometer dependency
      dx = -gyroAngles.x * ppd;
      dy =  gyroAngles.y * ppd;
    } else {
      // COMPASS mode: use alpha (yaw) with beta-tilt correction
      // cos(beta) reduces horizontal sensitivity at forward tilt (more accurate)
      const beta_r = refOri.b * Math.PI / 180;
      const alpha_d = angleDiff(ori.a + yawCalibOffset, refOri.a + yawCalibOffset);
      dx = -alpha_d * Math.cos(beta_r) * ppd;
      dy = (ori.b - refOri.b) * ppd;
    }
    applyTR(dx,dy);
    const el=$('ar-d');
    if(el) el.textContent=(useGyroAR?'⟳':'🧭')+' Δ '+dx.toFixed(0)+' '+dy.toFixed(0);
    rafId=requestAnimationFrame(loop);
  }
  rafId=requestAnimationFrame(loop);
}
function stopAR(){if(rafId){cancelAnimationFrame(rafId);rafId=null;}}

// Toggle AR mode compass ↔ gyro
function toggleARMode(){
  useGyroAR=!useGyroAR;
  const b=$('btn-ar-mode');
  b.textContent = useGyroAR ? '🧭 Kompas' : '⟳ Gyro';
  b.style.color  = useGyroAR ? 'rgba(245,158,11,.8)' : 'rgba(16,185,129,.8)';
  b.title = useGyroAR ? 'Režim: Gyroskop (resetuje se při FIX)' : 'Režim: Kompas (absolutní heading)';
  // restart AR with new mode
  if(phase==='anchored'){stopAR();startAR();}
}

// Load calibration JSON and extract yaw offset
function loadCalibJSON(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.offsets && d.offsets.yaw!==undefined){
          yawCalibOffset=-d.offsets.yaw; // invert: offsets.yaw is how much measured is off
          const b=$('btn-calib');
          b.textContent='⊕ Kalib: '+yawCalibOffset.toFixed(1)+'°';
          b.style.color='rgba(16,185,129,.8)';
          alert('Kalibrace načtena. Yaw offset: '+yawCalibOffset.toFixed(2)+'°\n(platí jen v režimu kompas)');
        } else alert('JSON neobsahuje offsets.yaw');
      }catch(e){alert('Chyba parsování JSON: '+e.message);}
    };
    r.readAsText(f);
  };
  inp.click();
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function doFix(){
  refOri={...ori};
  const lbl=$('plbl');
  lbl.textContent='ZAROVNÁNO'; lbl.style.color='rgba(16,185,129,.9)';
  setTimeout(()=>setPhase('offset'),600);
}

function doAnchor(){
  anchData={refOri:{...refOri},distM:dst,userLL,bldLL,tr:{...TR},ts:new Date().toISOString()};
  setPhase('anchored');
}

function fillAnch(){
  $('anch-db').innerHTML=`
    <div class="dr"><span class="dk">Vzdálenost</span><span class="dv">${anchData.distM} m</span></div>
    <div class="dr"><span class="dk">α yaw</span><span class="dv">${anchData.refOri.a.toFixed(1)}°</span></div>
    <div class="dr"><span class="dk">β pitch</span><span class="dv">${anchData.refOri.b.toFixed(1)}°</span></div>
    <div class="dr"><span class="dk">Opacita / Vel</span><span class="dv">${anchData.tr.opa}% / ${anchData.tr.sz}%</span></div>
    ${gyroOk?'<div class="dr" style="margin-top:2px;border-top:1px solid rgba(255,255,255,.05);padding-top:2px"><span class="dk">AR Δ</span><span class="dv" id="ar-d">—</span></div>':''}`;
}

async function doCopy(){
  try{await navigator.clipboard.writeText(JSON.stringify(anchData,null,2));}catch(e){}
  const b=$('btn-copy'); b.textContent='✓ OK'; b.className='btn bok';
  setTimeout(()=>{b.textContent='KOPÍROVAT JSON';b.className='btn bp';},2000);
}

function goBack(){
  stopAR();
  const c=$('cam');
  if(c.srcObject) c.srcObject.getTracks().forEach(t=>t.stop());
  c.srcObject=null;
  on(c,'on',false); on($('sl'),'on',false); on($('ov'),'on',false);
  on($('panel'),'on',false); on($('b-anchor'),'on',false);
  $('topbar').style.display='none';
  on($('scr-load'),'off',false); phase='load';
}
function doReset(){
  Object.assign(TR,{opa:50,sz:100,px:0,py:0,rx:0,ry:0});
  for(const k of Object.keys(KEYS)){const e=$('s-'+k);if(e)e.value=TR[k];}
  refOri=null; anchData=null; dst=0; bldLL=null; userLL=null;
  goBack();
}

// ── FILE INPUT ─────────────────────────────────────────────────────────────
$('file-input').addEventListener('change',function(e){
  const f=e.target.files[0]; if(!f) return;
  const url=URL.createObjectURL(f);
  $('ov-photo').src=url;
  $('prev').src=url; $('prev').style.display='block';
  $('fz-icon').textContent='✓';
  $('fz-lbl').textContent='Načteno — změnit';
  $('btn-start').style.display='block';
});
</script>
