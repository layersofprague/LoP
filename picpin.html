<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Picture Pinning</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ────────────────────────────────────────────────────────────────────────────
const PHASES = ['load', 'align', 'offset', 'anchored'];
const LABELS = {
  load:     '01 — NAČÍST',
  align:    '02 — ZAROVNAT',
  offset:   '03 — VZDÁLENOST',
  anchored: '04 — UKOTVENO',
};

// ────────────────────────────────────────────────────────────────────────────
// CSS
// ────────────────────────────────────────────────────────────────────────────
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #060606; }

.app {
  font-family: 'JetBrains Mono', monospace;
  background: #060606;
  color: #C9D1D9;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  user-select: none;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  background: rgba(6,6,6,.97);
  border-bottom: 1px solid #141414;
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(8px);
}
.phase-lbl {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px; letter-spacing: .12em; color: #F59E0B;
}
.dots { display: flex; gap: 6px; align-items: center; }
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #1A1A1A; border: 1px solid #262626;
  transition: all .3s;
}
.dot.done  { background: #2D2D2D; border-color: #444; }
.dot.active{ background: #F59E0B; border-color: #F59E0B; box-shadow: 0 0 6px #F59E0B55; }

.vp {
  position: relative; width: 100%;
  aspect-ratio: 9/16; max-height: 55vh;
  overflow: hidden; background: #090909; flex-shrink: 0;
}
.vp::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg,
    transparent, transparent 3px,
    rgba(0,0,0,.08) 3px, rgba(0,0,0,.08) 4px);
  z-index: 2;
}
video.feed {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
}
.ov-img {
  position: absolute; top: 50%; left: 50%;
  pointer-events: none;
  max-width: 95%; max-height: 90%;
  z-index: 1;
}
.xhair {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 36px; height: 36px; pointer-events: none; z-index: 3;
}
.xhair::before, .xhair::after {
  content: ''; position: absolute; background: rgba(245,158,11,.45);
}
.xhair::before { width: 1px; height: 100%; left: 50%; top: 0; }
.xhair::after  { height: 1px; width: 100%; top: 50%; left: 0; }
.badge {
  position: absolute; font-size: 9px; letter-spacing: .1em;
  padding: 3px 8px; border-radius: 3px;
  font-family: 'JetBrains Mono', monospace; z-index: 4;
}
.badge.tl { top: 10px; left: 10px; }
.badge.tr { top: 10px; right: 10px; }
.badge.green { background: rgba(16,185,129,.15); border: 1px solid rgba(16,185,129,.35); color: #10B981; }
.badge.amber { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.2); color: #F59E0B; }
.badge.red   { background: rgba(220,38,38,.15); border: 1px solid rgba(220,38,38,.3);  color: #EF4444; }
.cam-ph {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; color: #333; font-size: 12px; letter-spacing: .1em; z-index: 3;
}

.panel {
  flex: 1; overflow-y: auto;
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.sec {
  font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
  color: #2D3748; padding-bottom: 6px; border-bottom: 1px solid #0F0F0F;
}
hr.div { border: none; border-top: 1px solid #0D0D0D; }

.ctrl { display: flex; flex-direction: column; gap: 5px; }
.ctrl-hd {
  display: flex; justify-content: space-between;
  font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
}
.ctrl-k { color: #4B5563; }
.ctrl-v { color: #F59E0B; font-weight: 500; }
.ctrl-tr { display: flex; align-items: center; gap: 5px; }
input[type=range].rng {
  -webkit-appearance: none; appearance: none;
  flex: 1; height: 2px; background: #1A1A1A;
  border-radius: 1px; outline: none; cursor: pointer;
}
input[type=range].rng::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: #F59E0B; cursor: pointer;
  border: 2px solid #060606; box-shadow: 0 0 8px rgba(245,158,11,.35);
}
input[type=range].rng::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  background: #F59E0B; cursor: pointer; border: 2px solid #060606;
}
.sb {
  width: 32px; height: 32px; background: #0E0E0E;
  border: 1px solid #1C1C1C; color: #6B7280; border-radius: 4px;
  cursor: pointer; font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace; transition: all .1s;
}
.sb:active { background: #1A1400; color: #F59E0B; border-color: rgba(245,158,11,.3); }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn {
  padding: 13px 20px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: .1em;
  cursor: pointer; border-radius: 5px; border: none;
  width: 100%; transition: all .15s;
}
.btn:active { transform: scale(.97); }
.btn-p  { background: #F59E0B; color: #060606; }
.btn-p:active { background: #D97706; }
.btn-s  { background: transparent; color: #6B7280; border: 1px solid #1C1C1C; font-size: 17px; }
.btn-s:hover { border-color: #333; color: #9CA3AF; }
.btn-ok { background: #10B981; color: #060606; }
.btn-r  { display: flex; gap: 8px; }
.btn-r > .btn { flex: 1; }

.ls {
  flex: 1; display: flex; flex-direction: column;
  align-items: stretch; justify-content: center;
  gap: 20px; padding: 28px 20px;
}
.hero {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px; line-height: .95; letter-spacing: .02em;
  color: #F59E0B; text-align: center;
}
.hero-s {
  text-align: center; font-size: 10px;
  letter-spacing: .18em; color: #2D3748;
  line-height: 2; text-transform: uppercase; margin-top: 6px;
}
.fz {
  border: 1px dashed #1C1C1C; border-radius: 6px;
  padding: 26px 16px; text-align: center;
  cursor: pointer; transition: all .2s; position: relative;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.fz:hover { border-color: rgba(245,158,11,.3); background: #0A0A0A; }
.fz input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
.fz-icon { font-size: 26px; }
.fz-lbl  { font-size: 11px; letter-spacing: .1em; color: #4B5563; text-transform: uppercase; }
.prev    { width: 100%; max-height: 150px; object-fit: contain; border-radius: 4px; border: 1px solid #111; }

.gs {
  display: flex; align-items: center; gap: 5px;
  font-size: 9px; letter-spacing: .1em;
  padding: 4px 8px; border-radius: 4px; border: 1px solid; cursor: pointer;
}
.gs.ok  { color: #10B981; border-color: rgba(16,185,129,.25); }
.gs.off { color: #374151; border-color: #1A1A1A; }
.gs-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.gs.ok .gs-dot { animation: blink 1.8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.db {
  background: #0A0A0A; border: 1px solid #111;
  border-radius: 5px; padding: 12px;
  font-size: 10px; line-height: 2; letter-spacing: .05em;
}
.dr { display: flex; justify-content: space-between; }
.dk { color: #374151; }
.dv { color: #10B981; }

.di-row { display: flex; align-items: center; gap: 8px; }
.di {
  flex: 1; background: #0E0E0E; border: 1px solid #1C1C1C;
  color: #E5E7EB; font-family: 'JetBrains Mono', monospace;
  font-size: 22px; padding: 10px 12px; border-radius: 5px;
  outline: none; text-align: center; min-width: 0;
}
.di:focus { border-color: rgba(245,158,11,.3); }
.ug { display: flex; gap: 4px; }
.ub {
  padding: 8px 12px; background: #0E0E0E;
  border: 1px solid #1C1C1C; color: #4B5563;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  cursor: pointer; border-radius: 4px; transition: all .15s;
}
.ub.on { border-color: rgba(245,158,11,.3); color: #F59E0B; background: #120F00; }
`;

// ────────────────────────────────────────────────────────────────────────────
// SLIDER
// ────────────────────────────────────────────────────────────────────────────
function Slider({ label, val, min, max, step = 1, unit = '', set }) {
  const a = d => set(v => Math.min(max, Math.max(min, v + d)));
  return (
    <div className="ctrl">
      <div className="ctrl-hd">
        <span className="ctrl-k">{label}</span>
        <span className="ctrl-v">{val}{unit}</span>
      </div>
      <div className="ctrl-tr">
        <button className="sb" onClick={() => a(-step)}>−</button>
        <input type="range" className="rng" min={min} max={max} step={step} value={val}
               onChange={e => set(Number(e.target.value))} />
        <button className="sb" onClick={() => a(step)}>+</button>
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// MAIN
// ────────────────────────────────────────────────────────────────────────────
function PicPin() {
  const [phase, setPhase]       = useState('load');
  const [photo, setPhoto]       = useState(null);
  const [camErr, setCamErr]     = useState(null);
  const [camReady, setCamReady] = useState(false);

  const [opa, setOpa] = useState(50);
  const [sz,  setSz]  = useState(100);
  const [px,  setPx]  = useState(0);
  const [py,  setPy]  = useState(0);
  const [rx,  setRx]  = useState(0);
  const [ry,  setRy]  = useState(0);

  const [gyro, setGyro] = useState(false);
  const [live, setLive] = useState({ a: 0, b: 0, g: 0 });
  const oriRef = useRef({ a: 0, b: 0, g: 0 });
  const refRef = useRef(null);

  const [delta, setDelta] = useState({ dx: 0, dy: 0 });
  const rafRef = useRef(null);

  const [dist, setDist]     = useState(20);
  const [unit, setUnit]     = useState('m');
  const [anchor, setAnchor] = useState(null);
  const [copied, setCopied] = useState(false);

  const vidRef    = useRef(null);
  const streamRef = useRef(null);

  // ── Camera ──────────────────────────────────────────────────────────────
  const startCam = useCallback(async () => {
    setCamErr(null);
    if (!navigator.mediaDevices?.getUserMedia) {
      setCamErr('Kamera vyžaduje HTTPS nebo localhost');
      return;
    }
    try {
      const s = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 } }
      });
      streamRef.current = s;
      if (vidRef.current) {
        vidRef.current.srcObject = s;
        await vidRef.current.play();
      }
      setCamReady(true);
    } catch (e) {
      setCamErr(
        e.name === 'NotAllowedError' ? 'Přístup ke kameře odepřen' :
        e.name === 'NotFoundError'   ? 'Kamera nenalezena' : e.message
      );
    }
  }, []);

  const stopCam = useCallback(() => {
    streamRef.current?.getTracks().forEach(t => t.stop());
    streamRef.current = null;
    setCamReady(false);
  }, []);

  // ── Gyro ────────────────────────────────────────────────────────────────
  useEffect(() => {
    if (!('DeviceOrientationEvent' in window)) return;
    setGyro(true);
    const h = ({ alpha: a, beta: b, gamma: g }) => {
      const o = { a: a ?? 0, b: b ?? 0, g: g ?? 0 };
      oriRef.current = o;
      setLive(o);
    };
    window.addEventListener('deviceorientation', h, true);
    return () => window.removeEventListener('deviceorientation', h, true);
  }, []);

  const reqGyro = async () => {
    if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
      if (await DeviceOrientationEvent.requestPermission() === 'granted') setGyro(true);
    }
  };

  // ── AR RAF loop ──────────────────────────────────────────────────────────
  useEffect(() => {
    if (phase !== 'anchored') return;
    const ppd = () => window.innerWidth / 65;
    const loop = () => {
      if (refRef.current) {
        const r = refRef.current, c = oriRef.current, p = ppd();
        setDelta({ dx: -(c.g - r.g) * p, dy: (c.b - r.b) * p });
      }
      rafRef.current = requestAnimationFrame(loop);
    };
    rafRef.current = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(rafRef.current);
  }, [phase]);

  useEffect(() => () => { stopCam(); cancelAnimationFrame(rafRef.current); }, []);

  // ── Handlers ─────────────────────────────────────────────────────────────
  const doFix = () => { refRef.current = { ...oriRef.current }; setPhase('offset'); };

  const doAnchor = () => {
    setAnchor({
      refOri: { ...refRef.current },
      distM: unit === 'm' ? dist : dist * 1000,
      tr: { opa, sz, px, py, rx, ry },
      ts: new Date().toISOString(),
    });
    setDelta({ dx: 0, dy: 0 });
    setPhase('anchored');
  };

  const doCopy = async () => {
    try { await navigator.clipboard.writeText(JSON.stringify(anchor, null, 2)); } catch {}
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  const doReset = () => {
    stopCam();
    setPhase('load'); setAnchor(null); setDelta({ dx: 0, dy: 0 });
    refRef.current = null;
    setOpa(50); setSz(100); setPx(0); setPy(0); setRx(0); setRy(0);
  };

  // ── Overlay style ─────────────────────────────────────────────────────────
  const ovStyle = (ar = false) => ({
    transform: `translate(calc(-50% + ${px + (ar ? delta.dx : 0)}px), calc(-50% + ${py + (ar ? delta.dy : 0)}px)) scale(${sz / 100}) perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg)`,
    opacity: opa / 100,
    transition: ar ? 'transform 60ms linear' : 'none',
  });

  const pi = PHASES.indexOf(phase);

  // ── Shared slider group ───────────────────────────────────────────────────
  const SG = () => (
    <>
      <div className="sec">Překryv</div>
      <Slider label="Průhlednost" val={opa} min={0}   max={100} step={1} unit="%" set={setOpa} />
      <Slider label="Velikost"    val={sz}  min={10}  max={300} step={1} unit="%" set={setSz}  />
      <hr className="div" />
      <div className="sec">Poloha</div>
      <div className="g2">
        <Slider label="Pos X" val={px} min={-500} max={500} step={1} unit="px" set={setPx} />
        <Slider label="Pos Y" val={py} min={-500} max={500} step={1} unit="px" set={setPy} />
      </div>
      <hr className="div" />
      <div className="sec">Perspektiva</div>
      <div className="g2">
        <Slider label="Naklon X" val={rx} min={-60} max={60} step={1} unit="°" set={setRx} />
        <Slider label="Naklon Y" val={ry} min={-60} max={60} step={1} unit="°" set={setRy} />
      </div>
    </>
  );

  // ── RENDER ────────────────────────────────────────────────────────────────
  return (
    <div className="app">
      <style>{CSS}</style>

      {/* TOP BAR */}
      {phase === 'load' ? (
        <div className="topbar">
          <div className="phase-lbl">PICTURE PIN</div>
          <div className={`gs ${gyro ? 'ok' : 'off'}`} onClick={reqGyro}>
            <div className="gs-dot" />{gyro ? 'GYRO OK' : 'BEZ GYRA'}
          </div>
        </div>
      ) : (
        <div className="topbar">
          <div className="phase-lbl">{LABELS[phase]}</div>
          <div className="dots">
            {PHASES.map((p, i) => (
              <div key={p} className={`dot${i < pi ? ' done' : ''}${i === pi ? ' active' : ''}`} />
            ))}
          </div>
        </div>
      )}

      {/* CAMERA VIEWPORT */}
      {phase !== 'load' && (
        <div className="vp">
          <video ref={vidRef} className="feed" autoPlay playsInline muted />
          {!camReady && !camErr && (
            <div className="cam-ph"><span style={{ fontSize: 22 }}>📷</span><span>Inicializace...</span></div>
          )}
          {camErr && <div className="badge tl red">{camErr}</div>}
          {photo && <img src={photo} alt="" className="ov-img" style={ovStyle(phase === 'anchored')} />}
          {phase === 'align' && <div className="xhair" />}
          {phase === 'anchored' && <div className="badge tl green">● UKOTVENO</div>}
          {(phase === 'align' || phase === 'offset') && gyro && (
            <div className="badge tr amber">β{live.b.toFixed(1)}° γ{live.g.toFixed(1)}°</div>
          )}
        </div>
      )}

      {/* ── LOAD ── */}
      {phase === 'load' && (
        <div className="ls">
          <div>
            <div className="hero">PICTURE<br />PINNING</div>
            <div className="hero-s">Historické fotografie<br />ukotvené v prostoru</div>
          </div>
          <label className="fz">
            <input type="file" accept="image/*"
                   onChange={e => { const f = e.target.files[0]; if (f) setPhoto(URL.createObjectURL(f)); }} />
            <div className="fz-icon">{photo ? '✓' : '🗂'}</div>
            <div className="fz-lbl">
              {photo ? 'Fotografie načtena — klikněte pro změnu' : 'Načíst historickou fotografii'}
            </div>
          </label>
          {photo && <img src={photo} alt="náhled" className="prev" />}
          {photo && (
            <button className="btn btn-p" onClick={async () => { await startCam(); setPhase('align'); }}>
              SPUSTIT KAMERU →
            </button>
          )}
        </div>
      )}

      {/* ── ALIGN ── */}
      {phase === 'align' && (
        <div className="panel">
          <SG />
          <hr className="div" />
          <div className="btn-r">
            <button className="btn btn-s" onClick={() => { setPhase('load'); stopCam(); }}>← ZPĚT</button>
            <button className="btn btn-p" onClick={doFix}>FIX ROVINU ⊕</button>
          </div>
        </div>
      )}

      {/* ── OFFSET ── */}
      {phase === 'offset' && (
        <div className="panel">
          <div className="sec">Vzdálenost od budovy</div>
          <div style={{ fontSize: 11, color: '#374151', lineHeight: 1.9, letterSpacing: '.05em' }}>
            Zadejte přibližnou vzdálenost od fotografované budovy.<br />
            Ovlivní měřítko fotografie v prostoru.
          </div>
          <div className="di-row">
            <button className="sb" onClick={() => setDist(d => Math.max(1, d - 1))}>−</button>
            <input type="number" className="di" value={dist} min={1}
                   onChange={e => setDist(Math.max(1, Number(e.target.value)))} />
            <button className="sb" onClick={() => setDist(d => d + 1)}>+</button>
            <div className="ug">
              <button className={`ub${unit === 'm'  ? ' on' : ''}`} onClick={() => setUnit('m')}>m</button>
              <button className={`ub${unit === 'km' ? ' on' : ''}`} onClick={() => setUnit('km')}>km</button>
            </div>
          </div>

          {refRef.current && (
            <>
              <div className="sec">Zaznamenaná rovina</div>
              <div className="db">
                {[
                  ['Azimut α', `${Number(refRef.current.a).toFixed(2)}°`],
                  ['Náklon β', `${Number(refRef.current.b).toFixed(2)}°`],
                  ['Rotace γ', `${Number(refRef.current.g).toFixed(2)}°`],
                ].map(([k, v]) => (
                  <div key={k} className="dr">
                    <span className="dk">{k}</span>
                    <span className="dv">{v}</span>
                  </div>
                ))}
                {!gyro && (
                  <div style={{ color: '#4B5563', fontSize: 10, marginTop: 6 }}>
                    ⚠ Gyroskop nedostupný — AR tracking nebude funkční
                  </div>
                )}
              </div>
            </>
          )}

          <div className="sec">Doladění obrazu</div>
          <SG />
          <hr className="div" />
          <div className="btn-r">
            <button className="btn btn-s" onClick={() => setPhase('align')}>← ZAROVNAT</button>
            <button className="btn btn-p" onClick={doAnchor}>UKOTVIT ◎</button>
          </div>
        </div>
      )}

      {/* ── ANCHORED ── */}
      {phase === 'anchored' && (
        <div className="panel">
          <div className="sec">Ukotvená fotografie</div>
          {anchor && (
            <div className="db">
              {[
                ['Vzdálenost',  `${anchor.distM} m`],
                ['Orient. β',   `${Number(anchor.refOri?.b).toFixed(2)}°`],
                ['Orient. γ',   `${Number(anchor.refOri?.g).toFixed(2)}°`],
                ['Průhlednost', `${anchor.tr.opa}%`],
                ['Měřítko',     `${anchor.tr.sz}%`],
                ['Ukotveno',    new Date(anchor.ts).toLocaleTimeString('cs-CZ')],
              ].map(([k, v]) => (
                <div key={k} className="dr">
                  <span className="dk">{k}</span>
                  <span className="dv">{v}</span>
                </div>
              ))}
              {gyro && (
                <div className="dr" style={{ marginTop: 4, borderTop: '1px solid #111', paddingTop: 4 }}>
                  <span className="dk">AR delta</span>
                  <span className="dv">Δx {delta.dx.toFixed(1)}px  Δy {delta.dy.toFixed(1)}px</span>
                </div>
              )}
            </div>
          )}
          {!gyro && (
            <div style={{ fontSize: 10, color: '#4B5563', lineHeight: 1.8, letterSpacing: '.05em' }}>
              ⚠ Gyroskop nedostupný. AR tracking nefunguje.<br />
              Na iOS klikněte «BEZ GYRA» v liště pro povolení.
            </div>
          )}
          <div className="btn-r">
            <button className="btn btn-s" onClick={doReset}>RESET</button>
            <button className={`btn ${copied ? 'btn-ok' : 'btn-p'}`} onClick={doCopy}>
              {copied ? '✓ ZKOPÍROVÁNO' : 'KOPÍROVAT JSON'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Mount ──────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PicPin />);
</script>
</body>
</html>
