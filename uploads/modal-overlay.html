<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LayersOfPrague — Modal testbed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'DM Sans', system-ui, sans-serif;
  background: #e8e4dc;
}

/* live map as background */
#mapFrame {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  border: none;
  pointer-events: none;
}

/* trigger button — only for testing */
#testBtn {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 100; padding: 10px 24px; border-radius: 8px;
  background: white; border: 1px solid #ccc;
  font-family: inherit; font-size: 14px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}

/* ── MODAL ── */
.modal {
  position: fixed; inset: 0; z-index: 1000;
  opacity: 0; pointer-events: none;
  transition: opacity .3s ease;
}
.modal.open { opacity: 1; pointer-events: all; }

.modal-bg {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.45);
  cursor: pointer;
}

.modal-box {
  position: absolute; inset: 0;
  overflow: hidden;
}

/* close */
.modal-close {
  position: absolute; top: 16px; right: 16px; z-index: 10;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.3);
  color: white; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: rgba(0,0,0,.8); }

/* header overlay */
.modal-header {
  position: absolute; top: 0; left: 0; right: 0; z-index: 5;
  padding: 20px 20px 48px;
  background: linear-gradient(180deg, rgba(0,0,0,.65) 0%, transparent 100%);
  pointer-events: none;
}
.modal-tag {
  font-size: 10px; font-weight: 500; letter-spacing: .12em;
  text-transform: uppercase; color: #b8922a; display: block; margin-bottom: 4px;
}
.modal-title {
  font-family: 'Playfair Display', serif; font-size: 22px;
  font-weight: 700; color: white; line-height: 1.2; margin-bottom: 3px;
}
.modal-sub { font-size: 12px; color: rgba(255,255,255,.55); }

/* ── SLIDER ── */
.slider-wrap {
  position: absolute; inset: 0;
  cursor: ew-resize; user-select: none;
}
.sl-base, .sl-top { position: absolute; inset: 0; }
.sl-base img, .sl-top img {
  width: 100%; height: 100%;
  object-fit: contain; display: block;
  pointer-events: none; -webkit-user-drag: none;
}
.sl-top { clip-path: inset(0 50% 0 0); }
.sl-divider {
  position: absolute; top: 0; left: 50%;
  width: 2px; height: 100%;
  background: white; transform: translateX(-50%);
  pointer-events: none;
}
.sl-handle {
  position: absolute; top: 50%; left: 50%;
  width: 38px; height: 38px; border-radius: 50%;
  background: white; transform: translate(-50%, -50%);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; pointer-events: none; color: #4a4640;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.sl-lbl {
  position: absolute; bottom: 64px;
  font-size: 12px; font-weight: 500; color: white;
  padding: 4px 12px; background: rgba(0,0,0,.5); border-radius: 4px;
}
.sl-lbl-l { left: 16px; }
.sl-lbl-r { right: 16px; }

/* no photo */
.modal-nophoto {
  position: absolute; inset: 0;
  background: rgba(20,18,14,.9);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,.45); font-size: 13px; font-style: italic;
}

/* ── PULL TAB ── */
.pull-tab {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 6;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 10px 0 18px;
  background: linear-gradient(0deg, rgba(0,0,0,.65) 0%, transparent 100%);
  cursor: pointer;
  transition: opacity .2s;
}
.pull-bar { width: 38px; height: 4px; border-radius: 2px; background: rgba(255,255,255,.5); }
.pull-lbl { font-size: 11px; color: rgba(255,255,255,.65); letter-spacing: .08em; text-transform: uppercase; }

/* ── DRAWER ── */
.drawer {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 7;
  background: #f5f1ea;
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -4px 24px rgba(0,0,0,.3);
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  max-height: 80%; display: flex; flex-direction: column;
}
.drawer.open { transform: translateY(0); }

.drawer-grip {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 12px 0 10px; cursor: pointer; flex-shrink: 0;
  border-bottom: 1px solid #e2ddd4;
}
.drawer-bar { width: 38px; height: 4px; border-radius: 2px; background: #e2ddd4; }
.drawer-lbl { font-size: 11px; color: #8a857e; letter-spacing: .07em; text-transform: uppercase; }
.drawer-scroll { overflow-y: auto; padding: 18px 22px 32px; flex: 1; }

.desc-box {
  background: #ede9e0; border-left: 3px solid #b8922a;
  border-radius: 0 8px 8px 0; padding: 13px 14px;
  font-size: 13px; line-height: 1.7; color: #4a4640; margin-bottom: 16px;
}

/* paywall preview — locked content */
.paywall-block {
  position: relative; border-radius: 10px;
  overflow: hidden; margin-bottom: 12px;
}
.paywall-content {
  padding: 14px 16px; background: #ede9e0;
  border-radius: 10px; filter: blur(3px);
  pointer-events: none; user-select: none;
  font-size: 13px; line-height: 1.7; color: #4a4640;
}
.paywall-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  background: rgba(245,241,234,.85);
  backdrop-filter: blur(2px);
}
.paywall-icon { font-size: 20px; }
.paywall-text { font-size: 12px; color: #4a4640; font-weight: 500; text-align: center; }
.paywall-btn {
  font-family: inherit; font-size: 12px; padding: 7px 18px;
  border-radius: 7px; border: none;
  background: #2a6e5e; color: white; cursor: pointer;
}
.paywall-btn:hover { background: #3a8f7a; }

.s-label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: .1em; color: #8a857e;
  display: block; margin-bottom: 8px; margin-top: 16px;
}

/* ── GALLERY ── */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}
.gallery-thumb {
  aspect-ratio: 1;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  background: #e2ddd4;
  position: relative;
}
.gallery-thumb img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: transform .2s ease, opacity .3s;
}
.gallery-thumb:hover img { transform: scale(1.05); }
.gallery-thumb .thumb-loader {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #b8922a;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: .4 } 50% { opacity: 1 } }
.gallery-thumb.loaded .thumb-loader { display: none; }
.gallery-error {
  font-size: 11px; color: #b0a89e; text-align: center;
  padding: 12px 0; font-style: italic;
}

/* ── LIGHTBOX ── */
#lightbox {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,.92);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .25s ease;
}
#lightbox.open { opacity: 1; pointer-events: all; }
#lightbox img {
  max-width: 92vw; max-height: 88vh;
  object-fit: contain; border-radius: 4px;
  box-shadow: 0 8px 48px rgba(0,0,0,.6);
}
#lightbox .lb-close {
  position: absolute; top: 16px; right: 16px;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
  color: white; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#lightbox .lb-close:hover { background: rgba(255,255,255,.3); }
#lightbox .lb-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
  color: white; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
#lightbox .lb-nav:hover { background: rgba(255,255,255,.3); }
#lightbox .lb-prev { left: 16px; }
#lightbox .lb-next { right: 16px; }
#lightbox .lb-caption {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: rgba(255,255,255,.55); white-space: nowrap;
  font-family: 'DM Sans', sans-serif; letter-spacing: .05em;
}
</style>
</head>
<body>

<iframe id="mapFrame" src="map.html"></iframe>

<button id="testBtn" onclick="openModal(0)">Otevřít modal (test)</button>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-bg" id="modalBg"></div>
  <div class="modal-box">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-header" id="modalHeader"></div>

    <div class="slider-wrap" id="sliderWrap">
      <div class="sl-base"><img id="slBase" src="" alt=""/></div>
      <div class="sl-top" id="slTop"><img id="slTopImg" src="" alt=""/></div>
      <div class="sl-divider" id="slDiv"></div>
      <div class="sl-handle" id="slHandle">↔</div>
      <div class="sl-lbl sl-lbl-l" id="slLblL"></div>
      <div class="sl-lbl sl-lbl-r" id="slLblR"></div>
    </div>

    <div class="modal-nophoto" id="modalNophoto" style="display:none">
      Zatím bez fotografií — toto místo čeká na nafocení.
    </div>

    <div class="pull-tab" id="pullTab">
      <div class="pull-bar"></div>
      <div class="pull-lbl">více informací</div>
    </div>

    <div class="drawer" id="drawer">
      <div class="drawer-grip" id="drawerGrip">
        <div class="drawer-bar"></div>
        <div class="drawer-lbl" id="drawerLbl">více informací</div>
      </div>
      <div class="drawer-scroll" id="drawerScroll"></div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <img id="lbImg" src="" alt=""/>
  <button class="lb-nav lb-next" id="lbNext">›</button>
  <div class="lb-caption" id="lbCaption"></div>
</div>

<script>
const locations = [
  {
    id: 0,
    name: "Šítkovská věž — Mánes",
    sub: "Nové Město, Praha 1",
    lat: 50.0784, lng: 14.4133,
    done: true,
    imgNow: "foto/1_Manes_now.jpg",
    imgThen: "foto/1_Manes_then.jpg",
    yearThen: "~1900", yearNow: "2024",
    desc: "Šítkovská věž — středověká vodní věž na pravém břehu Vltavy, postavená kolem roku 1495. Na historickém snímku vidíme zimní sběr ledu z řeky s koňskými potahy. Dnes na stejném místě stojí funkcionalista Mánes (1930) a u nábřeží kotví boat hotel Klotylda.",
    // premium content (paywall)
    premium: "Věž přežila demolici Šítkovských mlýnů v roce 1927 díky přímému zásahu Spolku výtvarných umělců Mánes, který ji zahrnul do projektu nové budovy architekta Otakara Novotného. Funkcionalistická stavba z let 1928–1930 je dnes kulturní památkou. Věž samotná pochází z roku 1495 a sloužila jako součást středověkého vodárenského systému Prahy.",
    // wikimedia gallery files
    gallery: [
      "Společenský_dům_-_spolkový_dům_Mánes,_Šitkovská_vodárenská_věž_(Nové_Město)_(2).jpg",
      "Praha_Manes_Wiki-vr-like.jpg",
      "Manes_Exhibition_Hall_-_panoramio.jpg",
      "023_Hotel_flotant_Klotylda_i_torre_Šítkovská,_a_l'illa_Slovanský.jpg",
      "Rašínovo_nábřeží,_pohled_k_Mánesu.jpg",
      "PragueRiversideBuildings_2.jpg"
    ]
  }
];

// MODAL
const modal     = document.getElementById('modal');
const drawer    = document.getElementById('drawer');
const pullTab   = document.getElementById('pullTab');
const drawerGrip = document.getElementById('drawerGrip');
const drawerLbl  = document.getElementById('drawerLbl');

function closeModal() {
  modal.classList.remove('open');
  drawer.classList.remove('open');
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalBg').addEventListener('click', closeModal);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function toggleDrawer() {
  const open = drawer.classList.toggle('open');
  drawerLbl.textContent = open ? 'zavřít' : 'více informací';
  pullTab.style.opacity = open ? '0' : '1';
  pullTab.style.pointerEvents = open ? 'none' : 'all';
}
pullTab.addEventListener('click', toggleDrawer);
drawerGrip.addEventListener('click', toggleDrawer);

function openModal(id) {
  const loc = locations[id];
  const hasPhotos = loc.imgNow && loc.imgThen;

  document.getElementById('modalHeader').innerHTML = `
    <span class="modal-tag">${loc.done ? '✓ hotovo' : 'čeká na nafocení'}</span>
    <div class="modal-title">${loc.name}</div>
    <div class="modal-sub">${loc.sub} · ${loc.lat.toFixed(4)}° N, ${loc.lng.toFixed(4)}° E</div>
  `;

  document.getElementById('sliderWrap').style.display = hasPhotos ? 'block' : 'none';
  document.getElementById('modalNophoto').style.display = hasPhotos ? 'none' : 'flex';

  if (hasPhotos) {
    document.getElementById('slBase').src = loc.imgThen;
    document.getElementById('slTopImg').src = loc.imgNow;
    document.getElementById('slLblL').textContent = loc.yearThen;
    document.getElementById('slLblR').textContent = loc.yearNow;
    initSlider();
  }

  document.getElementById('drawerScroll').innerHTML = `
    <span class="s-label">Popis</span>
    <div class="desc-box">${loc.desc}</div>

    <span class="s-label">Architektura & příběh místa</span>
    <div class="paywall-block">
      <div class="paywall-content">${loc.premium}</div>
      <div class="paywall-overlay">
        <div class="paywall-icon">🔒</div>
        <div class="paywall-text">Prémiový obsah<br>LayersOfPrague</div>
        <button class="paywall-btn" onclick="alert('V produkci: přesměruje na přihlášení / platbu')">Odemknout · 99 Kč/měs.</button>
      </div>
    </div>

    <span class="s-label">Fotogalerie</span>
    <div class="gallery-grid" id="galleryGrid"></div>
  `;

  // load gallery async
  if (loc.gallery && loc.gallery.length) {
    loadGallery(loc.gallery);
  }

  drawer.classList.remove('open');
  drawerLbl.textContent = 'více informací';
  pullTab.style.opacity = '1';
  pullTab.style.pointerEvents = 'all';

  modal.classList.add('open');
}

// SLIDER
function initSlider() {
  const w = document.getElementById('sliderWrap');
  const wc = w.cloneNode(true);
  w.parentNode.replaceChild(wc, w);

  const ww = document.getElementById('sliderWrap');
  const tt = document.getElementById('slTop');
  const dd = document.getElementById('slDiv');
  const hh = document.getElementById('slHandle');
  let drag = false;

  function setPos(pct) {
    pct = Math.max(3, Math.min(97, pct));
    tt.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
    dd.style.left = pct + '%';
    hh.style.left = pct + '%';
  }

  ww.addEventListener('mousedown', () => {
    drag = true;
    document.body.style.cursor = 'ew-resize';
    document.body.style.userSelect = 'none';
  });
  window.addEventListener('mouseup', () => {
    drag = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
  window.addEventListener('mousemove', e => {
    if (!drag) return;
    const r = ww.getBoundingClientRect();
    setPos(((e.clientX - r.left) / r.width) * 100);
  });
  ww.addEventListener('touchstart', () => drag = true, { passive: true });
  window.addEventListener('touchend', () => drag = false);
  window.addEventListener('touchmove', e => {
    if (!drag) return;
    const r = ww.getBoundingClientRect();
    setPos(((e.touches[0].clientX - r.left) / r.width) * 100);
  }, { passive: true });
}

// ── GALLERY ──
const WIKI_API = 'https://en.wikipedia.org/w/api.php';

async function fetchWikiThumbUrl(filename, width = 400) {
  const url = `${WIKI_API}?action=query&titles=File:${encodeURIComponent(filename)}&prop=imageinfo&iiprop=url&iiurlwidth=${width}&format=json&origin=*`;
  const r = await fetch(url);
  const d = await r.json();
  const pages = d.query.pages;
  const page = Object.values(pages)[0];
  return page?.imageinfo?.[0]?.thumburl || null;
}

let galleryUrls = [];
let lbIndex = 0;

async function loadGallery(files) {
  const grid = document.getElementById('galleryGrid');
  if (!grid) return;

  galleryUrls = new Array(files.length).fill(null);

  // create placeholder thumbs
  files.forEach((file, i) => {
    const div = document.createElement('div');
    div.className = 'gallery-thumb';
    div.id = `gt-${i}`;
    div.innerHTML = `<div class="thumb-loader">◆</div>`;
    div.addEventListener('click', () => openLightbox(i));
    grid.appendChild(div);
  });

  // fetch URLs concurrently
  const results = await Promise.allSettled(
    files.map(f => fetchWikiThumbUrl(f, 400))
  );

  results.forEach((res, i) => {
    const div = document.getElementById(`gt-${i}`);
    if (!div) return;
    const thumbUrl = res.status === 'fulfilled' ? res.value : null;

    if (thumbUrl) {
      galleryUrls[i] = thumbUrl;
      const img = document.createElement('img');
      img.src = thumbUrl;
      img.alt = files[i];
      img.onload = () => div.classList.add('loaded');
      div.appendChild(img);
    } else {
      div.innerHTML = `<div class="thumb-loader" style="font-size:11px;color:#b0a89e">✕</div>`;
    }
  });
}

// ── LIGHTBOX ──
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbCaption = document.getElementById('lbCaption');

function openLightbox(idx) {
  if (!galleryUrls[idx]) return;
  lbIndex = idx;
  updateLightbox();
  lb.classList.add('open');
}

function closeLightbox() {
  lb.classList.remove('open');
}

function updateLightbox() {
  const url = galleryUrls[lbIndex];
  if (!url) return;
  // swap thumb width to 1200 for lightbox
  const fullUrl = url.replace(/\/\d+px-/, '/1200px-');
  lbImg.src = fullUrl;
  const loaded = galleryUrls.filter(Boolean).length;
  lbCaption.textContent = `${lbIndex + 1} / ${loaded}`;
  document.getElementById('lbPrev').style.display = lbIndex > 0 ? 'flex' : 'none';
  document.getElementById('lbNext').style.display = lbIndex < loaded - 1 ? 'flex' : 'none';
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => { lbIndex--; updateLightbox(); });
document.getElementById('lbNext').addEventListener('click', () => { lbIndex++; updateLightbox(); });
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft' && lbIndex > 0) { lbIndex--; updateLightbox(); }
  if (e.key === 'ArrowRight') {
    const maxIdx = galleryUrls.filter(Boolean).length - 1;
    if (lbIndex < maxIdx) { lbIndex++; updateLightbox(); }
  }
});
</script>
</body>
</html>
